<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V88</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background: #0f172a; color: white; overflow: hidden; }

        /* LOGIN SCREEN - ISOLIERT */
        #login-screen { 
            position: fixed; top:0; left:0; width:100vw; height:100vh; 
            background: #0f172a; z-index: 20000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .login-card { 
            background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; 
            width: 85%; max-width: 320px; text-align: center; border: 2px solid var(--accent);
        }
        .login-btn {
            width: 100%; padding: 18px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; font-weight: bold; margin-top: 15px; 
            cursor: pointer; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* APP STRUKTUR */
        #mainApp { display: none; height: 100vh; flex-direction: column; position: relative; z-index: 10; }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e293b url('haus_background.jpg') no-repeat center center; background-size: cover; z-index: -2; }
        .dark-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); z-index: -1; }

        /* HEADER */
        .header { 
            background: #0f172a; padding: 12px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--accent); 
        }
        .header-user { font-size: 0.8rem; color: var(--accent); font-weight: bold; width: 80px; }
        .header h1 { margin: 0; font-size: 1.3rem; flex: 1; text-align: center; }
        .header-right { width: 80px; text-align: right; }

        .content-area { flex: 1; overflow-y: auto; padding: 15px 15px 110px 15px; -webkit-overflow-scrolling: touch; }
        .item-card { background: white; border-radius: 15px; margin-bottom: 20px; overflow: hidden; color: #333; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .delete-btn { position: absolute; top: 8px; right: 8px; background: var(--danger); color: white; border: none; width: 30px; height: 30px; border-radius: 8px; font-weight: bold; }

        .btn-status { display: block; width: 100%; padding: 18px; border: none; color: white; font-weight: bold; font-size: 1rem; }
        
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f172a; display: flex; height: 70px; border-top: 2px solid var(--accent); z-index: 100; }
        .tab-btn { flex: 1; border: none; background: none; color: #9ca3af; font-weight: bold; }
        .tab-btn.active { color: white; border-top: 4px solid var(--accent); background: rgba(255,255,255,0.05); }

        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .content { display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="margin-top:0; color:var(--accent);">Lager Login</h2>
        <input type="text" id="loginUser" placeholder="Dein Name">
        <input type="password" id="loginPass" placeholder="Passwort">
        <button class="login-btn" onmousedown="handleLogin()">ANMELDEN</button>
        <p id="loginErr" style="color:#ff8888; font-size:0.8rem; margin-top:10px; display:none;">Falsche Daten!</p>
    </div>
</div>

<div id="mainApp">
    <div class="bg-layer"></div>
    <div class="dark-overlay"></div>
    
    <div class="header">
        <div class="header-user" id="userDisplay">Name</div>
        <h1>GR-Lagerverwaltung</h1>
        <div class="header-right">
            <button onclick="logout()" style="background:none; border:1px solid #444; color:#888; padding:4px 8px; border-radius:5px; font-size:0.6rem;">LOGOUT</button>
        </div>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content active">
            <div style="background:white; padding:10px; border-radius:12px; margin-bottom:15px;">
                <input type="text" id="searchInput" placeholder="Suchen..." onkeyup="render()">
                <select id="filterCatSelect" onchange="render()" style="margin-top:5px;"></select>
            </div>
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div class="item-card" style="padding:20px;">
                <h3 style="margin-top:0;">Neuer Artikel</h3>
                <input type="text" id="itemName" placeholder="Bezeichnung">
                <select id="itemCatSelect"></select>
                <input type="file" id="itemImg" accept="image/*" capture="environment">
                <button onclick="saveItem()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; margin-top:10px;">SPEICHERN</button>
            </div>

            <div class="item-card" style="padding:20px;">
                <h3 style="margin-top:0;">Kategorien verwalten</h3>
                <div id="categoryListManage"></div>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <input type="text" id="newCatInput" placeholder="Neue Kat...">
                    <button onclick="addCategory()" style="background:var(--success); color:white; border:none; border-radius:10px; padding:0 15px;">+</button>
                </div>
            </div>
        </div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">Lagerliste</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">Neu Anlegen</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('lager_v32_final');
    let state = { user: null, items: [], cats: [] };

    function handleLogin() {
        const u = document.getElementById('loginUser').value.trim();
        const p = document.getElementById('loginPass').value;
        if(u !== "" && p === "1234") { 
            state.user = u;
            localStorage.setItem('lagerAuthorizedUser', u);
            startApp();
        } else {
            document.getElementById('loginErr').style.display = 'block';
        }
    }

    function startApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        document.getElementById('userDisplay').innerText = state.user;
        initApp();
    }

    function logout() {
        localStorage.removeItem('lagerAuthorizedUser');
        location.reload();
    }

    function initApp() {
        dbRef.on('value', snap => {
            const data = snap.val();
            if(data) {
                state.items = data.items || [];
                state.cats = data.cats || ["Werkzeug", "Maschinen"];
                updateDropdowns();
                render();
            }
        });
    }

    window.onload = () => {
        const savedUser = localStorage.getItem('lagerAuthorizedUser');
        if(savedUser) {
            state.user = savedUser;
            startApp();
        }
    };

    function updateDropdowns() {
        const html = state.cats.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('itemCatSelect').innerHTML = html;
        document.getElementById('filterCatSelect').innerHTML = `<option value="all">Alle Kategorien</option>` + html;
        document.getElementById('categoryListManage').innerHTML = state.cats.map(c => `
            <div style="display:flex; justify-content:space-between; background:#eee; padding:8px; border-radius:5px; margin-bottom:4px;">
                <span>${c}</span><span style="color:red; font-weight:bold;" onclick="deleteCategory('${c}')">X</span>
            </div>
        `).join('');
    }

    function addCategory() {
        const val = document.getElementById('newCatInput').value.trim();
        if(!val || state.cats.includes(val)) return;
        state.cats.push(val);
        dbRef.child('cats').set(state.cats);
        document.getElementById('newCatInput').value = "";
    }

    function deleteCategory(name) {
        if(confirm(`Kategorie "${name}" löschen?`)) {
            state.cats = state.cats.filter(c => c !== name);
            dbRef.child('cats').set(state.cats);
        }
    }

    function deleteItem(id) {
        if(confirm("Artikel löschen?")) {
            state.items = state.items.filter(i => i.id !== id);
            dbRef.child('items').set(state.items);
        }
    }

    function toggleStatus(id) {
        const i = state.items.find(x => x.id === id);
        const isIn = i.status === "im Lager";
        i.status = isIn ? "unterwegs" : "im Lager";
        i.outUser = isIn ? state.user : "";
        dbRef.child('items').set(state.items);
    }

    function render() {
        const list = document.getElementById('itemList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        const catFilter = document.getElementById('filterCatSelect').value;
        list.innerHTML = "";
        
        state.items.filter(i => {
            return i.name.toLowerCase().includes(search) && (catFilter === "all" || i.cat === catFilter);
        }).sort((a,b) => b.id - a.id).forEach(i => {
            const isOut = i.status !== "im Lager";
            list.innerHTML += `
                <div class="item-card">
                    <button class="delete-btn" onclick="deleteItem(${i.id})">×</button>
                    <div style="padding:15px; display:flex; gap:15px; align-items:center;">
                        <img src="${i.img || 'https://via.placeholder.com/100'}" style="width:70px; height:70px; object-fit:cover; border-radius:10px;">
                        <div style="flex:1;">
                            <b style="font-size:1.1rem;">${i.name}</b><br><small>${i.cat}</small>
                            ${isOut ? `<div style="color:red; font-weight:bold; font-size:0.8rem; margin-top:5px;">Bei: ${i.outUser}</div>` : ""}
                        </div>
                    </div>
                    <button class="btn-status" style="background:${isOut ? 'var(--danger)' : 'var(--success)'}" onclick="toggleStatus(${i.id})">
                        ${isOut ? 'EINLAGERN' : 'AUSLEIHEN'}
                    </button>
                </div>`;
        });
    }

    function saveItem() {
        const n = document.getElementById('itemName').value;
        if(!n) return;
        const newItem = { id: Date.now(), name: n, cat: document.getElementById('itemCatSelect').value, img: "", status: "im Lager" };
        const f = document.getElementById('itemImg').files[0];
        if(f) {
            const r = new FileReader();
            r.onload = (e) => { newItem.img = e.target.result; state.items.push(newItem); dbRef.child('items').set(state.items); };
            r.readAsDataURL(f);
        } else { state.items.push(newItem); dbRef.child('items').set(state.items); }
        document.getElementById('itemName').value = "";
        switchTab({currentTarget: document.querySelectorAll('.tab-btn')[0]}, 'tab-lager');
    }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
