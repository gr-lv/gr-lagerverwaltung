<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V69</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; }
        
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; 
            background: #1e293b url('haus_background.jpg') no-repeat center center fixed; 
            background-size: cover; height: 100vh; overflow: hidden;
        }

        .app-shell { height: 100vh; display: flex; flex-direction: column; background: rgba(15, 23, 42, 0.4); }
        .header { background: rgba(15, 23, 42, 0.9); color: white; padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); flex-shrink: 0; }
        .content-area { flex: 1; overflow-y: auto; padding: 15px 15px 100px 15px; -webkit-overflow-scrolling: touch; }

        .glass { 
            background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 15px; margin-bottom: 15px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); position: relative;
        }

        /* NEUES LAYOUT: UNTEREINANDER STATT NEBENEINANDER */
        .card-top { display: flex; gap: 15px; align-items: flex-start; margin-bottom: 15px; position: relative; }
        .thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; flex-shrink: 0; }
        .info-box { flex: 1; pointer-events: none; } /* Text schluckt keine Klicks */
        .info-box b, .info-box small { pointer-events: auto; }

        .btn-delete-fixed {
            position: absolute; top: -5px; right: -5px; 
            background: #fee2e2; color: #b91c1c; border: none; 
            width: 38px; height: 38px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer; z-index: 500;
        }

        .qty-row { display: flex; align-items: center; gap: 12px; margin-top: 10px; pointer-events: auto; }
        .btn-qty { 
            background: #f1f5f9; border: 1px solid #cbd5e1; width: 40px; height: 40px; 
            border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.3rem;
        }

        /* Status Button jetzt über die volle Breite unten */
        .btn-status-big { 
            width: 100%; padding: 15px; border: none; border-radius: 12px; 
            color: white; font-weight: bold; font-size: 1rem; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: block;
            margin-top: 10px; z-index: 400; position: relative;
        }

        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f172a; display: flex; border-top: 2px solid var(--accent); height: 70px; z-index: 2000; }
        .tab-btn { flex: 1; border: none; background: none; color: #9ca3af; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.65rem; }
        .tab-btn.active { color: white; background: rgba(255,255,255,0.1); border-top: 3px solid var(--accent); }

        .content { display: none; }
        .content.active { display: block; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; display: none; margin-bottom: 15px; border: 2px solid var(--accent); background: black; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="header">
        <h1 style="margin:0; font-size:1.1rem; color:var(--accent);">GR-LAGERVERWALTUNG</h1>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
            <span id="displayUser" style="font-size:0.8rem;">👤 Gast</span>
            <button onclick="askForName()" style="background:var(--primary); color:white; border:none; padding:5px 10px; border-radius:5px; font-size:0.7rem;">WECHSELN</button>
        </div>
    </div>

    <div class="content-area">
        <div id="loginSection" class="glass" style="text-align:center; display:none;">
            <button class="btn-main" onclick="askForName()">ANMELDEN</button>
        </div>

        <div id="tab-lager" class="content active">
            <div id="reader"></div>
            <div class="glass">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="searchInput" placeholder="Suchen..." onkeyup="render()">
                    <button onclick="startScan('search')" style="background:var(--accent); border:none; border-radius:10px; width:50px; color:white;">📷</button>
                </div>
            </div>
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div class="glass">
                <h2>Neu Einlagern</h2>
                <input type="text" id="itemName" placeholder="Name">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="itemBarcode" placeholder="Barcode">
                    <button onclick="startScan('new')" style="background:var(--accent); border:none; border-radius:10px; width:50px; color:white;">📷</button>
                </div>
                <input type="number" id="itemQty" value="1">
                <select id="itemCatSelect"></select>
                <input type="file" id="itemImg" accept="image/*" capture="environment">
                <button class="btn-main" onclick="saveItem()" style="margin-top:15px;">SPEICHERN</button>
            </div>
        </div>

        <div id="tab-log" class="content">
            <div class="glass"><h2>Verlauf</h2><div id="logList"></div></div>
        </div>
    </div>

    <nav id="mainNav">
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">Lager</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">Neu Einlagern</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-log')">Logbuch</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('lager_v32_final');

    let state = { user: localStorage.getItem('lagerUser') || null, items: [], logs: [], cats: ["Werkzeug", "Garten", "Elektro", "Bau", "Haushalt"] };
    let html5QrCode = null;

    function init() {
        updateUserUI();
        const sDrop = document.getElementById('itemCatSelect');
        sDrop.innerHTML = state.cats.map(c => `<option value="${c}">${c}</option>`).join('');
        dbRef.on('value', snap => { const d = snap.val(); if(d){ state.items = d.items||[]; state.logs = d.logs||[]; render(); }});
    }

    function askForName() {
        let n = prompt("Dein Name:");
        if (n) { state.user = n.trim(); localStorage.setItem('lagerUser', state.user); updateUserUI(); }
    }

    function updateUserUI() {
        document.getElementById('displayUser').innerText = state.user ? "👤 " + state.user : "👤 Gast";
        document.getElementById('loginSection').style.display = state.user ? 'none' : 'block';
    }

    function sync() { dbRef.set({ items: state.items, logs: state.logs, cats: state.cats }); }

    function changeQty(id, delta) {
        const i = state.items.find(x => x.id === id);
        i.qty = Math.max(0, parseInt(i.qty || 0) + delta);
        sync();
    }

    function deleteItem(id) {
        if(confirm("Diesen Artikel löschen?")) {
            const idx = state.items.findIndex(x => x.id === id);
            state.items.splice(idx, 1);
            sync();
        }
    }

    function toggleStatus(id) {
        const i = state.items.find(x => x.id === id);
        const isIn = i.status === "im Lager";
        i.status = isIn ? "unterwegs" : "im Lager";
        i.outUser = isIn ? state.user : "";
        state.logs.unshift({ time: new Date().toLocaleString(), user: state.user, item: i.name, action: isIn ? "Ausgelagert" : "Eingelagert" });
        sync();
    }

    function startScan(t) {
        const rDiv = document.getElementById('reader'); rDiv.style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, text => {
            if(t === 'search') { document.getElementById('searchInput').value = text; render(); }
            else { document.getElementById('itemBarcode').value = text; }
            html5QrCode.stop().then(() => { rDiv.style.display = 'none'; });
        });
    }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    function saveItem() {
        const n = document.getElementById('itemName').value;
        if(!n) return alert("Name fehlt!");
        const newItem = { id: Date.now(), name: n, barcode: document.getElementById('itemBarcode').value, qty: document.getElementById('itemQty').value, cat: document.getElementById('itemCatSelect').value, img: "", status: "im Lager" };
        const f = document.getElementById('itemImg').files[0];
        const proceed = (img) => { newItem.img = img; state.items.unshift(newItem); sync(); switchTab({currentTarget: document.querySelectorAll('.tab-btn')[0]}, 'tab-lager'); };
        if(f) { const r = new FileReader(); r.onload = (e) => proceed(e.target.result); r.readAsDataURL(f); } else proceed("");
    }

    function render() {
        const list = document.getElementById('itemList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        list.innerHTML = "";
        state.items.filter(i => i.name.toLowerCase().includes(search) || (i.barcode && i.barcode.includes(search))).forEach(i => {
            const isOut = i.status !== "im Lager";
            list.innerHTML += `
                <div class="glass">
                    <button class="btn-delete-fixed" onclick="deleteItem(${i.id})">🗑️</button>
                    <div class="card-top">
                        <img src="${i.img || 'https://via.placeholder.com/70'}" class="thumb">
                        <div class="info-box">
                            <b style="font-size:1.2rem; display:block; margin-bottom:4px;">${i.name}</b>
                            <small style="background:#e2e8f0; padding:2px 8px; border-radius:5px;">${i.cat}</small>
                            <div class="qty-row">
                                <button class="btn-qty" onclick="changeQty(${i.id}, -1)">–</button>
                                <span style="font-size:1.2rem; font-weight:bold; min-width:30px; text-align:center;">${i.qty}</span>
                                <button class="btn-qty" onclick="changeQty(${i.id}, 1)">+</button>
                            </div>
                            ${isOut ? `<div style="color:red; font-size:0.8rem; font-weight:bold; margin-top:8px;">AUSGELAGERT BEI: ${i.outUser}</div>` : ""}
                        </div>
                    </div>
                    <button class="btn-status-big" onclick="toggleStatus(${i.id})" 
                            style="background:${isOut ? 'var(--danger)' : 'var(--success)'}">
                        ${isOut ? 'JETZT EINLAGERN' : 'JETZT AUSLAGERN'}
                    </button>
                </div>`;
        });
        document.getElementById('logList').innerHTML = state.logs.slice(0,20).map(l => `<div style="font-size:0.7rem; border-bottom:1px solid #eee; padding:5px;"><b>${l.user}</b>: ${l.item} ${l.action}</div>`).join('');
    }
    init();
</script>
</body>
</html>
