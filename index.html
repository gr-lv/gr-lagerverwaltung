<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V62 - Scanner</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; --logout: #64748b; }
        
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; 
            background: url('haus_background.jpg') no-repeat center center fixed; 
            background-size: cover; height: 100vh; overflow: hidden;
        }

        .app-shell { height: 100vh; display: flex; flex-direction: column; background: rgba(15, 23, 42, 0.5); }
        .header { background: rgba(15, 23, 42, 0.95); color: white; padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); z-index: 2000; }
        .content-area { flex: 1; overflow-y: auto; padding: 15px 15px 100px 15px; -webkit-overflow-scrolling: touch; }

        .glass { 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 20px; margin-bottom: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); position: relative;
        }

        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f172a; display: flex; border-top: 2px solid var(--accent); z-index: 3000; }
        .tab-btn { flex: 1; padding: 18px 5px; border: none; background: none; color: #9ca3af; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; }
        .tab-btn.active { color: white; background: rgba(255,255,255,0.1); }

        .card { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .thumb { width: 70px; height: 70px; object-fit: cover; border-radius: 12px; background: white; }
        
        .btn-book { padding: 12px; border: none; border-radius: 10px; color: white; font-weight: bold; min-width: 100px; cursor: pointer; }
        
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        /* Scanner Styling */
        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-bottom: 10px; display: none; border: 2px solid var(--accent); }
        .scan-btn-small { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; width: 50px; }

        .content { display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="header">
        <h1 style="margin:0; font-size:1.2rem; color:var(--accent);">GR-LAGERVERWALTUNG</h1>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
            <span id="displayUser" style="font-size:0.85rem;">
