<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V116 - Mini-Menüs</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #06b6d4; --accent: #06b6d4; --danger: #ef4444; --success: #10b981; --dark: #0f172a; --bg-glass: rgba(255, 255, 255, 0.96); }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: -apple-system, sans-serif; overflow: hidden; background-color: #030712; }

        /* HINTERGRUND */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('haus_background.jpg') no-repeat center center;
            background-size: cover; z-index: -2;
        }

        .header { background: #030712; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); color: white; }
        .header h1 { margin: 0; font-size: 1.1rem; letter-spacing: 1px; font-weight: 900; text-transform: uppercase; }

        .content-area { flex: 1; height: calc(100vh - 140px); overflow-y: auto; padding: 15px; box-sizing: border-box; }

        /* KARTEN-STYLING */
        .item-card { 
            background: var(--bg-glass); border-radius: 12px; margin-bottom: 12px; padding: 10px; 
            color: #333; display: flex; align-items: center; justify-content: space-between; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); position: relative; border-left: 4px solid var(--accent);
        }
        .item-thumb { width: 65px; height: 65px; object-fit: cover; border-radius: 8px; border: 1px solid #eee; }

        /* INFORMATIONEN */
        .info-row { display: flex; font-size: 0.75rem; margin-bottom: 2px; align-items: center; }
        .info-label { width: 45px; font-weight: bold; color: #64748b; text-transform: uppercase; font-size: 0.6rem; }
        .info-value { color: #1e293b; font-weight: 600; }

        /* --- DIE KLEINEN DROPDOWN MENÜS --- */
        .qty-select-mini { 
            width: 48px !important;    /* Sehr schmal */
            height: 18px !important;   /* Extrem flach */
            padding: 0 2px !important; 
            font-size: 0.7rem !important; 
            font-weight: 800; 
            border-radius: 3px; 
            border: 1px solid var(--accent); 
            background: #fff;
            color: #000;
            line-height: 1;
            cursor: pointer;
            -webkit-appearance: none;  /* Entfernt Browser-Standard-Styling */
            appearance: none;
            text-align: center;
        }

        /* NAVIGATION & BUTTONS */
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #030712; display: flex; height: 70px; border-top: 2px solid var(--accent); }
        .tab-btn { flex: 1; border: none; background: none; color: #94a3b8; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; }
        .tab-btn.active { color: white; background: rgba(6, 182, 212, 0.15); border-top: 4px solid var(--accent); }
        
        .content { display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>

<div style="display:flex; flex-direction:column; height:100vh;">
    <div class="bg-layer"></div>

    <div class="header">
        <div id="userDisplay" style="font-size:0.7rem; color:var(--accent); font-weight:bold;">David</div>
        <h1>GR-LAGERVERWALTUNG</h1>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content active">
            <div id="itemList"></div>
        </div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')"><span>📦</span>Lager</button>
        <button class="tab-btn"><span>➕</span>Neu</button>
        <button class="tab-btn"><span>📜</span>Logbuch</button>
    </nav>
</div>

<script>
    // Hier nur die Render-Logik zur Veranschaulichung der Menüs
    const mockItems = [
        { key: "1", name: "Schere", location: "Büro", regal: "R1", fach: "F2", qty: 12, img: "" },
        { key: "2", name: "Kreide", location: "Lager", regal: "R4", fach: "F1", qty: 2, img: "" }
    ];

    function render() {
        const list = document.getElementById('itemList');
        list.innerHTML = mockItems.map(i => `
            <div class="item-card">
                <div style="display:flex; align-items:center; gap:12px; flex:1;">
                    <img src="https://via.placeholder.com/65" class="item-thumb">
                    <div style="flex:1;">
                        <div style="font-weight:900; font-size:1rem; color:#000; margin-bottom:4px;">${i.name}</div>
                        <div class="info-row"><span class="info-label">Ort</span><span class="info-value">🏠 ${i.location}</span></div>
                        <div class="info-row">
                            <span class="info-label">Stk.</span>
                            <select class="qty-select-mini">
                                ${[...Array(20).keys()].map(n => `<option ${i.qty==n+1?'selected':''}>${n+1}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                </div>
                <button style="background:var(--success); color:white; border:none; padding:8px; border-radius:8px; font-weight:bold; min-width:60px; font-size:0.7rem;">AUS</button>
            </div>
        `).join('');
    }

    function switchTab(e, id) { render(); } // Nur Demo
    window.onload = render;
</script>
</body>
</html>
