<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V85</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background: #0f172a; color: white; overflow: hidden; }

        /* LOGIN SCREEN */
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #0f172a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; width: 80%; max-width: 320px; text-align: center; border: 1px solid var(--accent); }

        /* APP STRUKTUR */
        #mainApp { display: none; height: 100vh; flex-direction: column; position: relative; z-index: 10; }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e293b url('haus_background.jpg') no-repeat center center; background-size: cover; z-index: -2; }
        .dark-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.75); z-index: -1; }

        .header { background: #0f172a; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .header-left { display: flex; flex-direction: column; }
        .header-left h1 { margin: 0; font-size: 0.9rem; letter-spacing: 1px; color: var(--accent); }
        .header-left span { font-size: 0.75rem; color: white; font-weight: bold; }

        .logout-btn { background: #334155; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; }

        .content-area { flex: 1; overflow-y: auto; padding: 15px 15px 110px 15px; -webkit-overflow-scrolling: touch; }
        
        /* KARTEN */
        .item-card { background: white; border-radius: 15px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.5); color: #333; position: relative; }
        .delete-mini { position: absolute; top: 10px; right: 10px; background: var(--danger); color: white; border: none; width: 25px; height: 25px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; }

        .btn-status { display: block; width: 100%; padding: 18px; border: none; color: white; font-weight: bold; font-size: 1rem; cursor: pointer; }
        
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f172a; display: flex; height: 70px; border-top: 2px solid var(--accent); z-index: 100; }
        .tab-btn { flex: 1; border: none; background: none; color: #9ca3af; font-weight: bold; font-size: 0.8rem; }
        .tab-btn.active { color: white; border-top: 4px solid var(--accent); background: rgba(255,255,255,0.05); }

        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        
        /* KATEGORIE LISTE LÖSCHEN */
        .cat-item { display: flex; justify-content: space-between; align-items: center; background: #f1f5f9; padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; font-size: 0.9rem; }
        .cat-del { color: var(--danger); font-weight: bold; cursor: pointer; padding: 5px; }

        .content { display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--accent); margin-top:0;">GR-Lager</h2>
        <input type="text" id="loginUser" placeholder="Dein Name">
        <input type="password" id="loginPass" placeholder="Passwort">
        <button onclick="handleLogin()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; margin-top:10px; cursor:pointer;">ANMELDEN</button>
        <p id="loginErr" style="color:#ff8888; font-size:0.8rem; margin-top:10px; display:none;">Login fehlgeschlagen!</p>
    </div>
</div>

<div id="mainApp">
    <div class="bg-layer"></div>
    <div class="dark-overlay"></div>
    
    <div class="header">
        <div class="header-left">
            <h1>GR-LAGERVERWALTUNG</h1>
            <span id="userDisplay">Hallo, Gast</span>
        </div>
        <button class="logout-btn" onclick="logout()">Benutzer wechseln</button>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content active">
            <div style="background:rgba(255,255,255,0.95); padding:10px; border-radius:12px; margin-bottom:15px;">
                <input type="text" id="searchInput" placeholder="Suchen..." onkeyup="render()">
                <select id="filterCatSelect" onchange="render()" style="margin-top:5px;"></select>
            </div>
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div class="item-card" style="padding:20px;">
                <h3 style="margin-top:0">Neuer Artikel</h3>
                <input type="text" id="itemName" placeholder="Bezeichnung">
                <select id="itemCatSelect"></select>
                <input type="file" id="itemImg" accept="image/*" capture="environment">
                <button onclick="saveItem()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; margin-top:10px;">SPEICHERN</button>
            </div>

            <div class="item-card" style="padding:20px;">
                <h3 style="margin-top:0">Kategorien verwalten</h3>
                <div id="categoryListManage" style="margin-bottom:10px;"></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="newCatInput" placeholder="Neue Kat..." style="flex:1;">
                    <button onclick="addCategory()" style="background:var(--success); color:white; border:none; border-radius:10px; padding:0 15px;">+</button>
                </div>
            </div>
        </div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">LAGER</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">EINSTELLUNGEN</button>
    </nav>
</div>
