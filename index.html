<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V123</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --accent: #06b6d4; 
            --danger: #ef4444; 
            --success: #10b981; 
            --dark-bg: #030712; 
            --glass: rgba(255, 255, 255, 0.95); 
        }
        
        body, html { margin: 0; padding: 0; height: 100vh; width: 100%; font-family: -apple-system, sans-serif; background-color: #000; color: white; overflow: hidden; }

        .global-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('haus_background.jpg') no-repeat center center;
            background-size: cover; z-index: 1;
        }

        #ui-wrapper { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; }

        /* LOGIN SCREEN */
        #loginScreen { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background: #000; }
        .login-card { background: #1e293b; padding: 30px; border-radius: 20px; text-align: center; border: 2px solid var(--accent); width: 280px; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; outline: none; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; background: var(--accent); color: white; cursor: pointer; }

        /* HEADER */
        .header { background: #000; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .header h1 { margin: 0; font-size: 1.2rem; font-weight: 900; text-transform: uppercase; color: white; letter-spacing: 2px; }

        .content-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }

        /* ITEM CARDS */
        .item-card { background: var(--glass); border-radius: 12px; margin-bottom: 10px; padding: 12px; color: #000; display: flex; align-items: center; gap: 12px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .item-thumb { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; border: 1px solid #ccc; }
        .item-info { flex: 1; }
        .item-name { font-weight: 900; font-size: 1.1rem; margin-bottom: 4px; }
        .info-line { font-size: 0.7rem; display: flex; align-items: center; gap: 5px; color: #444; margin-bottom: 2px; }
        .info-line b { text-transform: uppercase; width: 40px; color: #000; }

        /* QTY DROPDOWN */
        .qty-select { width: 100%; height: 24px; margin-top: 5px; border-radius: 4px; border: 1px solid var(--accent); font-weight: bold; }

        /* BUTTONS */
        .action-btn { padding: 10px 15px; border-radius: 8px; border: none; font-weight: bold; color: white; cursor: pointer; min-width: 70px; }
        .btn-ein { background: var(--danger); }
        .btn-aus { background: var(--success); }

        /* FORMULAR SEITE (NEU) */
        .form-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; color: #000; }
        .form-row { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; }
        .form-label { width: 90px; font-size: 0.75rem; font-weight: bold; color: #666; text-transform: uppercase; }
        .form-input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 0.9rem; }
        
        .cam-box { border: 2px dashed var(--accent); border-radius: 10px; padding: 15px; text-align: center; margin: 15px 0; cursor: pointer; background: #f8fafc; color: #1e293b; font-weight: bold; font-size: 0.8rem; }
        .btn-save-large { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; font-size: 1rem; cursor: pointer; }

        /* ADMIN LISTEN SECTION */
        .admin-section { background: #000; border: 1px solid #1e293b; border-radius: 12px; padding: 15px; margin-top: 20px; }
        .admin-title { color: var(--accent); font-weight: bold; font-size: 0.9rem; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .admin-row { display: flex; align-items: center; margin-bottom: 8px; gap: 10px; }
        .admin-label { width: 60px; font-size: 0.7rem; color: #94a3b8; font-weight: bold; }
        .admin-input { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #334155; background: #fff; color: #000; }
        .btn-add-small { background: var(--accent); border: none; color: white; width: 30px; height: 30px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* NAVIGATION */
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #030712; display: flex; height: 75px; border-top: 2px solid var(--accent); z-index: 100; }
        .tab-btn { flex: 1; border: none; background: none; color: #94a3b8; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; gap: 5px; }
        .tab-btn.active { color: white; background: rgba(6, 182, 212, 0.2); border-top: 4px solid var(--accent); }
        .tab-btn img { width: 20px; height: 20px; filter: grayscale(1); }
        .tab-btn.active img { filter: none; }

        .content { display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>

<div class="global-bg"></div>

<div id="loginScreen">
    <div class="login-card">
        <h2 style="color:var(--accent); margin-bottom:20px; font-weight: 900;">LOGIN</h2>
        <input type="text" id="loginName" class="login-input" placeholder="Name">
        <input type="password" id="loginPass" class="login-input" placeholder="Passwort (1234)">
        <button class="login-btn" onclick="checkLogin()">STARTEN</button>
    </div>
</div>

<div id="ui-wrapper" style="display:none;">
    <div class="header">
        <div id="userDisplay" style="font-size:0.7rem; color:var(--accent); font-weight:bold; width:60px;"></div>
        <h1>GR-LAGERVERWALTUNG</h1>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--accent); font-size:1.3rem; cursor:pointer;">🚪</button>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content active">
            <div style="background:white; padding:8px; border-radius:10px; margin-bottom:15px; border:2px solid var(--accent); display:flex; align-items:center; gap:10px;">
                <span style="color:#666;">🔍</span>
                <input type="text" id="searchInput" placeholder="Suchen..." onkeyup="render()" style="width:100%; border:none; outline:none; font-size:1rem;">
            </div>
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div class="form-card">
                <div class="form-row"><span class="form-label">Name</span><input type="text" id="itemName" class="form-input" placeholder="Artikelbezeichnung..."></div>
                <div class="form-row"><span class="form-label">Lager</span><select id="itemLagerSelect" class="form-input"></select></div>
                <div class="form-row"><span class="form-label">Kategorie</span><select id="itemCatSelect" class="form-input"></select></div>
                <div class="form-row"><span class="form-label">Regal</span><select id="itemRegalSelect" class="form-input"></select></div>
                <div class="form-row"><span class="form-label">Fach</span><select id="itemFachSelect" class="form-input"></select></div>
                
                <div class="cam-box" onclick="document.getElementById('itemImg').click()">
                    <span id="camText">📷 BILD HINZUFÜGEN</span>
                    <img id="imagePreview" src="" style="width:100%; height:100px; object-fit:contain; display:none; margin-top:5px;">
                </div>
                <input type="file" id="itemImg" accept="image/*" style="display:none;" onchange="previewImage(this)">
                
                <button onclick="saveItem()" class="btn-save-large">SPEICHERN</button>
            </div>

            <div class="admin-section">
                <div class="admin-title">▼ ⚙️ LISTEN BEARBEITEN</div>
                <div class="admin-row"><span class="admin-label">LAGER</span><input type="text" id="addLager" class="admin-input"><button class="btn-add-small" onclick="addToList('locations', 'addLager')">+</button></div>
                <div class="admin-row"><span class="admin-label">KAT</span><input type="text" id="addCat" class="admin-input"><button class="btn-add-small" onclick="addToList('cats', 'addCat')">+</button></div>
                <div class="admin-row"><span class="admin-label">REGAL</span><input type="text" id="addRegal" class="admin-input"><button class="btn-add-small" onclick="addToList('regale', 'addRegal')">+</button></div>
                <div class="admin-row"><span class="admin-label">FACH</span><input type="text" id="addFach" class="admin-input"><button class="btn-add-small" onclick="addToList('faecher', 'addFach')">+</button></div>
            </div>
        </div>

        <div id="tab-log" class="content">
            <div id="logList"></div>
        </div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">📦<br>LAGER</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">➕<br>NEU</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-log')">📜<br>LOGBUCH</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const mainRef = db.ref('lager_v90_multilager');
    let state = { user: "", items: [], logs: [], cats: [], locations: [], regale: [], faecher: [] };

    function checkLogin() {
        const name = document.getElementById('loginName').value.trim();
        const pass = document.getElementById('loginPass').value.trim();
        if(name && pass === "1234") {
            state.user = name;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('ui-wrapper').style.display = 'flex';
            document.getElementById('userDisplay').innerText = name.toUpperCase();
            initApp();
        } else { alert("Login fehlgeschlagen!"); }
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('imagePreview').style.display = 'block';
                document.getElementById('camText').style.display = 'none';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function initApp() {
        mainRef.on('value', snap => {
            const data = snap.val() || {};
            state.items = Object.keys(data.items || {}).map(key => ({...data.items[key], key: key}));
            state.logs = Object.values(data.logs || {}).sort((a,b) => b.ts - a.ts);
            state.locations = data.locations || ["Lager"];
            state.cats = data.cats || ["Allgemein"];
            state.regale = data.regale || ["-"];
            state.faecher = data.faecher || ["-"];
            
            updateSelects();
            render();
            renderLogs();
        });
    }

    function updateSelects() {
        document.getElementById('itemLagerSelect').innerHTML = state.locations.map(v => `<option value="${v}">${v}</option>`).join('');
        document.getElementById('itemCatSelect').innerHTML = state.cats.map(v => `<option value="${v}">${v}</option>`).join('');
        document.getElementById('itemRegalSelect').innerHTML = state.regale.map(v => `<option value="${v}">${v}</option>`).join('');
        document.getElementById('itemFachSelect').innerHTML = state.faecher.map(v => `<option value="${v}">${v}</option>`).join('');
    }

    function render() {
        const list = document.getElementById('itemList');
        const s = document.getElementById('searchInput').value.toLowerCase();
        list.innerHTML = state.items.filter(i => i.name.toLowerCase().includes(s)).sort((a,b) => b.ts - a.ts).map(i => {
            const isOut = i.status !== "im Lager";
            return `
            <div class="item-card">
                <img src="${i.img || 'https://via.placeholder.com/80'}" class="item-thumb">
                <div class="item-info">
                    <div class="item-name">${i.name}</div>
                    <div class="info-line"><b>ORT</b> 🏠 ${i.location || '-'}</div>
                    <div class="info-line"><b>PLATZ</b> 📍 ${i.regal || '-'} / ${i.fach || '-'}</div>
                    <div class="info-line"><b>STK.</b>
                        <select class="qty-select" onchange="changeQty('${i.key}', this)">
                            ${Array.from({length:50}, (_,n)=>`<option value="${n+1}" ${i.qty==n+1?'selected':''}>${n+1}</option>`).join('')}
                        </select>
                    </div>
                    ${isOut ? `<div style="color:var(--danger); font-size:0.65rem; font-weight:bold; margin-top:5px;">🚩 BEI: ${i.outUser}</div>` : ''}
                </div>
                <button onclick="toggleItem('${i.key}')" class="action-btn ${isOut?'btn-ein':'btn-aus'}">${isOut?'EIN':'AUS'}</button>
            </div>`;
        }).join('');
    }

    function renderLogs() {
        document.getElementById('logList').innerHTML = state.logs.slice(0, 30).map(l => `<div class="log-entry" style="color:white; font-size:0.8rem; margin-bottom:10px; border-bottom:1px solid #333; padding-bottom:5px;"><b>${l.user}</b> (${l.date}): ${l.text}</div>`).join('');
    }

    function saveItem() {
        const n = document.getElementById('itemName').value;
        if(!n) return;
        const newItem = { 
            name: n, location: document.getElementById('itemLagerSelect').value, 
            regal: document.getElementById('itemRegalSelect').value, fach: document.getElementById('itemFachSelect').value,
            cat: document.getElementById('itemCatSelect').value,
            qty: 1, status: "im Lager", img: document.getElementById('imagePreview').src || "", ts: Date.now() 
        };
        mainRef.child('items').push(newItem);
        mainRef.child('logs').push({ date: new Date().toLocaleString('de-DE'), user: state.user, text: `NEU: ${n}`, ts: Date.now() });
        switchTab({currentTarget: document.querySelectorAll('.tab-btn')[0]}, 'tab-lager');
    }

    function toggleItem(key) {
        const i = state.items.find(x => x.key === key);
        const isIn = i.status === "im Lager";
        mainRef.child('items/'+key).update({ status: isIn ? "ausgeliehen" : "im Lager", outUser: isIn ? state.user : "" });
        mainRef.child('logs').push({ date: new Date().toLocaleString('de-DE'), user: state.user, text: isIn ? `AUS: ${i.name}` : `EIN: ${i.name}`, ts: Date.now() });
    }

    function addToList(path, inputId) {
        const val = document.getElementById(inputId).value;
        if(!val) return;
        const newList = [...(state[path] || []), val];
        mainRef.child(path).set(newList);
        document.getElementById(inputId).value = "";
    }

    function changeQty(key, el) { mainRef.child('items/'+key).update({qty: parseInt(el.value)}); }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
