<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V75</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; }
        
        /* FIX: Das Bild wird hier als fester Hintergrund definiert */
        body { 
            margin: 0; padding: 0; font-family: sans-serif; 
            background: #1e293b url('haus_background.jpg') no-repeat center center fixed; 
            background-size: cover;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Dunkle Ebene über dem Bild für bessere Lesbarkeit */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6);
            z-index: 0;
        }

        .app-shell { 
            position: relative; z-index: 10; 
            height: 100vh; display: flex; flex-direction: column; 
        }

        .header { background: #0f172a; color: white; padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); }
        
        .content-area { 
            flex: 1; overflow-y: auto; padding: 15px; 
            padding-bottom: 100px; /* Platz für die Navigation */
            -webkit-overflow-scrolling: touch;
        }

        .item-card { 
            background: white; border-radius: 15px; margin-bottom: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); overflow: hidden;
        }

        .card-inner { padding: 15px; display: flex; gap: 15px; align-items: center; }
        .thumb { width: 70px; height: 70px; object-fit: cover; border-radius: 10px; background: #eee; }

        .btn-status-trigger {
            display: block; width: 100%; padding: 20px; border: none;
            color: white; font-weight: bold; font-size: 1.1rem;
            cursor: pointer; text-transform: uppercase;
        }

        .delete-btn { background: #fee2e2; color: #cc0000; border: none; padding: 5px 10px; border-radius: 5px; float: right; font-size: 0.7rem; }

        nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #0f172a; display: flex; height: 70px; 
            border-top: 2px solid var(--accent); z-index: 100;
        }
        .tab-btn { flex: 1; border: none; background: none; color: #9ca3af; font-weight: bold; }
        .tab-btn.active { color: white; background: rgba(255,255,255,0.1); }

        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .content { display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="app-shell">
    <div class="header"><h1 style="margin:0; font-size:1rem;">GR-LAGER V75</h1></div>

    <div class="content-area">
        <div id="tab-lager
