<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GR-Lager V163.34</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --accent: #06b6d4; --danger: #ef4444; --success: #10b981; }
        .global-bg { position: fixed; inset: 0; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)), url('haus_background.jpg') no-repeat center center; background-size: cover; z-index: 1; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100%; font-family: sans-serif; background-color: #000; color: white; overflow: hidden; }
        
        #ui-wrapper { position: relative; z-index: 10; height: 100vh; display: none; flex-direction: column; background: transparent; }

        /* Header Fix für iOS */
        .header { 
            background: rgba(0,0,0,0.9); 
            padding: calc(25px + env(safe-area-inset-top)) 15px 15px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--accent); 
        }
        
        .content-area { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: calc(100px + env(safe-area-inset-bottom)); background: rgba(0,0,0,0.3); }
        
        .item-card { background: rgba(255,255,255,0.95); border-radius: 12px; margin-bottom: 12px; padding: 10px; color: #000; display: flex; gap: 10px; border-left: 6px solid var(--accent); align-items: center; }
        .item-card.status-out { border-left-color: var(--danger); background: #fff1f1; }
        .item-thumb { width: 65px; height: 65px; object-fit: cover; border-radius: 8px; background: #eee; flex-shrink: 0; }
        .item-info { flex: 1; min-width: 0; }
        .item-name { font-weight: 900; font-size: 0.85rem; color: #1e293b; }
        
        .qr-side { width: 55px; height: 55px; background: white; padding: 3px; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
        
        /* Buttons untereinander */
        .action-btns { display: flex; flex-direction: column; gap: 8px; align-items: center; border-left: 1px solid #ddd; padding-left: 10px; min-width: 55px; }
        .btn-status { border: none; padding: 8px 2px; border-radius: 6px; color: white; font-weight: bold; width: 50px; font-size: 0.7rem; }
        
        .form-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; margin-bottom: 10px; box-sizing: border-box; }
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(3, 7, 18, 0.95); display: flex; height: calc(70px + env(safe-area-inset-bottom)); border-top: 2px solid var(--accent); z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .tab-btn { flex: 1; border: none; background: none; color: #94a3b8; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; }
        .tab-btn.active { color: white; background: rgba(6, 182, 212, 0.2); border-top: 4px solid var(--accent); }
        
        #photo-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        /* Das Vorschaubild bekommt das 80x29 Format */
        #generated-label { width: 95%; max-width: 600px; border: 2px solid white; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        #scanner-container { display: none; position: fixed; inset: 0; background: #000; z-index: 6000; flex-direction: column; }
    </style>
</head>
<body>

<div class="global-bg"></div>

<div id="loginScreen" style="position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div style="background:rgba(30, 41, 59, 0.95); padding:30px; border-radius:20px; border:2px solid var(--accent); text-align:center; width: 85%; max-width: 320px;">
        <h2 style="color:var(--accent);">GR-LAGER</h2>
        <input type="text" id="loginName" class="form-input" placeholder="Name">
        <input type="password" id="loginPass" class="form-input" placeholder="Passwort">
        <button onclick="checkLogin()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:bold;">START</button>
    </div>
</div>

<div id="ui-wrapper">
    <div class="header">
        <button onclick="startScanner()" style="background:none; border:none; font-size:1.5rem;">📷</button>
        <h2 id="verLabel" style="margin:0; font-size:0.9rem;">GR-LAGER V163.34</h2>
        <div id="displayUserName" style="font-size:0.75rem; color:var(--accent); font-weight: bold;"></div>
    </div>
    <div class="content-area">
        <div id="tab-lager" class="content">
            <input type="text" id="searchInput" placeholder="Suche..." onkeyup="render()" class="form-input">
            <select id="filterCategory" class="form-input" onchange="render()"></select>
            <div id="itemList"></div>
        </div>
        <div id="tab-neu" class="content" style="display:none;">
            <div style="background:rgba(255,255,255,0.95); padding:15px; border-radius:15px; color:#000;">
                <h4>Neuer Artikel</h4>
                <input type="text" id="itemName" class="form-input" placeholder="Artikel Name">
                <input type="number" id="itemQty" class="form-input" value="1">
                <select id="itemLagerSelect" class="form-input"></select>
                <select id="itemCatSelect" class="form-input"></select>
                <div style="display:flex; gap:5px;"><select id="itemRegalSelect" class="form-input" style="flex:1;"></select><select id="itemFachSelect" class="form-input" style="flex:1;"></select></div>
                <button onclick="document.getElementById('itemImgInput').click()" class="form-input">📷 FOTO</button>
                <input type="file" id="itemImgInput" accept="image/*" capture="environment" style="display:none;" onchange="previewImage(this)">
                <img id="imagePreview" style="width:100%; height:120px; object-fit:contain; display:none; margin-bottom:10px;">
                <button onclick="saveNewItem(true)" style="width:100%; padding:15px; background:#000; color:white; border-radius:10px; font-weight:bold;">💾 SPEICHERN & DRUCKEN</button>
            </div>
        </div>
        <div id="tab-log" class="content" style="display:none;"><div id="logList"></div></div>
    </div>
    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">📦 LAGER</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">⚙️ ADMIN</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-log')">📜 LOGS</button>
    </nav>
</div>

<div id="photo-overlay">
    <button onclick="closePhotoOverlay()" style="position:fixed; top:40px; right:20px; background:var(--danger); color:white; padding:15px; border-radius:10px; border:none; z-index:10001;">X</button>
    <img id="generated-label" src="">
    <p style="color:white; margin-top:10px;">Etikett: 80mm x 29mm</p>
</div>

<div id="scanner-container">
    <div id="qr-reader" style="width: 100%;"></div>
    <button onclick="stopScanner()" style="margin:20px; padding:15px; background:var(--danger); color:white; border-radius:10px;">ABBRECHEN</button>
</div>

<script>
    const APP_VERSION = 163.34;
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const mainRef = db.ref('lager_v90_multilager');
    let state = { user: "", items: [], config: {} };

    // --- DRUCK FUNKTION MIT FESTEN 80mm (Maßstab 2.75 : 1) ---
    function printLabel(key, meta, name) {
        // 945 Pixel Breite bei 300dpi entsprechen ca. 80mm
        // 342 Pixel Höhe bei 300dpi entsprechen ca. 29mm
        const w = 945, h = 342; 
        const canvas = document.createElement('canvas'); 
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d'); 
        const qrImg = new Image(); 
        qrImg.crossOrigin = "anonymous";
        qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${key}`;
        
        qrImg.onload = function() {
            ctx.fillStyle = "white"; ctx.fillRect(0, 0, w, h); 
            ctx.drawImage(qrImg, 20, 20, 300, 300); // QR Quadratisch links
            
            ctx.fillStyle = "black"; ctx.textAlign = "left"; 
            ctx.font = "900 45px Arial";
            ctx.fillText(meta || '-', 340, 80); 
            
            ctx.fillRect(340, 100, 580, 6); // Trennlinie
            
            let fontSize = 85; 
            ctx.font = `900 ${fontSize}px Arial`;
            const maxTextWidth = 580; 
            while(ctx.measureText(name).width > maxTextWidth && fontSize > 35) { 
                fontSize -= 5; ctx.font = `900 ${fontSize}px Arial`; 
            }
            ctx.fillText(name, 340, 210); 

            document.getElementById('generated-label').src = canvas.toDataURL("image/png");
            document.getElementById('photo-overlay').style.display = 'flex';
        };
    }

    // --- STANDARD FUNKTIONEN ---
    function checkVersion(v) { if (v && v > APP_VERSION) location.reload(true); else if(!v) mainRef.child('version').set(APP_VERSION); }
    function closePhotoOverlay() { document.getElementById('photo-overlay').style.display = 'none'; }
    function checkLogin() {
        const u = document.getElementById('loginName').value;
        if(u && document.getElementById('loginPass').value === "1234") { 
            state.user = u.toUpperCase(); 
            document.getElementById('displayUserName').innerText = state.user; 
            document.getElementById('loginScreen').style.display = 'none'; 
            document.getElementById('ui-wrapper').style.display = 'flex'; 
            initApp(); 
        }
    }
    function initApp() {
        mainRef.on('value', snap => {
            state.config = snap.val() || {};
            checkVersion(state.config.version);
            state.items = Object.keys(state.config.items || {}).map(k => ({...state.config.items[k], key: k}));
            render(); renderLogs();
            const fill = (id, list) => { if(document.getElementById(id)) document.getElementById(id).innerHTML = (id.includes('filter') ? '<option value="">Alle</option>' : '') + (list||[]).map(v=>`<option value="${v}">${v}</option>`).join(''); };
            fill('itemLagerSelect', state.config.locations); fill('itemCatSelect', state.config.cats); fill('filterCategory', state.config.cats);
            fill('itemRegalSelect', state.config.regale); fill('itemFachSelect', state.config.faecher);
        });
    }
    function render() {
        const s = document.getElementById('searchInput').value.toLowerCase();
        const f = document.getElementById('filterCategory').value;
        document.getElementById('itemList').innerHTML = state.items
            .filter(i => i.name.toLowerCase().includes(s) && (f === "" || i.cat === f))
            .sort((a,b) => b.ts - a.ts)
            .map(i => {
                const meta = `${i.location||''} R:${i.regal||'-'} F:${i.fach||'-'}`;
                return `<div class="item-card ${i.status !== 'im Lager' ? 'status-out' : ''}">
                    <img src="${i.img || 'https://via.placeholder.com/70'}" class="item-thumb">
                    <div class="item-info"><div class="item-name">${i.name} (${i.qty}x)</div><div style="font-size:0.6rem; color:#666;">${meta}</div></div>
                    <div class="qr-side" onclick="printLabel('${i.key}', '${meta}', '${i.name}')"><img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${i.key}" style="width:100%;"></div>
                    <div class="action-btns">
                        <button onclick="toggleStatus('${i.key}', '${i.name}', '${i.status}')" class="btn-status ${i.status === 'im Lager'?'btn-in':'btn-out'}" style="background:${i.status === 'im Lager'?'#10b981':'#ef4444'}; color:white;">${i.status === 'im Lager'?'EIN':'AUS'}</button>
                        <div style="display:flex; flex-direction:column; gap:8px; font-size:1.2rem; margin-top:5px;">
                            <span onclick="deleteItem('${i.key}', '${i.name}')" style="color:var(--danger);">🗑️</span>
                        </div>
                    </div></div>`;
            }).join('');
    }
    function toggleStatus(key, name, oldS) {
        const newS = oldS === "im Lager" ? "ausgeliehen" : "im Lager";
        mainRef.child('items/'+key).update({status: newS, lastUser: state.user});
        mainRef.child('logs').push({ user: state.user, text: `${name} -> ${newS}`, ts: Date.now() });
    }
    function saveNewItem(p) {
        const n = document.getElementById('itemName').value; if(!n) return;
        const newRef = mainRef.child('items').push();
        const d = { name: n, qty: document.getElementById('itemQty').value, location: document.getElementById('itemLagerSelect').value, cat: document.getElementById('itemCatSelect').value, regal: document.getElementById('itemRegalSelect').value, fach: document.getElementById('itemFachSelect').value, img: document.getElementById('imagePreview').src || "", status: "im Lager", ts: Date.now(), lastUser: state.user };
        newRef.set(d).then(() => { if(p) printLabel(newRef.key, `${d.location} R:${d.regal}`, d.name); document.getElementById('itemName').value = ''; switchTab(null, 'tab-lager'); });
    }
    function deleteItem(k, n) { if(confirm(`${n} löschen?`)) mainRef.child('items/'+k).remove(); }
    function renderLogs() { const logs = Object.values(state.config.logs || {}).sort((a,b) => b.ts - a.ts).slice(0,30); document.getElementById('logList').innerHTML = logs.map(l => `<div style="padding:10px; border-bottom:1px solid #444; font-size:0.7rem;"><b>${l.user}</b>: ${l.text}</div>`).join(''); }
    function switchTab(e, id) { document.querySelectorAll('.content').forEach(c => c.style.display = 'none'); document.getElementById(id).style.display = 'block'; if(e) { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); e.currentTarget.classList.add('active'); } }
    function previewImage(i) { if (i.files && i.files[0]) { const r = new FileReader(); r.onload = e => { document.getElementById('imagePreview').src = e.target.result; document.getElementById('imagePreview').style.display='block'; }; r.readAsDataURL(i.files[0]); } }
    let scanner = null;
    function startScanner() { document.getElementById('scanner-container').style.display = 'flex'; scanner = new Html5Qrcode("qr-reader"); scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => { const item = state.items.find(x => x.key === txt); if(item) { toggleStatus(item.key, item.name, item.status); stopScanner(); } }); }
    function stopScanner() { if(scanner) scanner.stop().then(() => { document.getElementById('scanner-container').style.display = 'none'; }); }
</script>
</body>
</html>
