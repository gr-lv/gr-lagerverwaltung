<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V86</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background: #0f172a; color: white; overflow: hidden; }

        /* LOGIN SCREEN - ABSOLUTE PRIORITÄT */
        #login-screen { 
            position: fixed; top:0; left:0; width:100vw; height:100vh; 
            background: #0f172a; z-index: 10001; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .login-card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; width: 80%; max-width: 320px; text-align: center; border: 1px solid var(--accent); }

        /* APP STRUKTUR */
        #mainApp { display: none; height: 100vh; flex-direction: column; position: relative; z-index: 10; }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e293b url('haus_background.jpg') no-repeat center center; background-size: cover; z-index: -2; }
        .dark-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.75); z-index: -1; }

        .header { background: #0f172a; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .header-left { display: flex; flex-direction: column; }
        .header-left h1 { margin: 0; font-size: 0.9rem; letter-spacing: 1px; color: var(--accent); }
        .header-left span { font-size: 0.75rem; color: white; font-weight: bold; }

        .logout-btn { background: #334155; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; }

        .content-area { flex: 1; overflow-y: auto; padding: 15px 15px 110px 15px; -webkit-overflow-scrolling: touch; }
        
        .item-card { background: white; border-radius: 15px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.5); color: #333; position: relative; }
        .delete-mini { position: absolute; top: 10px; right: 10px; background: var(--danger); color: white; border: none; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 1rem; }

        .btn-status { display: block; width: 100%; padding: 18px; border: none; color: white; font-weight: bold; font-size: 1rem; cursor: pointer; }
        
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f172a; display: flex; height: 70px; border-top: 2px solid var(--accent); z-index: 100; }
        .tab-btn { flex: 1; border: none; background: none; color: #9ca3af; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; }
        .tab-btn.active { color: white; border-top: 4px solid var(--accent); background: rgba(255,255,255,0.05); }

        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        
        .cat-item { display: flex; justify-content: space-between; align-items: center; background: #f1f5f9; padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; font-size: 0.9rem; }
        .cat-del { color: var(--danger); font-weight: bold; cursor: pointer; }

        .content { display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--accent); margin-top:0;">GR-Lager</h2>
        <input type="text" id="loginUser" placeholder="Dein Name">
        <input type="password" id="loginPass" placeholder="Passwort (1234)">
        <button onclick="handleLogin()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; margin-top:10px; cursor:pointer;">ANMELDEN</button>
        <p id="loginErr" style="color:#ff8888; font-size:0.8rem; margin-top:10px; display:none;">Login fehlgeschlagen!</p>
    </div>
</div>

<div id="mainApp">
    <div class="bg-layer"></div>
    <div class="dark-overlay"></div>
    
    <div class="header">
        <div class="header-left">
            <h1>GR-LAGERVERWALTUNG</h1>
            <span id="userDisplay">Hallo...</span>
        </div>
        <button class="logout-btn" onclick="logout()">Abmelden</button>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content active">
            <div style="background:rgba(255,255,255,0.95); padding:10px; border-radius:12px; margin-bottom:15px;">
                <input type="text" id="searchInput" placeholder="Suchen..." onkeyup="render()">
                <select id="filterCatSelect" onchange="render()" style="margin-top:5px;"></select>
            </div>
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div class="item-card" style="padding:20px;">
                <h3 style="margin-top:0">Neuen Artikel anlegen</h3>
                <input type="text" id="itemName" placeholder="Was ist es?">
                <select id="itemCatSelect"></select>
                <input type="file" id="itemImg" accept="image/*" capture="environment">
                <button onclick="saveItem()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; margin-top:10px;">IN DAS LAGER AUFNEHMEN</button>
            </div>

            <div class="item-card" style="padding:20px;">
                <h3 style="margin-top:0">Kategorien bearbeiten</h3>
                <div id="categoryListManage" style="margin-bottom:10px;"></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="newCatInput" placeholder="Neue..." style="flex:1;">
                    <button onclick="addCategory()" style="background:var(--success); color:white; border:none; border-radius:10px; padding:0 15px; font-weight:bold;">+</button>
                </div>
            </div>
        </div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">Lagerliste</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">Neu Anlegen</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('lager_v32_final');

    let state = { user: null, items: [], cats: [] };

    function handleLogin() {
        const u = document.getElementById('loginUser').value.trim();
        const p = document.getElementById('loginPass').value;
        if(u !== "" && p === "1234") { 
            state.user = u;
            localStorage.setItem('lagerAuthorizedUser', u);
            startApp();
        } else {
            document.getElementById('loginErr').style.display = 'block';
        }
    }

    function startApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        document.getElementById('userDisplay').innerText = "Hallo, " + state.user;
        initApp();
    }

    function logout() {
        localStorage.removeItem('lagerAuthorizedUser');
        location.reload();
    }

    function initApp() {
        dbRef.on('value', snap => {
            const data = snap.val();
            if(data) {
                state.items = data.items || [];
                state.cats = data.cats || ["Werkzeug", "Maschinen", "Garten"];
                updateDropdowns();
                render();
            }
        });
    }

    window.onload = () => {
        const savedUser = localStorage.getItem('lagerAuthorizedUser');
        if(savedUser) {
            state.user = savedUser;
            startApp();
        }
    };

    function updateDropdowns() {
        const html = state.cats.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('itemCatSelect').innerHTML = html;
        document.getElementById('filterCatSelect').innerHTML = `<option value="all">Alle Kategorien</option>` + html;
        document.getElementById('categoryListManage').innerHTML = state.cats.map(c => `
            <div class="cat-item">
                <span>${c}</span>
                <span class="cat-del" onclick="deleteCategory('${c}')">LÖSCHEN</span>
            </div>
        `).join('');
    }

    function addCategory() {
        const val = document.getElementById('newCatInput').value.trim();
        if(!val || state.cats.includes(val)) return;
        state.cats.push(val);
        dbRef.child('cats').set(state.cats);
        document.getElementById('newCatInput').value = "";
    }

    function deleteCategory(name) {
        if(confirm(`Kategorie "${name}" entfernen?`)) {
            state.cats = state.cats.filter(c => c !== name);
            dbRef.child('cats').set(state.cats);
        }
    }

    function deleteItem(id) {
        if(confirm("Diesen Artikel endgültig löschen?")) {
            state.items = state.items.filter(i => i.id !== id);
            dbRef.child('items').set(state.items);
        }
    }

    function toggleStatus(id) {
        const i = state.items.find(x => x.id === id);
        const isIn = i.status === "im Lager";
        i.status = isIn ? "unterwegs" : "im Lager";
        i.outUser = isIn ? state.user : "";
        dbRef.child('items').set(state.items);
    }

    function render() {
        const list = document.getElementById('itemList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        const catFilter = document.getElementById('filterCatSelect').value;
        list.innerHTML = "";
        
        state.items.filter(i => {
            return i.name.toLowerCase().includes(search) && (catFilter === "all" || i.cat === catFilter);
        }).sort((a,b) => b.id - a.id).forEach(i => {
            const isOut = i.status !== "im Lager";
            list.innerHTML += `
                <div class="item-card">
                    <button class="delete-mini" onclick="deleteItem(${i.id})">×</button>
                    <div style="padding:15px; display:flex; gap:15px; align-items:center;">
                        <img src="${i.img || 'https://via.placeholder.com/100'}" style="width:75px; height:75px; object-fit:cover; border-radius:10px;">
                        <div style="flex:1; padding-right:25px;">
                            <b style="font-size:1.1rem; display:block; margin-bottom:2px;">${i.name}</b>
                            <span style="font-size:0.8rem; color:#777; background:#eee; padding:2px 6px; border-radius:4px;">${i.cat}</span>
                            ${isOut ? `<div style="color:var(--danger); font-weight:bold; font-size:0.8rem; margin-top:8px;">AKTUELL BEI: ${i.outUser}</div>` : ""}
                        </div>
                    </div>
                    <button class="btn-status" style="background:${isOut ? 'var(--danger)' : 'var(--success)'}" onclick="toggleStatus(${i.id})">
                        ${isOut ? 'JETZT EINLAGERN' : 'AUS LAGER ENTNEHMEN'}
                    </button>
                </div>`;
        });
    }

    function saveItem() {
        const n = document.getElementById('itemName').value;
        if(!n) return;
        const newItem = { id: Date.now(), name: n, cat: document.getElementById('itemCatSelect').value, img: "", status: "im Lager" };
        const f = document.getElementById('itemImg').files[0];
        if(f) {
            const r = new FileReader();
            r.onload = (e) => { newItem.img = e.target.result; state.items.push(newItem); dbRef.child('items').set(state.items); };
            r.readAsDataURL(f);
        } else { state.items.push(newItem); dbRef.child('items').set(state.items); }
        document.getElementById('itemName').value = "";
        switchTab({currentTarget: document.querySelectorAll('.tab-btn')[0]}, 'tab-lager');
    }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
