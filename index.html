<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V87</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background: #0f172a; color: white; overflow: hidden; }

        /* LOGIN SCREEN */
        #login-screen { position: fixed; top:0; left:0; width:100vw; height:100vh; background: #0f172a; z-index: 10001; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; width: 80%; max-width: 320px; text-align: center; border: 1px solid var(--accent); }

        /* APP STRUKTUR */
        #mainApp { display: none; height: 100vh; flex-direction: column; position: relative; z-index: 10; }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e293b url('haus_background.jpg') no-repeat center center; background-size: cover; z-index: -2; }
        .dark-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.75); z-index: -1; }

        /* HEADER ZENTRIERT */
        .header { background: #0f172a; padding: 15px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; border-bottom: 2px solid var(--accent); }
        .header-left { font-size: 0.7rem; color: #9ca3af; }
        .header h1 { margin: 0; font-size: 1.4rem; color: white; text-align: center; white-space: nowrap; letter-spacing: 1px; }
        .header-right { text-align: right; }
        
        .logout-btn { background: rgba(220, 38, 38, 0.2); color: #ff8888; border: 1px solid #dc2626; padding: 5px 8px; border-radius: 6px; font-size: 0.65rem; cursor: pointer; }

        .content-area { flex: 1; overflow-y: auto; padding: 15px 15px 110px 15px; -webkit-overflow-scrolling: touch; }
        
        .item-card { background: white; border-radius: 15px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.5); color: #333; position: relative; }
        .delete-mini { position: absolute; top: 10px; right: 10px; background: var(--danger); color: white; border: none; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 1rem; }

        .btn-status { display: block; width: 100%; padding: 18px; border: none; color: white; font-weight: bold; font-size: 1rem; cursor: pointer; }
        
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f172a; display: flex; height: 70px; border-top: 2px solid var(--accent); z-index: 100; }
        .tab-btn { flex: 1; border: none; background: none; color: #9ca3af; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; }
        .tab-btn.active { color: white; border-top: 4px solid var(--accent); background: rgba(255,255,255,0.05); }

        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        
        .cat-manager { background: #f8fafc; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px dashed #cbd5e1; }
        .cat-item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; font-size: 0.9rem; border: 1px solid #eee; }
        .cat-del { color: var(--danger); font-weight: bold; cursor: pointer; padding: 2px 8px; }

        .content { display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--accent); margin-top:0;">GR-Lager Login</h2>
        <input type="text" id="loginUser" placeholder="Dein Name">
        <input type="password" id="loginPass" placeholder="Passwort">
        <button onclick="handleLogin()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; margin-top:10px; cursor:pointer;">ANMELDEN</button>
        <p id="loginErr" style="color:#ff8888; font-size:0.8rem; margin-top:10px; display:none;">Login fehlgeschlagen!</p>
    </div>
</div>

<div id="mainApp">
    <div class="bg-layer"></div>
    <div class="dark-overlay"></div>
    
    <div class="header">
        <div class="header-left" id="userDisplay">...</div>
        <h1>GR-Lagerverwaltung</h1>
        <div class="header-right">
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content active">
            <div style="background:rgba(255,255,255,0.95); padding:10px; border-radius:12px; margin-bottom:15px;">
                <input type="text" id="searchInput" placeholder="Suchen..." onkeyup="render()">
                <select id="filterCatSelect" onchange="render()" style="margin-top:5px;"></select>
            </div>
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div class="item-card" style="padding:20px;">
                <h3 style="margin-top:0; color:var(--primary);">Neuen Artikel anlegen</h3>
                <input type="text" id="itemName" placeholder="Bezeichnung / Name">
                
                <label style="font-size: 0.8rem; font-weight: bold; margin-top: 10px; display: block;">Kategorie wählen:</label>
                <select id="itemCatSelect"></select>
                
                <input type="file" id="itemImg" accept="image/*" capture="environment" style="margin-top:10px;">
                <button onclick="saveItem()" style="width:100%; padding:18px; background:var(--success); color:white; border:none; border-radius:12px; font-weight:bold; margin-top:15px; font-size: 1.1rem;">SPEICHERN</button>
            </div>

            <div class="item-card" style="padding:20px;">
                <h3 style="margin-top:0;">Kategorien verwalten</h3>
                <div id="categoryListManage"></div>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <input type="text" id="newCatInput" placeholder="Neue Kategorie Name..." style="flex:1;">
                    <button onclick="addCategory()" style="background:var(--primary); color:white; border:none; border-radius:10px; padding:0 15px; font-weight:bold;">Hinzufügen</button>
                </div>
            </div>
        </div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">Lagerliste</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">Neu Anlegen</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('lager_v32_final');

    let state = { user: null, items: [], cats: [] };

    function handleLogin() {
        const u = document.getElementById('loginUser').value.trim();
        const p = document.getElementById('loginPass').value;
        if(u !== "" && p === "1234") { 
            state.user = u;
            localStorage.setItem('lagerAuthorizedUser', u);
            startApp();
        } else {
            document.getElementById('loginErr').style.display = 'block';
        }
    }

    function startApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        document.getElementById('userDisplay').innerText = state.user;
        initApp();
    }

    function logout() {
        localStorage.removeItem('lagerAuthorizedUser');
        location.reload();
    }

    function initApp() {
        dbRef.on('value', snap => {
            const data = snap.val();
            if(data) {
                state.items = data.items || [];
                state.cats = data.cats || ["Werkzeug", "Maschinen"];
                updateDropdowns();
                render();
            }
        });
    }

    window.onload = () => {
        const savedUser = localStorage.getItem('lagerAuthorizedUser');
        if(savedUser) {
            state.user = savedUser;
            startApp();
        }
    };

    function updateDropdowns() {
        const html = state.cats.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('itemCatSelect').innerHTML = html;
        document.getElementById('filterCatSelect').innerHTML = `<option value="all">Alle Kategorien</option>` + html;
        
        document.getElementById('categoryListManage').innerHTML = state.cats.map(c => `
            <div class="cat-item">
                <span>${c}</span>
                <span class="cat-del" onclick="deleteCategory('${c}')">Löschen</span>
            </div>
        `).join('');
    }

    function addCategory() {
        const val = document.getElementById('newCatInput').value.trim();
        if(!val || state.cats.includes(val)) return;
        state.cats.push(val);
        dbRef.child('cats').set(state.cats);
        document.getElementById('newCatInput').value = "";
    }

    function deleteCategory(name) {
        if(confirm(`Möchtest du die Kategorie "${name}" wirklich löschen?`)) {
            state.cats = state.cats.filter(c => c !== name);
            dbRef.child('cats').set(state.cats);
        }
    }

    function deleteItem(id) {
        if(confirm("Diesen Artikel wirklich löschen?")) {
            state.items = state.items.filter(i => i.id !== id);
            dbRef.child('items').set(state.items);
        }
    }

    function toggleStatus(id) {
        const i = state.items.find(x => x.id === id);
        const isIn = i.status === "im Lager";
        i.status = isIn ? "unterwegs" : "im Lager";
        i.outUser = isIn ? state.user : "";
        dbRef.child('items').set(state.items);
    }

    function render() {
        const list = document.getElementById('itemList');
        const search = document.getElementById('searchInput').value.toLowerCase();
