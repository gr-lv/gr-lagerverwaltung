<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V82</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background: #0f172a; overflow: hidden; }

        /* ABSOLUTER LOGIN - KEINE ÜBERLAGERUNG MÖGLICH */
        #login-screen { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: #0f172a; z-index: 10000; 
            display: flex; align-items: center; justify-content: center;
        }

        .login-box {
            width: 85%; max-width: 320px; background: rgba(255,255,255,0.05);
            padding: 25px; border-radius: 15px; border: 1px solid var(--accent);
            text-align: center; color: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        input { 
            width: 100%; padding: 15px; margin: 10px 0; 
            border-radius: 10px; border: 1px solid #444; 
            background: white; color: black; font-size: 16px; box-sizing: border-box;
        }

        /* Der Button bekommt ein extremes Styling für Feedback */
        .login-btn {
            width: 100%; padding: 18px; margin-top: 15px;
            background: var(--primary); color: white; border: none;
            border-radius: 10px; font-weight: bold; font-size: 18px;
            cursor: pointer; display: block;
            -webkit-appearance: none; /* Fix für iOS-Button-Styling */
        }
        .login-btn:active { background: var(--accent); transform: scale(0.98); }
