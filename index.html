<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V149 - Edit & Stückzahl</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --accent: #06b6d4; --danger: #ef4444; --success: #10b981; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100%; font-family: sans-serif; background-color: #000; color: white; overflow: hidden; }
        .global-bg { position: fixed; inset: 0; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('haus_background.jpg') no-repeat center center; background-size: cover; z-index: 1; }
        #ui-wrapper { position: relative; z-index: 10; height: 100vh; display: none; flex-direction: column; }
        .header { background: rgba(0,0,0,0.9); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .content-area { flex: 1; overflow-y: auto; padding: 10px 15px; padding-bottom: 100px; }
        .item-card { background: rgba(255,255,255,0.95); border-radius: 12px; margin-bottom: 10px; padding: 12px; color: #000; display: flex; align-items: center; gap: 10px; border-left: 6px solid var(--accent); }
        .item-card.status-out { border-left-color: var(--danger); }
        .item-thumb { width: 55px; height: 55px; object-fit: cover; border-radius: 8px; background: #eee; }
        .item-info { flex: 1; min-width: 0; }
        .item-name { font-weight: 900; font-size: 0.95rem; }
        .qty-badge { background: #334155; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; margin-left: 5px; }
        .form-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; margin-bottom: 10px; box-sizing: border-box; }
        .btn-status { border: none; padding: 10px; border-radius: 8px; color: white; font-weight: bold; min-width: 60px; font-size: 0.7rem; }
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #030712; display: flex; height: 75px; border-top: 2px solid var(--accent); z-index: 100; }
        .tab-btn { flex: 1; border: none; background: none; color: #94a3b8; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; }
        .tab-btn.active { color: white; background: rgba(6, 182, 212, 0.2); border-top: 4px solid var(--accent); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
        .edit-box { background: white; color: black; padding: 20px; border-radius: 15px; width: 100%; max-width: 350px; }
        @media print { @page { size: 62mm auto; margin: 0; } body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { display: block !important; position: fixed; inset: 0; background: white; text-align: center; padding: 5mm; } }
    </style>
</head>
<body>

<div class="global-bg"></div>

<div id="editModal" class="modal">
    <div class="edit-box">
        <h3 style="margin-top:0;">Artikel bearbeiten</h3>
        <input type="text" id="editName" class="form-input" placeholder="Name">
        <label style="font-size: 0.8rem;">Neues Foto (optional):</label>
        <input type="file" id="editImgInput" accept="image/*" capture="environment" class="form-input" onchange="previewEditImage(this)">
        <img id="editPreview" style="width:100%; height:100px; object-fit:contain; display:none; margin-bottom:10px;">
        <div style="display:flex; gap:10px;">
            <button onclick="saveEdit()" style="flex:1; padding:12px; background:var(--success); color:white; border:none; border-radius:8px; font-weight:bold;">SPEICHERN</button>
            <button onclick="closeEdit()" style="flex:1; padding:12px; background:var(--danger); color:white; border:none; border-radius:8px; font-weight:bold;">ABBRECHEN</button>
        </div>
    </div>
</div>

<div id="loginScreen" style="position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.8);">
    <div style="background:#1e293b; padding:30px; border-radius:20px; border:3px solid var(--accent); text-align:center;">
        <h2 style="color:var(--accent);">GR-LAGER</h2>
        <input type="text" id="loginName" class="form-input" placeholder="Name">
        <input type="password" id="loginPass" class="form-input" placeholder="Passwort (1234)">
        <button onclick="checkLogin()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:bold;">START</button>
    </div>
</div>

<div id="ui-wrapper">
    <div class="header">
        <button onclick="startScanner()" style="background:none; border:none; font-size:1.6rem;">📷</button>
        <h2>GR-LAGER</h2>
        <div id="displayUserName" style="font-size:0.75rem; color:var(--accent); font-weight:bold;">-</div>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content active" style="display:block;">
            <input type="text" id="searchInput" placeholder="Suchen..." onkeyup="render()" class="form-input">
            <select id="filterCatSelect" onchange="render()" class="form-input" style="background:var(--accent); color:white;"></select>
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content" style="display:none;">
            <div style="background:white; padding:15px; border-radius:15px; color:#000;">
                <input type="text" id="itemName" class="form-input" placeholder="Artikel Name">
                <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
                    <label style="font-weight:bold;">Menge:</label>
                    <select id="itemQty" class="form-input" style="margin:0; flex:1;"></select>
                </div>
                <select id="itemLagerSelect" class="form-input"></select>
                <select id="itemCatSelect" class="form-input"></select>
                <button onclick="document.getElementById('itemImg').click()" class="form-input">📷 FOTO AUFNEHMEN</button>
                <input type="file" id="itemImg" accept="image/*" capture="environment" style="display:none;" onchange="previewImage(this)">
                <img id="imagePreview" style="width:100%; height:100px; object-fit:contain; display:none; margin-bottom:10px;">
                <button onclick="saveAndPrint()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:bold;">SPEICHERN & DRUCKEN</button>
            </div>
        </div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab('tab-lager')">📦 LAGER</button>
        <button class="tab-btn" onclick="switchTab('tab-neu')">➕ NEU</button>
    </nav>
</div>

<div id="print-area"><div id="p-name"></div><div id="p-loc"></div><img id="p-qr" src=""></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const mainRef = db.ref('lager_v90_multilager');
    let state = { user: "", items: [], config: {}, currentEditKey: null };

    // Menge Dropdown befüllen (1-50)
    const qtySelect = document.getElementById('itemQty');
    for(let i=1; i<=50; i++) { let opt = document.createElement('option'); opt.value = i; opt.innerHTML = i; qtySelect.appendChild(opt); }

    function checkLogin() {
        if(document.getElementById('loginName').value && document.getElementById('loginPass').value === "1234") {
            state.user = document.getElementById('loginName').value.toUpperCase();
            document.getElementById('displayUserName').innerText = state.user;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('ui-wrapper').style.display = 'flex';
            initApp();
        }
    }

    function initApp() {
        mainRef.on('value', snap => {
            state.config = snap.val() || {};
            state.items = Object.keys(state.config.items || {}).map(k => ({...state.config.items[k], key: k}));
            const fill = (id, list, all=false) => {
                const el = document.getElementById(id); if(!el) return;
                el.innerHTML = (all ? '<option value="">ALLE KATEGORIEN</option>':'') + (list||[]).map(v=>`<option value="${v}">${v}</option>`).join('');
            };
            fill('itemLagerSelect', state.config.locations); fill('itemCatSelect', state.config.cats);
            fill('filterCatSelect', state.config.cats, true);
            render();
        });
    }

    function render() {
        const s = document.getElementById('searchInput').value.toLowerCase();
        const cat = document.getElementById('filterCatSelect').value;
        document.getElementById('itemList').innerHTML = state.items
            .filter(i => i.name.toLowerCase().includes(s) && (cat==="" || i.cat===cat))
            .sort((a,b) => b.ts - a.ts)
            .map(i => `
                <div class="item-card ${i.status !== 'im Lager' ? 'status-out' : ''}">
                    <img src="${i.img || 'https://via.placeholder.com/60'}" class="item-thumb">
                    <div class="item-info">
                        <div class="item-name">${i.name} <span class="qty-badge">${i.qty || 1}x</span></div>
                        <div class="item-meta">${i.location} | Kat: ${i.cat || '-'}</div>
                        ${i.status !== 'im Lager' ? `<div style="color:red; font-size:0.6rem; font-weight:bold;">AUS: ${i.lastUser || '?'}</div>` : ''}
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button onclick="openEdit('${i.key}', '${i.name}')" style="background:none; border:none; font-size:1.2rem;">✏️</button>
                        <button onclick="toggleStatus('${i.key}', '${i.name}', '${i.status}')" class="btn-status ${i.status==='im Lager' ? 'btn-in':'btn-out'}">${i.status==='im Lager'?'EIN':'AUS'}</button>
                    </div>
                </div>`).join('');
    }

    function openEdit(key, name) {
        state.currentEditKey = key;
        document.getElementById('editName').value = name;
        document.getElementById('editPreview').style.display = 'none';
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeEdit() { document.getElementById('editModal').style.display = 'none'; }

    function previewEditImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                document.getElementById('editPreview').src = e.target.result;
                document.getElementById('editPreview').style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveEdit() {
        const newName = document.getElementById('editName').value;
        const newImg = document.getElementById('editPreview').style.display === 'block' ? document.getElementById('editPreview').src : null;
        let updateData = { name: newName };
        if(newImg) updateData.img = newImg;
        
        mainRef.child('items/' + state.currentEditKey).update(updateData).then(() => {
            closeEdit();
        });
    }

    function toggleStatus(key, name, old) {
        const newS = old === "im Lager" ? "ausgeliehen" : "im Lager";
        mainRef.child('items/'+key).update({ status: newS, lastUser: state.user });
    }

    function saveAndPrint() {
        const n = document.getElementById('itemName').value;
        if(!n) return;
        const newRef = mainRef.child('items').push();
        const item = {
            name: n, qty: document.getElementById('itemQty').value,
            location: document.getElementById('itemLagerSelect').value,
            cat: document.getElementById('itemCatSelect').value,
            img: document.getElementById('imagePreview').src || "",
            status: "im Lager", ts: Date.now(), lastUser: state.user
        };
        newRef.set(item).then(() => {
            document.getElementById('p-name').innerText = n + " (" + item.qty + "x)";
            document.getElementById('p-loc').innerText = item.location;
            document.getElementById('p-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${newRef.key}`;
            setTimeout(() => { window.print(); switchTab('tab-lager'); }, 800);
        });
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('imagePreview').style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function switchTab(id) {
        document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
