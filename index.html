<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; --logout: #64748b; }
        html, body { height: 100%; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; background: #4b5563; }
        
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('haus_background.jpg'); background-position: center; background-size: cover; z-index: 1; }
        .app-container { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; }

        .header { background: rgba(15, 23, 42, 0.95); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--accent); }
        .header h1 { margin: 0; font-size: 1.4rem; letter-spacing: 1px; color: var(--accent); text-transform: uppercase; }
        .user-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 0.85rem; }

        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 23, 42, 1); display: flex; z-index: 2000; border-top: 2px solid var(--accent); }
        .tab-btn { flex: 1; padding: 20px 5px; border: none; background: none; font-weight: bold; color: #9ca3af; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; text-align: center; }
        .tab-btn.active { color: white; background: rgba(255,255,255,0.1); }

        .content { display: none; padding: 15px; max-width: 600px; margin: 0 auto 100px auto; width: 90%; }
        .content.active { display: block; }
        
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.4); }
        
        /* Suche & Filter Layout */
        .search-area { display: flex; flex-direction: column; gap: 8px; }
        
        .card { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .thumb { width: 65px; height: 65px; object-fit: cover; border-radius: 12px; background: #fff; border: 1px solid #ddd; cursor: zoom-in; }
        .btn-book { min-width: 110px; padding: 12px; border: none; border-radius: 12px; font-weight: bold; color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .last-action { font-size: 0.75rem; color: #b91c1c; margin-top: 4px; font-weight: 600; background: rgba(220, 38, 38, 0.1); padding: 4px 8px; border-radius: 6px; display: inline-block; border: 1px solid rgba(220, 38, 38, 0.2); }
        input, select { width: 100%; padding: 14px; margin: 4px 0; border: 1px solid #ccc; border-radius: 12px; background: white; font-size: 16px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        
        #zoomOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center; cursor: zoom-out; }
        #zoomOverlay img { max-width: 95%; max-height: 90%; border-radius: 10px; border: 2px solid white; }
    </style>
</head>
<body>

<div class="bg-layer"></div>
<div id="zoomOverlay" onclick="closeZoom()"><img id="zoomImg" src=""></div>

<div class="app-container">
    <div class="header">
        <h1>GR-Lagerverwaltung</h1>
        <div class="user-bar">
            <div>👤 <span id="displayUser">Nicht angemeldet</span></div>
            <div class="user-btns" style="display:flex; gap:5px;">
                <button onclick="askForName()" style="background:var(--primary); color:white; border:none; border-radius:6px; padding:6px 10px; cursor:pointer; font-size:0.7rem;">Wechseln</button>
                <button id="logoutBtn" onclick="logout()" style="background:var(--logout); color:white; border:none; border-radius:6px; padding:6px 10px; cursor:pointer; font-size:0.7rem; display:none;">Logout</button>
            </div>
        </div>
    </div>

    <div id="tab-lager" class="content active">
        <div id="loginPrompt" class="glass-panel" style="text-align:center; padding:40px 20px; display:none;">
            <h2>Willkommen!</h2>
            <p>Bitte anmelden zum Verwalten.</p>
            <button class="btn-main" onclick="askForName()">Anmelden</button>
        </div>
        
        <div id="lagerContent" style="display:none;">
            <div class="glass-panel search-area">
                <input type="text" id="searchInput" placeholder="🔍 Name suchen..." onkeyup="render()">
                <select id="filterCat" onchange="render()">
                    <option value="">📂 Alle Kategorien</option>
                </select>
            </div>
            <div id="itemList"></div>
        </div>
    </div>

    <div id="tab-neu" class="content">
        <div id="neuContent" class="glass-panel">
            <h2 style="margin-top:0">Neu Anlegen</h2>
            <input type="text" id="itemName" placeholder="Name des Artikels">
            <select id="itemCatSelect"></select>
            <input type="file" id="itemImg" accept="image/*" capture="environment">
            <button class="btn-main" onclick="saveItem()">Speichern</button>
            <hr style="margin:20px 0; opacity:0.3;">
            <button onclick="document.getElementById('catMenu').style.display='block'" style="background:none; border:1px solid #999; width:100%; padding:10px; border-radius:10px;">⚙️ Kategorien verwalten</button>
            <div id="catMenu" style="display:none; margin-top:15px; border-top:1px solid #ccc; padding-top:10px;">
                <input type="text" id="newCatInput" placeholder="Neue Kategorie...">
                <button onclick="addCategory()" style="width:100%; padding:10px; background:var(--accent); color:white; border:none; border-radius:10px; margin-top:5px;">Hinzufügen</button>
                <div id="catList" style="margin-top:10px"></div>
            </div>
        </div>
    </div>

    <div id="tab-log" class="content">
        <div class="glass-panel"><h2 style="margin-top:0">Logbuch</h2><div id="logList"></div></div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">Lager</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">Neu</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-log')">Log</button>
    </nav>
</div>

<script>
    const CURRENT_VERSION = 51; 
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('lager_v32_final');

    let state = { user: localStorage.getItem('lagerUser') || null, items: [], logs: [], cats: ["Werkzeug", "Garten"], ver: CURRENT_VERSION };

    function init() {
        updateUserUI();
        dbRef.on('value', (snap) => {
            const data = snap.val();
            if (data) {
                if (data.ver && data.ver > CURRENT_VERSION) { location.reload(true); return; }
                state.items = data.items || [];
                state.logs = data.logs || [];
                state.cats = data.cats || ["Werkzeug", "Garten"];
                render();
            }
        });
    }

    function askForName() {
        let name = prompt("Name eingeben:");
        if (name && name.trim() !== "") {
            state.user = name.trim();
            localStorage.setItem('lagerUser', state.user);
            addLog("System", "Anmeldung erfolgreich");
            updateUserUI();
            sync();
        }
    }

    function logout() {
        if(confirm("Ausloggen?")) {
            addLog("System", "Ausgeloggt");
            state.user = null;
            localStorage.removeItem('lagerUser');
            updateUserUI();
            sync();
        }
    }

    function updateUserUI() {
        const isLogged = !!state.user;
        document.getElementById('displayUser').innerText = state.user || "Nicht angemeldet";
        document.getElementById('logoutBtn').style.display = isLogged ? 'block' : 'none';
        document.getElementById('loginPrompt').style.display = isLogged ? 'none' : 'block';
        document.getElementById('lagerContent').style.display = isLogged ? 'block' : 'none';
        render();
    }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    function saveItem() {
        const n = document.getElementById('itemName').value;
        const c = document.getElementById
