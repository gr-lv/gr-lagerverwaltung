<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V100</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; --dark: #0f172a; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background: var(--dark); color: white; overflow: hidden; }

        /* TOAST */
        #toast {
            visibility: hidden; min-width: 200px; background-color: var(--success); color: #fff;
            text-align: center; border-radius: 10px; padding: 12px; position: fixed;
            z-index: 2000000; left: 50%; bottom: 85px; transform: translateX(-50%);
            font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 85px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 85px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        #mainApp { display: none; height: 100vh; flex-direction: column; position: relative; }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e293b; z-index: -2; }
        .dark-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.85); z-index: -1; }
        
        .header { background: var(--dark); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .header h1 { margin: 0; font-size: 1.1rem; flex: 1; text-align: center; font-weight: 900; }
        
        .content-area { flex: 1; overflow-y: auto; padding: 15px 10px 120px 10px; -webkit-overflow-scrolling: touch; }
        
        .item-card { 
            background: rgba(255, 255, 255, 0.95); border-radius: 20px; margin-bottom: 12px; padding: 10px; 
            color: #333; display: flex; align-items: center; justify-content: space-between; gap: 8px;
        }
        .item-thumb { width: 55px; height: 55px; object-fit: cover; border-radius: 12px; border: 1px solid #ddd; }
        .qty-select { padding: 2px; border-radius: 6px; border: 1px solid #ccc; width: 60px !important; height: 28px; }

        .log-entry {
            background: rgba(255,255,255,0.1); border-left: 4px solid var(--accent);
            padding: 10px; margin-bottom: 8px; border-radius: 0 10px 10px 0; font-size: 0.85rem;
        }
        .log-date { font-size: 0.7rem; color: var(--accent); font-weight: bold; }

        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--dark); display: flex; height: 70px; border-top: 2px solid var(--accent); z-index: 100; }
        .tab-btn { flex: 1; border: none; background: none; color: #9ca3af; font-weight: bold; font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tab-btn.active { color: white; border-top: 4px solid var(--accent); background: rgba(255,255,255,0.05); }
        
        .content { display: none; }
        .content.active { display: block; }
        
        input, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; }
    </style>
</head>
<body>

<div id="toast">Aktion ausgeführt</div>

<div id="login-screen" style="position:fixed; inset:0; background:var(--dark); z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div style="background:rgba(255,255,255,0.1); padding:30px; border-radius:20px; width:80%; max-width:300px; text-align:center;">
        <h2 style="color:var(--accent);">Lager Login</h2>
        <input type="text" id="loginUser" placeholder="Name">
        <input type="password" id="loginPass" placeholder="Passwort">
        <button onclick="handleLogin()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; margin-top:10px;">LOGIN</button>
    </div>
</div>

<div id="mainApp">
    <div class="bg-layer"></div><div class="dark-overlay"></div>
    <div class="header">
        <div style="font-size:0.7rem; width:70px; color:var(--accent);" id="userDisplay"></div>
        <h1>GR-LAGER V100</h1>
        <div style="text-align:right; width:70px;"><button onclick="logout()" style="background:none; border:none; color:#777; font-size:0.6rem;">LOGOUT</button></div>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content active">
            <input type="text" id="searchInput" placeholder="🔍 Suchen..." onkeyup="render()" style="background:white;">
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div style="background:white; color:#333; padding:15px; border-radius:15px;">
                <h3 style="margin:0 0 10px 0;">Neuer Artikel</h3>
                <input type="text" id="itemName" placeholder="Bezeichnung">
                <select id="itemCatSelect"></select>
                <input type="file" id="itemImg" accept="image/*" capture="environment">
                <button onclick="saveItem()" style="width:100%; padding:15px; background:var(--success); color:white; border:none; border-radius:10px; font-weight:bold;">SPEICHERN</button>
            </div>
        </div>

        <div id="tab-log" class="content">
            <h3 style="color:var(--accent); margin-top:0;">📜 Logbuch</h3>
            <div id="logList"></div>
        </div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')"><span>📦</span>Lager</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')"><span>➕</span>Neu</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-log')"><span>📜</span>Logbuch</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    // ZURÜCK AUF ALTEN PFAD DAMIT DATEN DA SIND:
    const mainRef = db.ref('lager_v90_multilager'); 
    let state = { user: null, items: [], logs: [], cats: [] };

    function showToast(text) {
        const t = document.getElementById("toast");
        t.innerText = text; t.className = "show";
        setTimeout(() => { t.className = ""; }, 2500);
    }

    function addLog(msg) {
        const newLog = {
            date: new Date().toLocaleString('de-DE'),
            user: state.user,
            text: msg,
            ts: Date.now()
        };
        mainRef.child('logs').push(newLog);
    }

    function handleLogin() {
        const u = document.getElementById('loginUser').value.trim();
        if(u && document.getElementById('loginPass').value === "1234") {
            state.user = u;
            localStorage.setItem('lagerUserV100', u);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            document.getElementById('userDisplay').innerText = u;
            initApp();
        }
    }

    function initApp() {
        mainRef.on('value', snap => {
            const data = snap.val() || {};
            // Items sind als Objekt in Firebase, wir brauchen ein Array mit Keys
            const rawItems = data.items || {};
            state.items = Object.keys(rawItems).map(key => ({...rawItems[key], key: key}));
            state.logs = Object.values(data.logs || {}).sort((a,b) => b.ts - a.ts);
            state.cats = data.cats || ["Werkzeug", "Basteln", "Spiele"];
            
            document.getElementById('itemCatSelect').innerHTML = state.cats.map(c => `<option value="${c}">${c}</option>`).join('');
            render();
            renderLogs();
        });
    }

    function render() {
        const list = document.getElementById('itemList');
        const s = document.getElementById('searchInput').value.toLowerCase();
        list.innerHTML = "";
        
        state.items.filter(i => i.name.toLowerCase().includes(s)).sort((a,b) => b.ts - a.ts).forEach(i => {
            const isOut = i.status !== "im Lager";
            list.innerHTML += `
                <div class="item-card">
                    <div style="display:flex; align-items:center; gap:10px; flex:1;">
                        <img src="${i.img || 'https://via.placeholder.com/55'}" class="item-thumb">
                        <div style="flex:1;">
                            <div style="font-weight:bold; display:flex; align-items:center; gap:5px; color:#333;">
                                ${i.name}
                                <select class="qty-select" onchange="changeQty('${i.key}', this)">
                                    ${Array.from({length:20}, (_,n)=>`<option value="${n+1}" ${i.qty==n+1?'selected':''}>${n+1}</option>`).join('')}
                                </select>
                            </div>
                            <div style="font-size:0.7rem; color:#777;">${i.cat} ${isOut ? ' | <span style="color:red; font-weight:bold;">Bei: '+i.outUser+'</span>' : ''}</div>
                        </div>
                    </div>
                    <div style="display:flex; align-items:center; gap:5px;">
                        <button onclick="toggleItem('${i.key}')" style="background:${isOut?'var(--danger)':'var(--success)'}; color:white; border:none; padding:8px 12px; border-radius:10px; font-size:0.75rem; font-weight:bold; min-width:85px;">
                            ${isOut?'Einlagern':'Auslagern'}
                        </button>
                        <button onclick="deleteItem('${i.key}')" style="background:none; border:none; font-size:1.1rem; color:#999;">🗑️</button>
                    </div>
                </div>`;
        });
    }

    function renderLogs() {
        const list = document.getElementById('logList');
        list.innerHTML = state.logs.slice(0, 50).map(l => `
            <div class="log-entry">
                <div class="log-date">${l.date}</div>
                <div><span style="color:white; font-weight:bold;">${l.user}:</span> ${l.text}</div>
            </div>
        `).join('');
    }

    function changeQty(key, el) {
        const i = state.items.find(x => x.key === key);
        if(confirm(`Menge für "${i.name}" auf ${el.value} ändern?`)) {
            addLog(`Stückzahl ${i.name} geändert: ${i.qty} -> ${el.value}`);
            mainRef.child('items/'+key).update({qty: el.value});
            showToast("Gespeichert");
        } else { render(); }
    }

    function toggleItem(key) {
        const i = state.items.find(x => x.key === key);
        const isIn = i.status === "im Lager";
        addLog(isIn ? `AUSGELAGERT: ${i.name}` : `EINGELAGERT: ${i.name}`);
        mainRef.child('items/'+key).update({
            status: isIn ? "ausgeliehen" : "im Lager",
            outUser: isIn ? state.user : ""
        });
        showToast(isIn ? "Ausgelagert" : "Eingelagert");
    }

    function deleteItem(key) {
        const i = state.items.find(x => x.key === key);
        if(confirm(`"${i.name}" wirklich löschen?`)) {
            addLog(`GELÖSCHT: ${i.name}`);
            mainRef.child('items/'+key).remove();
        }
    }

    function saveItem() {
        const n = document.getElementById('itemName').value;
        if(!n) return;
        const newRef = mainRef.child('items').push();
        const newItem = { name: n, cat: document.getElementById('itemCatSelect').value, qty: 1, status: "im Lager", img: "", ts: Date.now() };
        
        const f = document.getElementById('itemImg').files[0];
        if(f) {
            const r = new FileReader();
            r.onload = (e) => { 
                newItem.img = e.target.result; 
                newRef.set(newItem); 
                addLog(`NEU ANGELEGT: ${n}`);
            };
            r.readAsDataURL(f);
        } else { 
            newRef.set(newItem); 
            addLog(`NEU ANGELEGT: ${n}`); 
        }
        
        document.getElementById('itemName').value = "";
        switchTab({currentTarget: document.querySelectorAll('.tab-btn')[0]}, 'tab-lager');
    }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    function logout() { localStorage.removeItem('lagerUserV100'); location.reload(); }

    window.onload = () => {
        const saved = localStorage.getItem('lagerUserV100');
        if(saved) {
            state.user = saved;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            document.getElementById('userDisplay').innerText = saved;
            initApp();
        }
    };
</script>
</body>
</html>
