<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V108</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; --dark: #0f172a; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; overflow: hidden; }

        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('haus_background.jpg') no-repeat center center;
            background-size: cover; z-index: -2;
        }

        .header { background: #030712; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); color: white; }
        .header h1 { margin: 0; font-size: 1.2rem; letter-spacing: 2px; font-weight: 900; text-transform: uppercase; }

        .content-area { flex: 1; height: calc(100vh - 140px); overflow-y: auto; padding: 20px; box-sizing: border-box; }

        /* ARTIKEL KARTE */
        .item-card { 
            background: rgba(255, 255, 255, 0.95); border-radius: 15px; margin-bottom: 15px; padding: 15px; 
            color: #333; display: flex; align-items: center; justify-content: space-between; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }
        .item-thumb { width: 65px; height: 65px; object-fit: cover; border-radius: 10px; border: 1px solid #ddd; }
        
        .qty-select { 
            padding: 5px; border-radius: 8px; border: 1px solid #ccc; 
            width: 70px; font-weight: bold; font-size: 1rem; background: #fff;
        }

        .log-entry { 
            background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(5px);
            border-left: 5px solid var(--accent); padding: 15px; margin-bottom: 12px; 
            border-radius: 0 12px 12px 0; color: white;
        }

        .form-section { background: white; color: #333; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 6px 15px rgba(0,0,0,0.4); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; box-sizing: border-box; }
        
        .camera-container {
            display: flex; align-items: center; gap: 10px; background: #f1f5f9;
            padding: 12px; border-radius: 10px; border: 2px dashed var(--accent);
            margin: 10px 0; cursor: pointer;
        }
        #imagePreview { width: 55px; height: 55px; object-fit: cover; border-radius: 8px; display: none; border: 2px solid var(--success); }

        .btn-save { width: 100%; padding: 15px; background: var(--success); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; margin-top: 15px; cursor: pointer; }
        
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #030712; display: flex; height: 70px; border-top: 2px solid var(--accent); }
        .tab-btn { flex: 1; border: none; background: none; color: #9ca3af; font-weight: bold; font-size: 0.8rem; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .tab-btn.active { color: white; background: rgba(255,255,255,0.1); border-top: 4px solid var(--accent); }
        .content { display: none; }
        .content.active { display: block; }
        
        .admin-box { background: rgba(0,0,0,0.7); border-radius: 10px; padding: 15px; margin-top: 10px; border: 1px solid #444; color: white; }
        .flex-row { display: flex; gap: 10px; align-items: center; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="mainApp" style="display:flex; flex-direction:column; height:100vh;">
    <div class="bg-layer"></div>
    <div class="header">
        <div id="userDisplay" style="font-size:0.8rem; color:var(--accent); font-weight:bold;"></div>
        <h1>GR-LAGERVERWALTUNG</h1>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content active">
            <input type="text" id="searchInput" placeholder="🔍 Artikel suchen..." onkeyup="render()" style="margin-bottom:15px; background:white;">
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div class="form-section">
                <h3 style="margin-top:0;">Neuer Artikel</h3>
                <small>Lager / Gebäude</small><select id="itemLagerSelect"></select>
                <input type="text" id="itemName" placeholder="Bezeichnung">
                <div class="flex-row"><div style="flex:1;"><small>Kategorie</small><select id="itemCatSelect"></select></div></div>
                <div class="flex-row" style="margin-top:10px;">
                    <div style="flex:1;"><small>Regal</small><select id="itemRegalSelect"></select></div>
                    <div style="flex:1;"><small>Fach</small><select id="itemFachSelect"></select></div>
                </div>
                <div class="camera-container" onclick="document.getElementById('itemImg').click()">
                    <span class="camera-icon">📸</span>
                    <span id="cameraText" style="flex:1; font-weight:bold; font-size:0.9rem; color:#475569;">Foto aufnehmen/wählen</span>
                    <img id="imagePreview" src="">
                </div>
                <input type="file" id="itemImg" accept="image/*" style="display:none;" onchange="previewImage(this)">
                <button onclick="saveItem()" class="btn-save">ARTIKEL SPEICHERN</button>
            </div>

            <details class="admin-box">
                <summary style="cursor:pointer; font-weight:bold; color:var(--accent);">⚙️ Listen bearbeiten</summary>
                <div style="margin-top:15px;">
                    <div class="flex-row"><input type="text" id="newLagerInput" placeholder="Neues Lager..."><button onclick="addListOption('locations', 'newLagerInput')">+</button></div>
                    <div class="flex-row"><input type="text" id="newCatInput" placeholder="Neue Kat..."><button onclick="addListOption('cats', 'newCatInput')">+</button></div>
                    <div class="flex-row"><input type="text" id="newRegalInput" placeholder="Regal..."><button onclick="addListOption('regale', 'newRegalInput')">+</button></div>
                    <div class="flex-row"><input type="text" id="newFachInput" placeholder="Fach..."><button onclick="addListOption('faecher', 'newFachInput')">+</button></div>
                </div>
            </details>
        </div>

        <div id="tab-log" class="content">
            <h3 style="color:white; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); margin-top:0;">📜 Logbuch</h3>
            <div id="logList"></div>
        </div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')"><span>📦</span>Lager</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')"><span>➕</span>Neu</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-log')"><span>📜</span>Logbuch</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const mainRef = db.ref('lager_v90_multilager');
    let state = { user: "David", items: [], logs: [], cats: [], regale: [], faecher: [], locations: [] };

    function previewImage(input) {
        const preview = document.getElementById('imagePreview');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { preview.src = e.target.result; preview.style.display = 'block'; }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function initApp() {
        mainRef.on('value', snap => {
            const data = snap.val() || {};
            state.items = Object.keys(data.items || {}).map(key => ({...data.items[key], key: key}));
            state.logs = Object.values(data.logs || {}).sort((a,b) => b.ts - a.ts);
            state.cats = data.cats || ["Allgemein"];
            state.regale = data.regale || ["A1"];
            state.faecher = data.faecher || ["F1"];
            state.locations = data.locations || ["Lager"];
            
            document.getElementById('itemLagerSelect').innerHTML = state.locations.map(l => `<option value="${l}">${l}</option>`).join('');
            document.getElementById('itemCatSelect').innerHTML = state.cats.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('itemRegalSelect').innerHTML = state.regale.map(r => `<option value="${r}">${r}</option>`).join('');
            document.getElementById('itemFachSelect').innerHTML = state.faecher.map(f => `<option value="${f}">${f}</option>`).join('');
            
            render();
            renderLogs();
        });
    }

    function render() {
        const list = document.getElementById('itemList');
        const s = document.getElementById('searchInput').value.toLowerCase();
        list.innerHTML = "";
        
        state.items.filter(i => i.name.toLowerCase().includes(s)).sort((a,b) => b.ts - a.ts).forEach(i => {
            const isOut = i.status !== "im Lager";
            list.innerHTML += `
                <div class="item-card">
                    <div style="display:flex; align-items:center; gap:12px; flex:1;">
                        <img src="${i.img || 'https://via.placeholder.com/60'}" class="item-thumb">
                        <div style="flex:1;">
                            <div style="font-weight:900; font-size:1.1rem;">${i.name}</div>
                            <div style="font-size:0.75rem; color:#666;">
                                🏠 ${i.location} | 📍 ${i.regal}/${i.fach}
                            </div>
                            <div style="margin-top:6px; display:flex; align-items:center; gap:8px;">
                                <small style="font-weight:bold;">Menge:</small>
                                <select class="qty-select" onchange="changeQty('${i.key}', this)">
                                    ${Array.from({length:50}, (_,n)=>`<option value="${n+1}" ${i.qty==n+1?'selected':''}>${n+1}</option>`).join('')}
                                </select>
                                ${isOut ? `<span style="color:var(--danger); font-size:0.7rem; font-weight:bold;">🚩 BEI: ${i.outUser}</span>` : ''}
                            </div>
                        </div>
                    </div>
                    <button onclick="toggleItem('${i.key}')" style="background:${isOut?'#dc2626':'#16a34a'}; color:white; border:none; padding:12px; border-radius:10px; font-weight:bold; min-width:90px; cursor:pointer;">
                        ${isOut?'Ein':'Aus'}
                    </button>
                </div>`;
        });
    }

    function renderLogs() {
        document.getElementById('logList').innerHTML = state.logs.slice(0, 50).map(l => `
            <div class="log-entry"><small style="color:var(--accent);">${l.date}</small><div><b>${l.user}:</b> ${l.text}</div></div>
        `).join('');
    }

    function saveItem() {
        const n = document.getElementById('itemName').value;
        if(!n) return;
        const newItem = { 
            name: n, location: document.getElementById('itemLagerSelect').value,
            cat: document.getElementById('itemCatSelect').value, regal: document.getElementById('itemRegalSelect').value, 
            fach: document.getElementById('itemFachSelect').value, qty: 1, status: "im Lager", img: "", ts: Date.now() 
        };
        const file = document.getElementById('itemImg').files[0];
        if(file) {
            const r = new FileReader();
            r.onload = (e) => { newItem.img = e.target.result; finishSave(newItem); };
            r.readAsDataURL(file);
        } else { finishSave(newItem); }
    }

    function finishSave(data) {
        mainRef.child('items').push(data);
        mainRef.child('logs').push({ date: new Date().toLocaleString('de-DE'), user: state.user, text: `NEU: ${data.name} (${data.qty}x)`, ts: Date.now() });
        document.getElementById('itemName').value = "";
        document.getElementById('imagePreview').style.display = 'none';
        switchTab({currentTarget: document.querySelectorAll('.tab-btn')[0]}, 'tab-lager');
    }

    function changeQty(key, el) {
        const i = state.items.find(x => x.key === key);
        mainRef.child('logs').push({ date: new Date().toLocaleString('de-DE'), user: state.user, text: `MENGE: ${i.name} (${i.qty} -> ${el.value})`, ts: Date.now() });
        mainRef.child('items/'+key).update({qty: parseInt(el.value)});
    }

    function toggleItem(key) {
        const i = state.items.find(x => x.key === key);
        const isIn = i.status === "im Lager";
        mainRef.child('items/'+key).update({ status: isIn ? "ausgeliehen" : "im Lager", outUser: isIn ? state.user : "" });
    }

    function addListOption(type, inputId) {
        const val = document.getElementById(inputId).value.trim();
        if(!val) return;
        const newList = [...(state[type] || []), val];
        mainRef.child(type).set(newList);
        document.getElementById(inputId).value = "";
    }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    window.onload = initApp;
</script>
</body>
</html>
