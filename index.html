<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V65</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; }
        
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; 
            background: #1e293b url('haus_background.jpg') no-repeat center center fixed; 
            background-size: cover; height: 100vh; overflow: hidden;
        }

        .app-shell { height: 100vh; display: flex; flex-direction: column; background: rgba(15, 23, 42, 0.4); }
        .header { background: rgba(15, 23, 42, 0.9); color: white; padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); flex-shrink: 0; }
        .content-area { flex: 1; overflow-y: auto; padding: 15px 15px 100px 15px; -webkit-overflow-scrolling: touch; }

        .glass { 
            background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(8px);
            border-radius: 20px; padding: 20px; margin-bottom: 15px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        .card { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .thumb { width: 65px; height: 65px; object-fit: cover; border-radius: 10px; background: #eee; }
        
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f172a; display: flex; border-top: 2px solid var(--accent); height: 70px; z-index: 2000; }
        .tab-btn { flex: 1; border: none; background: none; color: #9ca3af; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.65rem; }
        .tab-btn.active { color: white; background: rgba(255,255,255,0.1); border-top: 3px solid var(--accent); }

        .content { display: none; }
        .content.active { display: block; }
        
        #reader { width: 100%; border-radius: 15px; overflow: hidden; display: none; margin-bottom: 15px; border: 2px solid var(--accent); background: black; }
        .scan-trigger { background: var(--accent); border: none; border-radius: 10px; width: 50px; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="header">
        <h1 style="margin:0; font-size:1.1rem; color:var(--accent);">GR-LAGERVERWALTUNG</h1>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
            <span id="displayUser" style="font-size:0.8rem;">👤 Gast</span>
            <button onclick="askForName()" style="background:var(--primary); color:white; border:none; padding:5px 10px; border-radius:5px; font-size:0.7rem; cursor:pointer;">NAME ÄNDERN</button>
        </div>
    </div>

    <div class="content-area">
        <div id="loginSection" class="glass" style="text-align:center; display:none;">
            <h2>Willkommen</h2>
            <button class="btn-main" onclick="askForName()">JETZT ANMELDEN</button>
        </div>

        <div id="tab-lager" class="content active">
            <div id="reader"></div>
            <div class="glass">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="searchInput" placeholder="Suchen..." onkeyup="render()">
                    <button class="scan-trigger" onclick="startScan('search')">📷</button>
                </div>
            </div>
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div class="glass">
                <h2 style="margin-top:0">Neuer Artikel</h2>
                <input type="text" id="itemName" placeholder="Artikelname">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="itemBarcode" placeholder="Barcode / QR (Optional)">
                    <button class="scan-trigger" onclick="startScan('new')">📷</button>
                </div>
                <input type="number" id="itemQty" placeholder="Menge" value="1">
                <select id="itemCatSelect"></select>
                <input type="file" id="itemImg" accept="image/*" capture="environment">
                <button class="btn-main" onclick="saveItem()" style="margin-top:15px;">ARTIKEL SPEICHERN</button>
            </div>
        </div>

        <div id="tab-log" class="content">
            <div class="glass"><h2>Verlauf</h2><div id="logList"></div></div>
        </div>
    </div>

    <nav id="mainNav">
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">Lager</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">Neu Einlagern</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-log')">Logbuch</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('lager_v32_final');

    let state = { user: localStorage.getItem('lagerUser') || null, items: [], logs: [], cats: ["Werkzeug", "Garten", "Elektro", "Bau"] };
    let html5QrCode = null;

    function init() {
        updateUserUI();
        const sDrop = document.getElementById('itemCatSelect');
        sDrop.innerHTML = state.cats.map(c => `<option value="${c}">${c}</option>`).join('');

        dbRef.on('value', (snap) => {
            const data = snap.val();
            if (data) {
                state.items = data.items || [];
                state.logs = data.logs || [];
                render();
            }
        });
    }

    function askForName() {
        let n = prompt("Bitte Namen eingeben:");
        if (n && n.trim() !== "") {
            state.user = n.trim();
            localStorage.setItem('lagerUser', state.user);
            updateUserUI();
            dbRef.child('logs').push({ time: new Date().toLocaleString(), user: state.user, action: "Eingeloggt" });
        }
    }

    function updateUserUI() {
        const isLogged = !!state.user;
        document.getElementById('displayUser').innerText = isLogged ? "👤 " + state.user : "👤 Nicht angemeldet";
        document.getElementById('loginSection').style.display = isLogged ? 'none' : 'block';
    }

    function startScan(target) {
        const readerDiv = document.getElementById('reader');
        readerDiv.style.display = 'block';
        if(html5QrCode) html5QrCode.stop();
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            if(target === 'search') {
                document.getElementById('searchInput').value = text;
                render();
            } else {
                document.getElementById('itemBarcode').value = text;
            }
            html5QrCode.stop().then(() => { readerDiv.style.display = 'none'; html5QrCode = null; });
        }).catch(err => console.log(err));
    }

    function switchTab(e, id) {
        if(html5QrCode) { html5QrCode.stop(); document.getElementById('reader').style.display = 'none'; }
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    function saveItem() {
        if(!state.user) return alert("Anmeldung erforderlich!");
        const n = document.getElementById('itemName').value;
        if(!n) return alert("Bitte Name eingeben!");
        
        const newItem = {
            id: Date.now(),
            name: n,
            barcode: document.getElementById('itemBarcode').value,
            qty: document.getElementById('itemQty').value || 1,
            cat: document.getElementById('itemCatSelect').value,
            img: "", 
            status: "im Lager"
        };

        const f = document.getElementById('itemImg').files[0];
        const proceed = (imgData) => {
            newItem.img = imgData;
            state.items.unshift(newItem);
            state.logs.unshift({ time: new Date().toLocaleString(), user: state.user, item: n, action: "Neu angelegt" });
            dbRef.set({ items: state.items, logs: state.logs, cats: state.cats });
            document.getElementById('itemName').value = "";
            document.getElementById('itemBarcode').value = "";
            alert("Erfolgreich gespeichert!");
            switchTab({currentTarget: document.querySelectorAll('.tab-btn')[0]}, 'tab-lager');
        };

        if(f) {
            const reader = new FileReader();
            reader.onload = (e) => proceed(e.target.result);
            reader.readAsDataURL(f);
        } else proceed("");
    }

    function toggleStatus(id) {
        const idx = state.items.findIndex(x => x.id === id);
        const i = state.items[idx];
        const isIn = i.status === "im Lager";
        
        i.status = isIn ? "unterwegs" : "im Lager";
        i.outUser = isIn ? state.user : "";
        i.outDate = isIn ? new Date().toLocaleDateString() : "";
        
        state.logs.unshift({ time: new Date().toLocaleString(), user: state.user, item: i.name, action: isIn ? "Auslagerung" : "Einlagerung" });
        dbRef.set({ items: state.items, logs: state.logs, cats: state.cats });
    }

    function render() {
        const list = document.getElementById('itemList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        let html = "";

        state.items.filter(i => i.name.toLowerCase().includes(search) || (i.barcode && i.barcode.includes(search))).forEach(i => {
            const isOut = i.status !== "im Lager";
            html += `
                <div class="glass card">
                    <img src="${i.img || 'https://via.placeholder.com/70'}" class="thumb">
                    <div style="flex:1">
                        <b>${i.name}</b> (x${i.qty})<br>
                        <small>${i.cat}</small>
                        ${isOut ? `<br><span style="color:red; font-size:0.75rem; font-weight:bold;">Ausgelagert: ${i.outUser}</span>` : ""}
                    </div>
                    <button onclick="toggleStatus(${i.id})" style="background:${isOut?'#dc2626':'#16a34a'}; color:white; border:none; padding:12px; border-radius:10px; cursor:pointer; font-weight:bold; min-width:100px;">
                        ${isOut ? 'Einlagern' : 'Auslagern'}
                    </button>
                </div>`;
        });
        list.innerHTML = html;
        document.getElementById('logList').innerHTML = state.logs.slice(0,25).map(l => `<div style="font-size:0.75rem; border-bottom:1px solid #eee; padding:5px;"><b>${l.user}</b>: ${l.item || ''} ${l.action} <br><small style="color:gray;">${l.time}</small></div>`).join('');
    }

    init();
</script>
</body>
</html>
