<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V78 - SECURE</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; }
        
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e293b url('haus_background.jpg') no-repeat center center; background-size: cover; z-index: -2; }
        .dark-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); z-index: -1; }

        body { margin: 0; font-family: sans-serif; height: 100vh; width: 100vw; overflow: hidden; background: transparent; }
        .app-shell { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; }
        
        /* LOGIN OVERLAY */
        #login-screen {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #0f172a; z-index: 5000; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; color: white;
        }

        .header { background: #0f172a; color: white; padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); flex-shrink: 0; }
        .content-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; -webkit-overflow-scrolling: touch; }

        .filter-box { background: rgba(255, 255, 255, 0.9); padding: 12px; border-radius: 15px; margin-bottom: 15px; }

        .item-card { background: rgba(255, 255, 255, 0.95); border-radius: 15px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .card-inner { padding: 15px; display: flex; gap: 15px; align-items: center; }
        .thumb { width: 70px; height: 70px; object-fit: cover; border-radius: 10px; }

        .btn-status-trigger { display: block; width: 100%; padding: 20px; border: none; color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f172a; display: flex; height: 70px; border-top: 2px solid var(--accent); z-index: 100; }
        .tab-btn { flex: 1; border: none; background: none; color: #9ca3af; font-weight: bold; }
        .tab-btn.active { color: white; background: rgba(255,255,255,0.1); }

        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .content { display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2 style="color:var(--accent)">GR-LAGER LOGIN</h2>
    <div style="width: 80%; max-width: 300px;">
        <input type="text" id="loginUser" placeholder="Dein Name (z.B. Gerd)">
        <input type="password" id="loginPass" placeholder="Passwort">
        <button onclick="checkLogin()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; margin-top:10px;">ANMELDEN</button>
        <p id="loginErr" style="color:red; font-size:0.8rem; text-align:center; display:none;">Falsche Daten!</p>
    </div>
</div>

<div class="bg-layer"></div>
<div class="dark-overlay"></div>

<div class="app-shell">
    <div class="header">
        <h1 style="margin:0; font-size:1rem;">GR-LAGER V78 <span id="displayUser" style="color:var(--accent); font-size:0.7rem;"></span></h1>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content active">
            <div class="filter-box">
                <input type="text" id="searchInput" placeholder="Suche..." onkeyup="render()">
                <select id="filterCatSelect" onchange="render()"></select>
            </div>
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div class="item-card" style="padding:20px;">
                <h3>Neuer Artikel</h3>
                <input type="text" id="itemName" placeholder="Bezeichnung">
                <select id="itemCatSelect"></select>
                <input type="file" id="itemImg" accept="image/*" capture="environment">
                <button onclick="saveItem()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; margin-top:10px;">ARTIKEL SPEICHERN</button>
            </div>
        </div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">LAGER</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">NEU</button>
        <button class="tab-btn" onclick="logout()" style="color:var(--danger)">LOGOUT</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('lager_v32_final');

    let state = { user: null, items: [], cats: [] };

    // --- LOGIN LOGIK ---
    function checkLogin() {
        const u = document.getElementById('loginUser').value.trim();
        const p = document.getElementById('loginPass').value;

        // Hier dein gewünschtes Passwort eintragen
        if(u !== "" && p === "1234") { 
            state.user = u;
            localStorage.setItem('lagerAuthorizedUser', u);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('displayUser').innerText = "| User: " + u;
            initApp();
        } else {
            document.getElementById('loginErr').style.display = 'block';
        }
    }

    function logout() {
        localStorage.removeItem('lagerAuthorizedUser');
        location.reload();
    }

    function initApp() {
        dbRef.on('value', snap => {
            const data = snap.val();
            if(data) {
                state.items = data.items || [];
                state.cats = data.cats || ["Werkzeug"];
                updateDropdowns();
                render();
            }
        });
    }

    // Beim Start prüfen
    window.onload = () => {
        const savedUser = localStorage.getItem('lagerAuthorizedUser');
        if(savedUser) {
            state.user = savedUser;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('displayUser').innerText = "| User: " + savedUser;
            initApp();
        }
    };

    // --- RESTLICHE FUNKTIONEN ---
    function updateDropdowns() {
        document.getElementById('itemCatSelect').innerHTML = state.cats.map(c => `<option value="${c}">${c}</option>`).join('');
        const f = document.getElementById('filterCatSelect');
        f.innerHTML = `<option value="all">Alle Kategorien</option>` + state.cats.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function toggleStatus(id) {
        if(!state.user) return alert("Nicht autorisiert!");
        const i = state.items.find(x => x.id === id);
        const isIn = i.status === "im Lager";
        i.status = isIn ? "unterwegs" : "im Lager";
        i.outUser = isIn ? state.user : "";
        dbRef.child('items').set(state.items);
    }

    function render() {
        const list = document.getElementById('itemList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        const catFilter = document.getElementById('filterCatSelect').value;
        list.innerHTML = "";
        
        state.items.filter(i => {
            return i.name.toLowerCase().includes(search) && (catFilter === "all" || i.cat === catFilter);
        }).forEach(i => {
            const isOut = i.status !== "im Lager";
            list.innerHTML += `
                <div class="item-card">
                    <div class="card-inner">
                        <img src="${i.img || 'https://via.placeholder.com/100'}" class="thumb">
                        <div style="flex:1;">
                            <b>${i.name}</b><br><small>${i.cat}</small>
                            ${isOut ? `<div style="color:red; font-weight:bold; font-size:0.8rem; margin-top:5px;">BEI: ${i.outUser}</div>` : ""}
                        </div>
                    </div>
                    <button class="btn-status-trigger" 
                            style="background:${isOut ? 'var(--danger)' : 'var(--success)'}"
                            onclick="toggleStatus(${i.id})">
                        ${isOut ? 'Einlagern' : 'Auslagern'}
                    </button>
                </div>`;
        });
    }

    function saveItem() {
        if(!state.user) return;
        const n = document.getElementById('itemName').value;
        const newItem = { id: Date.now(), name: n, cat: document.getElementById('itemCatSelect').value, img: "", status: "im Lager" };
        const f = document.getElementById('itemImg').files[0];
        if(f) {
            const r = new FileReader();
            r.onload = (e) => { newItem.img = e.target.result; state.items.unshift(newItem); dbRef.child('items').set(state.items); };
            r.readAsDataURL(f);
        } else { state.items.unshift(newItem); dbRef.child('items').set(state.items); }
        document.getElementById('itemName').value = "";
        switchTab({currentTarget: document.querySelectorAll('.tab-btn')[0]}, 'tab-lager');
    }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
