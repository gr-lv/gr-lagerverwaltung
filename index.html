<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lager V72 - DEAKTIVIERTE OVERLAYS</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; padding-bottom: 80px; }
        .header { background: #1a202c; color: white; padding: 15px; text-align: center; }
        .content { padding: 10px; display: none; }
        .content.active { display: block; }
        
        /* RADIKAL EINFACHE KARTE */
        .item-card { 
            background: white; border: 2px solid #ccc; margin-bottom: 15px; 
            border-radius: 10px; overflow: hidden; display: block;
        }
        .card-body { padding: 10px; border-bottom: 1px solid #eee; }
        
        /* DER BUTTON ALS BLOCK - KANN NICHT ÜBERLAGERT WERDEN */
        .action-button-final {
            display: block; width: 100%; padding: 20px 0; border: none;
            color: white; font-weight: bold; font-size: 1.2rem;
            text-align: center; cursor: pointer; text-transform: uppercase;
        }
        
        .del-btn-simple { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 4px; float: right; }
        
        input, select { width: 100%; padding: 12px; margin: 5px 0; box-sizing: border-box; font-size: 16px; border: 1px solid #999; border-radius: 5px; }
        
        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #1a202c; height: 60px; }
        .nav-btn { flex: 1; color: white; border: none; background: none; font-weight: bold; }
        .nav-btn.active { background: #2d3748; border-top: 4px solid #4299e1; }
    </style>
</head>
<body>

<div class="header"><b>GR-LAGER V72</b></div>

<div id="tab-lager" class="content active">
    <input type="text" id="searchInput" placeholder="Suchen..." onkeyup="render()">
    <div id="itemList"></div>
</div>

<div id="tab-neu" class="content">
    <div style="background:white; padding:15px; border-radius:10px; border:1px solid #ccc;">
        <h3>Neuer Artikel</h3>
        <input type="text" id="itemName" placeholder="Name">
        <select id="itemCatSelect"></select>
        
        <div style="margin: 15px 0; padding: 10px; background: #e2e8f0; border-radius: 5px;">
            <small>Kategorie hinzufügen:</small>
            <input type="text" id="newCatInput" placeholder="z.B. Baustelle">
            <button onclick="addCategory()" style="width:100%; padding:10px; background:#4a5568; color:white; border:none; border-radius:5px;">KATEGORIE SPEICHERN</button>
        </div>
        
        <input type="file" id="itemImg" accept="image/*" capture="environment">
        <button onclick="saveItem()" style="width:100%; padding:15px; background:#3182ce; color:white; border:none; border-radius:10px; font-weight:bold; margin-top:10px;">ARTIKEL ANLEGEN</button>
    </div>
</div>

<nav>
    <button class="nav-btn active" onclick="switchTab(event, 'tab-lager')">LAGER</button>
    <button class="nav-btn" onclick="switchTab(event, 'tab-neu')">NEU</button>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('lager_v32_final');

    let state = { 
        user: localStorage.getItem('lagerUser') || "Nutzer", 
        items: [], 
        cats: ["Werkzeug", "Elektro", "Garten"] 
    };

    function init() {
        dbRef.on('value', snap => {
            const data = snap.val();
            if(data) {
                state.items = data.items || [];
                state.cats = data.cats || ["Werkzeug", "Elektro", "Garten"];
                updateCatDropdown();
                render();
            }
        });
    }

    function updateCatDropdown() {
        document.getElementById('itemCatSelect').innerHTML = state.cats.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function addCategory() {
        const val = document.getElementById('newCatInput').value.trim();
        if(val && !state.cats.includes(val)) {
            state.cats.push(val);
            dbRef.child('cats').set(state.cats);
            document.getElementById('newCatInput').value = "";
        }
    }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    function saveItem() {
        const name = document.getElementById('itemName').value;
        if(!name) return;
        const newItem = { id: Date.now(), name: name, qty: 1, cat: document.getElementById('itemCatSelect').value, img: "", status: "im Lager" };
        const f = document.getElementById('itemImg').files[0];
        if(f) {
            const r = new FileReader();
            r.onload = (e) => { newItem.img = e.target.result; state.items.unshift(newItem); dbRef.child('items').set(state.items); };
            r.readAsDataURL(f);
        } else { state.items.unshift(newItem); dbRef.child('items').set(state.items); }
        document.getElementById('itemName').value = "";
        switchTab({currentTarget: document.querySelectorAll('.nav-btn')[0]}, 'tab-lager');
    }

    function changeQty(id, val) {
        const i = state.items.find(x => x.id === id);
        i.qty = parseInt(val);
        dbRef.child('items').set(state.items);
    }

    function deleteItem(id) {
        if(confirm("Löschen?")) {
            state.items = state.items.filter(x => x.id !== id);
            dbRef.child('items').set(state.items);
        }
    }

    function toggleStatus(id) {
        const i = state.items.find(x => x.id === id);
        const isIn = i.status === "im Lager";
        i.status = isIn ? "unterwegs" : "im Lager";
        i.outUser = isIn ? state.user : "";
        dbRef.child('items').set(state.items);
    }

    function render() {
        const list = document.getElementById('itemList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        list.innerHTML = "";
        
        state.items.filter(i => i.name.toLowerCase().includes(search)).forEach(i => {
            const isOut = i.status !== "im Lager";
            
            // Dropdown HTML
            let qHtml = `<select onchange="changeQty(${i.id}, this.value)" style="width:80px; display:inline;">`;
            for(let n=1; n<=50; n++) qHtml += `<option value="${n}" ${i.qty==n?'selected':''}>${n}</option>`;
            qHtml += `</select>`;

            list.innerHTML += `
                <div class="item-card">
                    <div class="card-body">
                        <button class="del-btn-simple" onclick="deleteItem(${i.id})">LÖSCHEN</button>
                        <b style="font-size:1.2rem;">${i.name}</b><br>
                        <small>Kategorie: ${i.cat}</small><br><br>
                        Menge: ${qHtml}
                        ${isOut ? `<br><b style="color:red;">BEI: ${i.outUser}</b>` : ""}
                    </div>
                    <button class="action-button-final" 
                            style="background: ${isOut ? '#e53e3e' : '#38a169'}"
                            onclick="toggleStatus(${i.id})">
                        ${isOut ? 'EINLAGERN (Hier klicken)' : 'AUSLAGERN (Hier klicken)'}
                    </button>
                </div>
            `;
        });
    }

    init();
</script>
</body>
</html>
