<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V95</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; --dark: #0f172a; }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background: var(--dark); color: white; overflow: hidden; }

        /* LIGHTBOX / ZOOM */
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000000; justify-content: center; align-items: center; cursor: pointer; }
        #lightbox img { max-width: 95%; max-height: 85%; border-radius: 10px; border: 2px solid var(--accent); }

        /* LOGIN */
        #login-screen { position: fixed; top:0; left:0; width:100vw; height:100vh; background: var(--dark); z-index: 999999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; border: 2px solid var(--accent); }

        /* APP */
        #mainApp { display: none; height: 100vh; flex-direction: column; position: relative; }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e293b url('haus_background.jpg') no-repeat center center; background-size: cover; z-index: -2; }
        .dark-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.85); z-index: -1; }

        .header { background: var(--dark); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .header h1 { margin: 0; font-size: 1.1rem; flex: 1; text-align: center; font-weight: 900; }
        .header-info { font-size: 0.7rem; width: 70px; color: var(--accent); }

        .content-area { flex: 1; overflow-y: auto; padding: 15px 10px 120px 10px; -webkit-overflow-scrolling: touch; }
        
        /* KARTEN-DESIGN V95 */
        .item-card { 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 20px; 
            margin-bottom: 12px; 
            padding: 10px; 
            color: #333; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .item-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
        .item-thumb { width: 55px; height: 55px; object-fit: cover; border-radius: 12px; border: 1px solid #ddd; flex-shrink: 0; cursor: zoom-in; }
        
        .item-info { display: flex; flex-direction: column; min-width: 0; }
        .item-title-row { display: flex; align-items: center; gap: 5px; flex-wrap: nowrap; }
        .item-title { font-weight: 800; font-size: 0.95rem; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .qty-select { 
            padding: 1px 3px; 
            border-radius: 5px; 
            border: 1px solid #ccc; 
            font-size: 0.75rem; 
            background: white;
            width: auto;
            flex-shrink: 0;
        }

        /* BUTTONS RECHTS - JETZT KOMPAKTER */
        .action-group { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
        
        .btn-status-small { 
            background: var(--success); 
            color: white; 
            border: none; 
            padding: 8px 12px; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 0.75rem;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .delete-icon-btn {
            background: none;
            border: none;
            color: #999;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px;
            flex-shrink: 0;
        }

        /* STANDARDS */
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        details { background: #f1f5f9; border-radius: 10px; margin-top: 10px; padding: 5px; color: #333; }
        summary { font-weight: bold; padding: 10px; cursor: pointer; }
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--dark); display: flex; height: 70px; border-top: 2px solid var(--accent); z-index: 100; }
        .tab-btn { flex: 1; border: none; background: none; color: #9ca3af; font-weight: bold; font-size: 0.8rem; }
        .tab-btn.active { color: white; border-top: 4px solid var(--accent); background: rgba(255,255,255,0.05); }
        .content { display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>

<div id="lightbox" onclick="this.style.display='none'"><img id="zoomImg" src=""></div>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--accent); margin-top:0;">Lager Login</h2>
        <input type="text" id="loginUser" placeholder="Dein Name">
        <input type="password" id="loginPass" placeholder="Passwort">
        <button onclick="handleLogin()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; margin-top:15px;">ANMELDEN</button>
    </div>
</div>

<div id="mainApp">
    <div class="bg-layer"></div><div class="dark-overlay"></div>
    <div class="header">
        <div class="header-info" id="userDisplay">...</div>
        <h1>GR-LAGERVERWALTUNG</h1>
        <div class="header-info" style="text-align:right;"><button onclick="logout()" style="background:none; border:none; color:#777; font-size:0.6rem;">LOGOUT</button></div>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content active">
            <div style="background:rgba(255,255,255,0.95); padding:10px; border-radius:15px; margin-bottom:15px; color:#333;">
                <input type="text" id="searchInput" placeholder="🔍 Suchen..." onkeyup="render()">
                <div style="display: flex; gap: 5px; margin-top: 5px;">
                    <select id="filterLagerSelect" onchange="render()" style="padding:8px; font-size:0.8rem;"></select>
                    <select id="filterCatSelect" onchange="render()" style="padding:8px; font-size:0.8rem;"></select>
                </div>
            </div>
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div style="background: white; color: #333; padding: 20px; border-radius: 20px;">
                <h3 style="margin-top:0;">Neuer Artikel</h3>
                <input type="text" id="itemName" placeholder="Bezeichnung">
                <select id="itemCatSelect"></select>
                <select id="itemLagerSelect"></select>
                <input type="file" id="itemImg" accept="image/*" capture="environment">
                <button onclick="saveItem()" style="width:100%; padding:18px; background:var(--success); color:white; border:none; border-radius:12px; font-weight:bold; margin-top:10px;">SPEICHERN</button>
            </div>
            
            <details>
                <summary>📂 Kategorien</summary>
                <div id="catManageList"></div>
                <div style="display:flex; gap:5px; padding:10px;"><input type="text" id="newCatInput"><button onclick="addType('cats', 'newCatInput')">+</button></div>
            </details>
            <details>
                <summary>🏠 Lagerplätze</summary>
                <div id="lagerManageList"></div>
                <div style="display:flex; gap:5px; padding:10px;"><input type="text" id="newLagerInput"><button onclick="addType('locations', 'newLagerInput')">+</button></div>
            </details>
        </div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">Lager</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">Neu</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('lager_v90_multilager');
    let state = { user: null, items: [], cats: [], locations: [] };

    function handleLogin() {
        const u = document.getElementById('loginUser').value.trim();
        const p = document.getElementById('loginPass').value;
        if(u !== "" && p === "1234") { 
            state.user = u;
            localStorage.setItem('lagerAuthorizedUser', u);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            document.getElementById('userDisplay').innerText = u;
            initApp();
        }
    }

    function initApp() {
        dbRef.on('value', snap => {
            const data = snap.val() || {};
            state.items = data.items || [];
            state.cats = data.cats || ["Werkzeug", "Basteln"];
            state.locations = data.locations || ["Lager 1"];
            updateDropdowns();
            render();
        });
    }

    function updateDropdowns() {
        const catHtml = state.cats.map(c => `<option value="${c}">${c}</option>`).join('');
        const lagerHtml = state.locations.map(l => `<option value="${l}">${l}</option>`).join('');
        document.getElementById('itemCatSelect').innerHTML = catHtml;
        document.getElementById('filterCatSelect').innerHTML = `<option value="all">Alle</option>` + catHtml;
        document.getElementById('filterLagerSelect').innerHTML = `<option value="all">Alle</option>` + lagerHtml;
        document.getElementById('itemLagerSelect').innerHTML = lagerHtml;

        document.getElementById('catManageList').innerHTML = state.cats.map(c => `<div style="color:#333; display:flex; justify-content:space-between; padding:5px;"><span>${c}</span><span style="color:red;" onclick="deleteType('cats', '${c}')">X</span></div>`).join('');
        document.getElementById('lagerManageList').innerHTML = state.locations.map(l => `<div style="color:#333; display:flex; justify-content:space-between; padding:5px;"><span>${l}</span><span style="color:red;" onclick="deleteType('locations', '${l}')">X</span></div>`).join('');
    }

    function addType(k, i) {
        const v = document.getElementById(i).value.trim();
        if(!v || state[k].includes(v)) return;
        state[k].push(v); dbRef.child(k).set(state[k]);
        document.getElementById(i).value = "";
    }

    function deleteType(k, v) { if(confirm(`${v} löschen?`)) { state[k] = state[k].filter(x => x !== v); dbRef.child(k).set(state[k]); } }

    function render() {
        const list = document.getElementById('itemList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        const catF = document.getElementById('filterCatSelect').value;
        const lagF = document.getElementById('filterLagerSelect').value;
        list.innerHTML = "";
        
        state.items.filter(i => {
            return i.name.toLowerCase().includes(search) && (catF === "all" || i.cat === catF) && (lagF === "all" || i.lager === lagF);
        }).sort((a,b) => b.id - a.id).forEach(i => {
            const isOut = i.status !== "im Lager";
            const img = i.img || 'https://via.placeholder.com/80';
            
            let qtyOptions = "";
            for(let n=1; n<=10; n++) { qtyOptions += `<option value="${n}" ${i.qty == n ? 'selected' : ''}>${n}</option>`; }

            list.innerHTML += `
                <div class="item-card">
                    <div class="item-left">
                        <img src="${img}" class="item-thumb" onclick="openZoom('${img}')">
                        <div class="item-info">
                            <div class="item-title-row">
                                <span class="item-title">${i.name}</span>
                                <select class="qty-select" onchange="updateQty(${i.id}, this.value)">${qtyOptions}</select>
                            </div>
                            <small style="color:#777; font-size:0.7rem;">${i.cat}</small>
                            ${isOut ? `<div style="color:var(--danger); font-size:0.65rem; font-weight:bold;">Bei: ${i.outUser}</div>` : ""}
                        </div>
                    </div>

                    <div class="action-group">
                        <button class="btn-status-small" 
                                style="background:${isOut ? 'var(--danger)' : 'var(--success)'}" 
                                onclick="toggleStatus(${i.id})">
                            ${isOut ? 'Einlagern' : 'Auslagern'}
                        </button>
                        <button class="delete-icon-btn" onclick="deleteItem(${i.id})">🗑️</button>
                    </div>
                </div>`;
        });
    }

    function updateQty(id, val) { const i = state.items.find(x => x.id === id); i.qty = val; dbRef.child('items').set(state.items); }
    function toggleStatus(id) { const i = state.items.find(x => x.id === id); const isIn = i.status === "im Lager"; i.status = isIn ? "ausgeliehen" : "im Lager"; i.outUser = isIn ? state.user : ""; dbRef.child('items').set(state.items); }
    function deleteItem(id) { if(confirm("Löschen?")) { state.items = state.items.filter(i => i.id !== id); dbRef.child('items').set(state.items); } }
    
    function saveItem() {
        const n = document.getElementById('itemName').value;
        if(!n) return;
        const newItem = { id: Date.now(), name: n, cat: document.getElementById('itemCatSelect').value, lager: document.getElementById('itemLagerSelect').value, img: "", status: "im Lager", qty: 1 };
        const f = document.getElementById('itemImg').files[0];
        if(f) {
            const r = new FileReader();
            r.onload = (e) => { newItem.img = e.target.result; state.items.push(newItem); dbRef.child('items').set(state.items); };
            r.readAsDataURL(f);
        } else { state.items.push(newItem); dbRef.child('items').set(state.items); }
        document.getElementById('itemName').value = "";
        switchTab({currentTarget: document.querySelectorAll('.tab-btn')[0]}, 'tab-lager');
    }

    function openZoom(src) { if(!src || src.includes('via.placeholder')) return; document.getElementById('zoomImg').src = src; document.getElementById('lightbox').style.display = 'flex'; }
    function switchTab(e, id) { document.querySelectorAll('.content').forEach(c => c.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); e.currentTarget.classList.add('active'); }
    function logout() { localStorage.removeItem('lagerAuthorizedUser'); location.reload(); }

    window.onload = () => {
        const saved = localStorage.getItem('lagerAuthorizedUser');
        if(saved) { state.user = saved; document.getElementById('login-screen').style.display = 'none'; document.getElementById('mainApp').style.display = 'flex'; document.getElementById('userDisplay').innerText = saved; initApp(); }
    };
</script>
</body>
</html>
