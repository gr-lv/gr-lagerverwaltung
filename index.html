<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lager Profi | Haus-Background V31</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --glass: rgba(255, 255, 255, 0.7); }
        
        /* FESTES HINTERGRUNDBILD (LOKALER LINK) */
        html, body { 
            height: 100%; 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            color: #111827; 
            padding-bottom: 80px;
        }
        body {
            background-image: url('haus_background.jpg'); /* Nutzt das hochgeladene Bild */
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }

        /* MODERNES INTERFACE MIT TRANSPARENZ */
        .glass-panel {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            padding: 20px;
            margin-bottom: 15px;
        }

        /* HEADER & NAVIGATION */
        .header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(5px);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .user-info { font-weight: bold; color: var(--accent); }
        .btn-header { background: rgba(255,255,255,0.1); color: white; border: 1px solid white; border-radius: 8px; padding: 6px 12px; cursor: pointer; }

        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(5px);
            display: flex;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }
        .tab-btn { flex: 1; padding: 18px; border: none; background: none; font-weight: bold; color: #9ca3af; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { color: white; border-bottom: 4px solid var(--accent); }

        /* CONTENT ELEMENTS */
        .content { display: none; padding: 15px; max-width: 800px; margin: auto; }
        .content.active { display: block; }
        
        .card { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            margin-bottom: 10px;
        }
        .thumb { width: 65px; height: 65px; object-fit: cover; border-radius: 10px; background: rgba(0,0,0,0.1); }

        /* BUCHUNGS-BUTTONS */
        .btn-book { 
            width: 110px; 
            padding: 12px; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            color: white; 
            cursor: pointer; 
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .btn-book:disabled { background: #9ca3af !important; cursor: not-allowed; opacity: 0.5; }

        /* FORMS */
        input, select { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 1px solid rgba(255,255,255,0.3); 
            border-radius: 10px; 
            box-sizing: border-box; 
            background: rgba(255,255,255,0.8);
        }
        .btn-main { 
            width: 100%; 
            padding: 15px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn-main:disabled { background: #9ca3af; cursor: not-allowed; }

        /* CAT MANAGER */
        .cat-tag { background: rgba(0,0,0,0.05); padding: 5px 10px; border-radius: 15px; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; margin: 2px; }
        .cat-del { color: #dc2626; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div class="user-info">👤 <span id="displayUser">Nicht angemeldet</span></div>
    <button class="btn-header" onclick="askForName()">Wechseln</button>
</div>

<div id="tab-lager" class="content active">
    <input type="text" id="searchInput" placeholder="🔍 Suchen..." onkeyup="render()">
    <div id="itemList"></div>
</div>

<div id="tab-log" class="content">
    <div class="glass-panel">
        <h3 style="margin-top:0">Logbuch</h3>
        <div id="logList"></div>
    </div>
</div>

<div id="tab-neu" class="content">
    <div class="glass-panel">
        <h3 style="margin-top:0">Neuer Artikel</h3>
        <input type="text" id="itemName" placeholder="Bezeichnung">
        <select id="itemCat"></select>
        <input type="file" id="itemImg" accept="image/*" capture="environment">
        <button id="saveBtn" class="btn-main" onclick="saveItem()" disabled>Speichern (Name Erforderlich)</button>
    </div>

    <div class="glass-panel">
        <h3 style="margin-top:0">Kategorien verwalten</h3>
        <div style="display:flex; gap:10px">
            <input type="text" id="newCatInput" placeholder="Neue...">
            <button onclick="addCategory()" style="padding: 10px; background: var(--accent); color:white; border:none; border-radius:8px;">+</button>
        </div>
        <div id="catList" style="display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px;"></div>
    </div>
</div>

<nav>
    <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">Lager</button>
    <button class="tab-btn" onclick="switchTab(event, 'tab-log')">Logbuch</button>
    <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">Neu</button>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('lager_v31_background');

    let state = {
        user: localStorage.getItem('lagerUser') || null,
        items: [],
        logs: [],
        cats: ["Werkzeug", "Technik", "Garten", "Küche"]
    };

    function init() {
        if (!state.user) { setTimeout(askForName, 500); } else { updateUserUI(); }
        dbRef.on('value', (snap) => {
            const data = snap.val();
            if (data) {
                state.items = data.items || [];
                state.logs = data.logs || [];
                state.cats = data.cats || ["Werkzeug", "Technik", "Garten", "Küche"];
                render();
            }
        });
    }

    function askForName() {
        let name = prompt("Dein Name für das Logbuch:");
        if (name && name.trim() !== "") {
            state.user = name.trim();
            localStorage.setItem('lagerUser', state.user);
            updateUserUI();
        }
    }

    function updateUserUI() {
        document.getElementById('displayUser').innerText = state.user || "Anmelden";
        document.getElementById('saveBtn').disabled = !state.user;
        document.getElementById('saveBtn').innerText = state.user ? "Speichern" : "Speichern (Anmelden)";
        render();
    }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    function saveItem() {
        const name = document.getElementById('itemName').value;
        const cat = document.getElementById('itemCat').value;
        const file = document.getElementById('itemImg').files[0];
        if (!name) return alert("Bezeichnung fehlt!");
        const reader = new FileReader();
        reader.onload = function(e) {
            state.items.unshift({ id: Date.now(), name: name, cat: cat, img: e.target.result || "", status: "im Lager" });
            addLog(name, "Neu angelegt");
            sync();
            document.getElementById('itemName').value = "";
            switchTab({currentTarget: document.querySelector('nav button')}, 'tab-lager');
        };
        if (file) reader.readAsDataURL(file); else reader.onload({target:{result:""}});
    }

    function toggleStatus(id) {
        if (!state.user) return askForName();
        const item = state.items.find(i => i.id === id);
        const action = item.status === "im Lager" ? "ausgebucht" : "eingebucht";
        if (confirm(`"${item.name}" wirklich ${action}?`)) {
            item.status = (item.status === "im Lager") ? "unterwegs" : "im Lager";
            addLog(item.name, action === "ausgebucht" ? "Weg" : "Holen");
            sync();
        }
    }

    function addLog(itemName, action) {
        state.logs.unshift({ time: new Date().toLocaleString('de-DE'), user: state.user, item: itemName, action: action });
    }

    function addCategory() {
        const input = document.getElementById('newCatInput');
        if (input.value) { state.cats.push(input.value); input.value = ""; sync(); }
    }

    function deleteCategory(index) {
        if (confirm("Löschen?")) { state.cats.splice(index, 1); sync(); }
    }

    function sync() { dbRef.set(state); }

    function render() {
        const list = document.getElementById('itemList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        list.innerHTML = "";
        
        state.items.filter(i => i.name.toLowerCase().includes(search)).forEach(i => {
            const isOut = i.status !== "im Lager";
            list.innerHTML += `
                <div class="glass-panel card">
                    <img src="${i.img || 'https://via.placeholder.com/70'}" class="thumb">
                    <div style="flex:1">
                        <div style="font-weight:bold">${i.name}</div>
                        <div style="font-size:0.8rem; color:#444">${i.cat}</div>
                    </div>
                    <button class="btn-book" onclick="toggleStatus(${i.id})" 
                        style="background:${isOut?'#16a34a':'#dc2626'};"
                        ${!state.user ? 'disabled' : ''}>
                        <span>${isOut ? 'Einbuchen' : 'Ausbuchen'}</span>
                        <span style="font-size:0.7rem; opacity:0.7">${isOut ? '(Holen)' : '(Weg)'}</span>
                    </button>
                </div>`;
        });

        const sel = document.getElementById('itemCat');
        const cList = document.getElementById('catList');
        sel.innerHTML = ""; cList.innerHTML = "";
        state.cats.forEach((c, index) => {
            sel.innerHTML += `<option value="${c}">${c}</option>`;
            cList.innerHTML += `<span class="cat-tag">${c} <span class="cat-del" onclick="deleteCategory(${index})">×</span></span>`;
        });

        const lList = document.getElementById('logList');
        lList.innerHTML = state.logs.slice(0, 30).map(l => `
            <div style="font-size:0.8rem; background:rgba(255,255,255,0.1); padding:8px; margin-bottom:5px; border-radius:8px; border-left:3px solid var(--primary)">
                <strong>${l.user}</strong>: ${l.item} <br> <span style="color:var(--primary)">(${l.action})</span> | <span style="color:gray">${l.time}</span>
            </div>
        `).join('');
    }

    init();
</script>
</body>
</html>
