<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lager V163.6 - iOS Force Print</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --accent: #06b6d4; --danger: #ef4444; --success: #10b981; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100%; font-family: sans-serif; background-color: #000; color: white; overflow: hidden; }
        .global-bg { position: fixed; inset: 0; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('haus_background.jpg') no-repeat center center; background-size: cover; z-index: 1; }
        
        #ui-wrapper { position: relative; z-index: 10; height: 100vh; display: none; flex-direction: column; }
        .header { background: rgba(0,0,0,0.95); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .content-area { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 100px; }

        /* ITEM CARD */
        .item-card { background: rgba(255,255,255,0.98); border-radius: 12px; margin-bottom: 12px; padding: 10px; color: #000; display: flex; gap: 10px; border-left: 6px solid var(--accent); }
        .item-thumb { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; background: #eee; flex-shrink: 0; }
        .item-info { flex: 1; min-width: 0; }
        .item-name { font-weight: 900; font-size: 0.9rem; color: #1e293b; }
        .qr-side { width: 50px; height: 50px; background: white; padding: 3px; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .qr-side span { font-size: 0.4rem; color: #000; font-weight: bold; }

        .btn-status { border: none; padding: 8px 2px; border-radius: 6px; color: white; font-weight: bold; width: 48px; font-size: 0.6rem; }
        .btn-in { background: var(--success); }
        .btn-out { background: var(--danger); }
        .form-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; margin-bottom: 10px; box-sizing: border-box; background: white; color: black; }
        
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #030712; display: flex; height: 70px; border-top: 2px solid var(--accent); z-index: 100; }
        .tab-btn { flex: 1; border: none; background: none; color: #94a3b8; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; }
        .tab-btn.active { color: white; background: rgba(6, 182, 212, 0.2); border-top: 4px solid var(--accent); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; padding: 20px; flex-direction: column; }

        /* --- DER ULTIMATIVE IPHONE PRINT FIX --- */
        @media print {
            /* Deaktiviert alle Browser-Elemente */
            @page { size: 21mm 21mm; margin: 0 !important; }
            html, body { background: #fff !important; width: 21mm !important; height: 21mm !important; margin: 0 !important; padding: 0 !important; overflow: hidden !important; }
            
            /* Alles ausblenden außer dem Print-Area */
            body > *:not(#print-area) { display: none !important; }
            
            #print-area {
                display: flex !important;
                position: fixed !important;
                top: 0 !important;
                left: 0 !important;
                width: 21mm !important;
                height: 21mm !important;
                z-index: 99999 !important;
                background: white !important;
                flex-direction: column !important;
                align-items: center !important;
                justify-content: center !important;
                visibility: visible !important;
            }
            #print-area * { color: black !important; visibility: visible !important; }
            #print-qr { width: 13mm !important; height: 13mm !important; }
            #print-location { font-size: 5pt !important; margin-bottom: 0.5mm !important; font-weight: bold !important; }
            #print-name { font-size: 4pt !important; width: 19mm !important; text-align: center !important; }
        }
    </style>
</head>
<body>

<div id="print-area">
    <div id="print-location"></div>
    <img id="print-qr" src="">
    <div id="print-name"></div>
</div>

<div class="global-bg"></div>

<div id="loginScreen" style="position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.98);">
    <div style="background:#1e293b; padding:30px; border-radius:20px; border:2px solid var(--accent); text-align:center; width:280px;">
        <h2 style="color:var(--accent);">GR-LAGER</h2>
        <input type="text" id="loginName" class="form-input" placeholder="Name">
        <input type="password" id="loginPass" class="form-input" placeholder="Passwort">
        <button onclick="checkLogin()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:bold;">START</button>
    </div>
</div>

<div id="ui-wrapper">
    <div class="header">
        <button onclick="startScanner()" style="background:none; border:none; font-size:1.5rem;">📷</button>
        <h2 style="margin:0; font-size:0.9rem;">V163.6</h2>
        <div id="displayUserName" style="font-size:0.75rem; color:var(--accent);"></div>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content">
            <input type="text" id="searchInput" placeholder="Suche..." onkeyup="render()" class="form-input">
            <select id="filterCategory" class="form-input" style="background:#1e293b; color:white;" onchange="render()"></select>
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content" style="display:none;">
            <div style="background:white; padding:15px; border-radius:15px; color:#000;">
                <input type="text" id="itemName" class="form-input" placeholder="Name">
                <input type="number" id="itemQty" class="form-input" value="1">
                <select id="itemLagerSelect" class="form-input"></select>
                <select id="itemCatSelect" class="form-input"></select>
                <div style="display:flex; gap:5px;">
                    <select id="itemRegalSelect" class="form-input" style="flex:1;"></select>
                    <select id="itemFachSelect" class="form-input" style="flex:1;"></select>
                </div>
                <button type="button" onclick="document.getElementById('itemImgInput').click()" class="form-input" style="background:#f3f4f6;">📷 FOTO AUFNEHMEN</button>
                <input type="file" id="itemImgInput" accept="image/*" capture="environment" style="display:none;" onchange="previewImage(this)">
                <img id="imagePreview" style="width:100%; height:80px; object-fit:contain; display:none; margin-bottom:10px;">
                <button onclick="saveNewItem(true)" style="width:100%; padding:15px; background:#000; color:white; border:none; border-radius:10px; font-weight:bold;">💾 SPEICHERN & DRUCKEN</button>
            </div>
        </div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">📦 LAGER</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">➕ NEU</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const mainRef = db.ref('lager_v90_multilager');
    let state = { user: "", items: [], config: {} };

    function checkLogin() {
        if(document.getElementById('loginName').value && document.getElementById('loginPass').value === "1234") {
            state.user = document.getElementById('loginName').value.toUpperCase();
            document.getElementById('displayUserName').innerText = state.user;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('ui-wrapper').style.display = 'flex';
            initApp();
        }
    }

    function initApp() {
        mainRef.on('value', snap => {
            state.config = snap.val() || {};
            state.items = Object.keys(state.config.items || {}).map(k => ({...state.config.items[k], key: k}));
            const fill = (ids, list) => ids.forEach(id => {
                const el = document.getElementById(id);
                if(el) el.innerHTML = (id === 'filterCategory' ? '<option value="">Alle</option>' : '') + (list||[]).map(v=>`<option value="${v}">${v}</option>`).join('');
            });
            fill(['itemLagerSelect'], state.config.locations);
            fill(['itemCatSelect', 'filterCategory'], state.config.cats);
            fill(['itemRegalSelect'], state.config.regale);
            fill(['itemFachSelect'], state.config.faecher);
            render();
        });
    }

    function render() {
        const s = document.getElementById('searchInput').value.toLowerCase();
        const f = document.getElementById('filterCategory').value;
        document.getElementById('itemList').innerHTML = state.items
            .filter(i => i.name.toLowerCase().includes(s) && (f === "" || i.cat === f))
            .sort((a,b) => b.ts - a.ts)
            .map(i => `
                <div class="item-card ${i.status !== 'im Lager' ? 'status-out' : ''}">
                    <img src="${i.img || 'https://via.placeholder.com/70'}" class="item-thumb">
                    <div class="item-info">
                        <div class="item-name">${i.name} <span>${i.qty||1}x</span></div>
                        <div style="font-size:0.6rem; color:#666;">${i.location} | R:${i.regal} F:${i.fach}</div>
                    </div>
                    <div class="qr-side" onclick="printLabel('${i.key}', '${i.location} R:${i.regal} F:${i.fach}', '${i.name}')">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${i.key}" style="width:100%;">
                        <span>PRINT</span>
                    </div>
                </div>`).join('');
    }

    function printLabel(key, meta, name) {
        document.getElementById('print-location').innerText = meta;
        document.getElementById('print-name').innerText = name;
        document.getElementById('print-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${key}`;
        
        // Warten bis QR geladen ist
        setTimeout(() => {
            window.print();
        }, 500);
    }

    function saveNewItem(print) {
        const n = document.getElementById('itemName').value; if(!n) return;
        const newRef = mainRef.child('items').push();
        const data = {
            name: n, qty: document.getElementById('itemQty').value,
            location: document.getElementById('itemLagerSelect').value,
            cat: document.getElementById('itemCatSelect').value,
            regal: document.getElementById('itemRegalSelect').value,
            fach: document.getElementById('itemFachSelect').value,
            img: document.getElementById('imagePreview').src || "",
            status: "im Lager", ts: Date.now()
        };
        newRef.set(data).then(() => {
            if(print) printLabel(newRef.key, `${data.location} R:${data.regal}`, data.name);
            switchTab(null, 'tab-lager');
        });
    }

    function previewImage(i) {
        if (i.files && i.files[0]) {
            const r = new FileReader();
            r.onload = e => { document.getElementById('imagePreview').src = e.target.result; document.getElementById('imagePreview').style.display='block'; };
            r.readAsDataURL(i.files[0]);
        }
    }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if(e) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active');
        }
    }
</script>
</body>
</html>
