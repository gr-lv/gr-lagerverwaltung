<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GR-Lager V163.46</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --accent: #06b6d4; --danger: #ef4444; --success: #10b981; }
        
        /* DRUCK-STEUERUNG FÜR 85x29 QUERFORMAT */
        @media print {
            @page { 
                size: 85mm 29mm; 
                margin: 0 !important; 
            }
            body { background: white !important; margin: 0 !important; }
            #ui-wrapper, .global-bg, nav, .header, #photo-overlay, .modal { display: none !important; }
            
            #print-section { 
                display: block !important; 
                width: 85mm !important; 
                height: 29mm !important; 
                position: absolute;
                top: 0;
                left: 0;
            }
            #print-image {
                width: 85mm !important;
                height: 29mm !important;
                display: block !important;
            }
        }

        /* UI STYLES */
        .global-bg { position: fixed; inset: 0; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)), url('haus_background.jpg') no-repeat center center; background-size: cover; z-index: 1; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100%; font-family: sans-serif; background-color: #000; color: white; overflow: hidden; }
        #ui-wrapper { position: relative; z-index: 10; height: 100vh; display: none; flex-direction: column; background: transparent; }

        .header { 
            background: rgba(0,0,0,0.9); 
            padding: calc(45px + env(safe-area-inset-top)) 15px 15px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--accent); 
        }

        .content-area { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: calc(100px + env(safe-area-inset-bottom)); background: rgba(0,0,0,0.3); }
        .item-card { background: rgba(255,255,255,0.95); border-radius: 12px; margin-bottom: 12px; padding: 10px; color: #000; display: flex; gap: 10px; border-left: 6px solid var(--accent); align-items: center; }
        .item-thumb { width: 65px; height: 65px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
        .item-info { flex: 1; min-width: 0; }
        .item-name { font-weight: 900; font-size: 0.85rem; color: #1e293b; }
        .item-meta { font-size: 0.6rem; color: #64748b; }
        
        .qr-side { width: 55px; height: 55px; background: white; padding: 3px; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .qr-side span { font-size: 0.4rem; color: #000; font-weight: bold; }
        
        .action-btns { display: flex; flex-direction: column; gap: 8px; align-items: center; border-left: 1px solid #ddd; padding-left: 10px; }
        .btn-status { border: none; padding: 8px 2px; border-radius: 6px; color: white; font-weight: bold; width: 50px; font-size: 0.7rem; }
        .btn-in { background: var(--success); }
        .btn-out { background: var(--danger); }
        
        .form-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; margin-bottom: 10px; box-sizing: border-box; }
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(3, 7, 18, 0.95); display: flex; height: calc(70px + env(safe-area-inset-bottom)); border-top: 2px solid var(--accent); z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .tab-btn { flex: 1; border: none; background: none; color: #94a3b8; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; }
        .tab-btn.active { color: white; background: rgba(6, 182, 212, 0.2); border-top: 4px solid var(--accent); }
        
        #photo-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #generated-label { width: 100%; max-width: 500px; border: 2px solid white; background: white; }
        #print-section { display: none; }
    </style>
</head>
<body>

<div id="print-section"><img id="print-image"></div>
<div class="global-bg"></div>

<div id="loginScreen" style="position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div style="background:rgba(30, 41, 59, 0.95); padding:30px; border-radius:20px; border:2px solid var(--accent); text-align:center; width: 85%; max-width: 320px;">
        <h2 style="color:var(--accent);">GR-LAGER</h2>
        <input type="text" id="loginName" class="form-input" placeholder="Name">
        <input type="password" id="loginPass" class="form-input" placeholder="Passwort">
        <button onclick="checkLogin()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:bold;">START</button>
    </div>
</div>

<div id="ui-wrapper">
    <div class="header">
        <button onclick="startScanner()" style="background:none; border:none; font-size:1.5rem;">📷</button>
        <h2 style="margin:0; font-size:0.9rem;">GR-LAGER V163.46</h2>
        <div id="displayUserName" style="font-size:0.75rem; color:var(--accent);"></div>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content">
            <input type="text" id="searchInput" placeholder="Suche..." onkeyup="render()" class="form-input">
            <select id="filterCategory" class="form-input" onchange="render()" style="background:#1e293b; color:white;"></select>
            <div id="itemList"></div>
        </div>
        <div id="tab-neu" class="content" style="display:none;">
            <div style="background:#fff; padding:15px; border-radius:15px; color:#000;">
                <h4>Neuer Artikel</h4>
                <input type="text" id="itemName" class="form-input" placeholder="Name">
                <input type="number" id="itemQty" class="form-input" value="1">
                <select id="itemLagerSelect" class="form-input"></select>
                <select id="itemCatSelect" class="form-input"></select>
                <button onclick="document.getElementById('itemImgInput').click()" class="form-input">📷 FOTO</button>
                <input type="file" id="itemImgInput" accept="image/*" capture="environment" style="display:none;" onchange="previewImage(this)">
                <img id="imagePreview" style="width:100%; height:100px; object-fit:contain; display:none; margin-bottom:10px;">
                <button onclick="saveNewItem(true)" style="width:100%; padding:15px; background:#000; color:white; border-radius:10px;">SPEICHERN & DRUCKEN</button>
            </div>
        </div>
        <div id="tab-log" class="content" style="display:none;"><div id="logList"></div></div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">📦 LAGER</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">⚙️ ADMIN</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-log')">📜 LOGS</button>
    </nav>
</div>

<div id="photo-overlay">
    <img id="generated-label">
    <div style="display:flex; gap:10px; width:100%; max-width:500px; margin-top:20px;">
        <button onclick="window.print()" style="flex:2; padding:20px; background:var(--success); color:white; border:none; border-radius:12px; font-weight:bold; font-size:1.2rem;">DRUCKEN</button>
        <button onclick="closePhotoOverlay()" style="flex:1; padding:20px; background:var(--danger); color:white; border:none; border-radius:12px; font-weight:bold;">X</button>
    </div>
</div>

<script>
    const APP_VERSION = 163.46;
    const firebaseConfig = { apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk", authDomain: "gr-lagerverwaltung.firebaseapp.com", databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app", projectId: "gr-lagerverwaltung", storageBucket: "gr-lagerverwaltung.firebasestorage.app", messagingSenderId: "561219570576", appId: "1:561219570576:web:65824b199a12933fd88115" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const mainRef = db.ref('lager_v90_multilager');
    let state = { user: "", items: [], config: {} };

    function printLabel(key, meta, name) {
        const w = 1004, h = 342; 
        const canvas = document.createElement('canvas'); canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        const qrImg = new Image(); qrImg.crossOrigin = "anonymous";
        qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${key}`;
        qrImg.onload = function() {
            ctx.fillStyle = "white"; ctx.fillRect(0, 0, w, h);
            ctx.drawImage(qrImg, 20, 20, 300, 300);
            ctx.fillStyle = "black"; ctx.textAlign = "left";
            ctx.font = "900 42px Arial"; ctx.fillText(meta || '-', 340, 75); 
            ctx.fillRect(340, 95, 620, 6);
            let fontSize = 95; ctx.font = `900 ${fontSize}px Arial`;
            while(ctx.measureText(name).width > 630 && fontSize > 30) { fontSize -= 5; ctx.font = `900 ${fontSize}px Arial`; }
            ctx.fillText(name, 340, 220); 
            const dataUrl = canvas.toDataURL("image/png");
            document.getElementById('generated-label').src = dataUrl;
            document.getElementById('print-image').src = dataUrl;
            document.getElementById('photo-overlay').style.display = 'flex';
        };
    }

    function checkLogin() {
        const u = document.getElementById('loginName').value;
        if(u && document.getElementById('loginPass').value === "1234") { 
            state.user = u.toUpperCase(); 
            document.getElementById('displayUserName').innerText = state.user; 
            document.getElementById('loginScreen').style.display = 'none'; 
            document.getElementById('ui-wrapper').style.display = 'flex'; 
            initApp(); 
        }
    }

    function initApp() {
        mainRef.on('value', snap => {
            state.config = snap.val() || {};
            state.items = Object.keys(state.config.items || {}).map(k => ({...state.config.items[k], key: k}));
            render();
            const fill = (id, list) => {
                const el = document.getElementById(id);
                if(el) el.innerHTML = (id.includes('filter') ? '<option value="">Alle</option>' : '') + (list||[]).map(v=>`<option value="${v}">${v}</option>`).join('');
            };
            fill('itemLagerSelect', state.config.locations); fill('itemCatSelect', state.config.cats); fill('filterCategory', state.config.cats);
        });
    }

    function render() {
        const s = document.getElementById('searchInput').value.toLowerCase();
        const f = document.getElementById('filterCategory').value;
        document.getElementById('itemList').innerHTML = state.items
            .filter(i => i.name.toLowerCase().includes(s) && (f === "" || i.cat === f))
            .sort((a,b) => b.ts - a.ts)
            .map(i => {
                const meta = `${i.location||''} R:${i.regal||'-'} F:${i.fach||'-'}`;
                return `<div class="item-card">
                    <img src="${i.img || 'https://via.placeholder.com/70'}" class="item-thumb">
                    <div class="item-info"><div class="item-name">${i.name} (${i.qty}x)</div><div class="item-meta">${meta}</div></div>
                    <div class="qr-side" onclick="printLabel('${i.key}', '${meta}', '${i.name}')">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${i.key}" style="width:40px;"><span>PRINT</span>
                    </div>
                    <div class="action-btns"><button onclick="toggleStatus('${i.key}', '${i.name}', '${i.status}')" class="btn-status ${i.status === 'im Lager'?'btn-in':'btn-out'}">${i.status === 'im Lager'?'IN':'OUT'}</button></div>
                </div>`;
            }).join('');
    }

    function toggleStatus(k, n, s) {
        const ns = s === "im Lager" ? "ausgeliehen" : "im Lager";
        mainRef.child('items/'+k).update({status: ns, lastUser: state.user});
    }

    function saveNewItem(p) {
        const n = document.getElementById('itemName').value; if(!n) return;
        const newRef = mainRef.child('items').push();
        const d = { name: n, qty: document.getElementById('itemQty').value, location: document.getElementById('itemLagerSelect').value, cat: document.getElementById('itemCatSelect').value, img: document.getElementById('imagePreview').src || "", status: "im Lager", ts: Date.now(), lastUser: state.user };
        newRef.set(d).then(() => { if(p) printLabel(newRef.key, d.location, d.name); switchTab(null, 'tab-lager'); });
    }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if(e) { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); e.currentTarget.classList.add('active'); }
    }

    function previewImage(i) {
        if (i.files && i.files[0]) {
            const r = new FileReader();
            r.onload = e => { document.getElementById('imagePreview').src = e.target.result; document.getElementById('imagePreview').style.display='block'; };
            r.readAsDataURL(i.files[0]);
        }
    }
    function closePhotoOverlay() { document.getElementById('photo-overlay').style.display = 'none'; }
</script>
</body>
</html>
