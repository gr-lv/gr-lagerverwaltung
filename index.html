<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V141</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --accent: #06b6d4; --danger: #ef4444; --success: #10b981; --glass: rgba(255, 255, 255, 0.95); }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100%; font-family: -apple-system, sans-serif; background-color: #000; color: white; overflow: hidden; }

        .global-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('haus_background.jpg') no-repeat center center;
            background-size: cover; z-index: 1;
        }

        #ui-wrapper { position: relative; z-index: 10; height: 100vh; display: none; flex-direction: column; }
        
        /* HEADER */
        .header { background: rgba(0,0,0,0.9); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .content-area { flex: 1; overflow-y: auto; padding: 10px 15px; padding-bottom: 100px; }

        /* ARTIKEL KARTEN */
        .item-card { background: var(--glass); border-radius: 12px; margin-bottom: 10px; padding: 12px; color: #000; display: flex; align-items: center; gap: 12px; position: relative; }
        .item-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; background: #eee; cursor: pointer; }
        .item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        .item-name { font-weight: 900; font-size: 1rem; margin-bottom: 2px; }
        .item-meta { font-size: 0.75rem; color: #334155; line-height: 1.3; }
        .item-meta b { color: #000; }
        
        .qr-side { width: 45px; height: 45px; background: white; padding: 2px; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; }
        .qr-img { width: 100%; height: 100%; }

        /* BUTTONS */
        .btn-status { border: none; padding: 10px; border-radius: 8px; color: white; font-weight: bold; min-width: 55px; font-size: 0.7rem; cursor: pointer; }
        .btn-in { background: var(--success); }
        .btn-out { background: var(--danger); }
        .btn-del { background: none; border: none; font-size: 1.2rem; padding: 5px; opacity: 0.4; }

        /* MODALS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; flex-direction: column; }
        .modal img { max-width: 90%; max-height: 70%; border: 2px solid var(--accent); border-radius: 10px; }
        #scanner-container { display: none; position: fixed; inset: 0; background: #000; z-index: 4000; flex-direction: column; }

        /* FORMS */
        .form-card { background: white; border-radius: 15px; padding: 15px; color: #000; margin-bottom: 15px; }
        .form-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 0.95rem; margin-bottom: 10px; box-sizing: border-box; }
        
        /* ADMIN SECTION */
        .admin-section { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; margin-top: 10px; }
        .list-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; }

        /* NAV */
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #030712; display: flex; height: 75px; border-top: 2px solid var(--accent); z-index: 100; }
        .tab-btn { flex: 1; border: none; background: none; color: #94a3b8; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; }
        .tab-btn.active { color: white; background: rgba(6, 182, 212, 0.2); border-top: 4px solid var(--accent); }
        .content { display: none; }
        .content.active { display: block; }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: fixed; inset: 0; background: white; text-align: center; color: black; padding: 40px; }
        }
    </style>
</head>
<body>

<div class="global-bg no-print"></div>

<div id="scanner-container">
    <div id="qr-reader" style="width: 100%;"></div>
    <button onclick="stopScanner()" style="margin: 20px auto; padding: 15px 40px; background: var(--danger); color: white; border: none; border-radius: 10px; font-weight: bold; align-self: center;">BEENDEN</button>
</div>

<div id="zoomModal" class="modal" onclick="this.style.display='none'">
    <img id="modalImg" src="">
    <h3 id="modalTitle" style="color:white; margin-top:15px; text-align:center; padding: 0 20px;"></h3>
</div>

<div id="loginScreen" class="no-print">
    <div class="login-box">
        <h2 style="color:var(--accent); margin-bottom:20px;">GR-LAGER LOGIN</h2>
        <input type="text" id="loginName" class="form-input" placeholder="Name">
        <input type="password" id="loginPass" class="form-input" placeholder="Passwort">
        <button onclick="checkLogin()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:bold;">LOGIN</button>
    </div>
</div>

<div id="print-area">
    <h1 id="p-name"></h1>
    <h2 id="p-loc"></h2>
    <img id="p-qr" src="" style="width: 200px; margin-top:30px;">
</div>

<div id="ui-wrapper" class="no-print">
    <div class="header">
        <button onclick="startScanner()" style="background:none; border:none; font-size:1.6rem;">📷</button>
        <h2 style="margin:0; font-size:1.1rem; letter-spacing:1px;">GR-LAGER</h2>
        <div id="displayUserName" style="font-size:0.7rem; color:var(--accent); font-weight:bold; border: 1px solid var(--accent); padding: 4px 8px; border-radius: 5px;">GUEST</div>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content active">
            <input type="text" id="searchInput" placeholder="Artikel suchen..." onkeyup="render()" style="width:100%; padding:12px; border-radius:10px; border:none; margin-bottom:15px; background:white; color:black;">
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div class="form-card">
                <input type="text" id="itemName" class="form-input" placeholder="Artikel Name">
                <select id="itemLagerSelect" class="form-input"></select>
                <select id="itemCatSelect" class="form-input" placeholder="Kategorie"></select>
                <div style="display:flex; gap:10px;">
                    <select id="itemRegalSelect" class="form-input"></select>
                    <select id="itemFachSelect" class="form-input"></select>
                </div>
                
                <div style="border:2px dashed #cbd5e1; padding:15px; text-align:center; margin-bottom:15px; border-radius:10px; cursor:pointer;" onclick="document.getElementById('itemImg').click()">
                    <span id="camText" style="color:#64748b; font-weight:bold;">📷 FOTO HINZUFÜGEN</span>
                    <img id="imagePreview" style="width:100%; height:120px; object-fit:contain; display:none;">
                </div>
                <input type="file" id="itemImg" accept="image/*" capture="environment" style="display:none;" onchange="previewImage(this)">
                
                <button onclick="saveAndPrint()" style="width:100%; padding:16px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:bold; font-size:1rem;">SPEICHERN & DRUCKEN</button>
            </div>

            <div class="admin-section">
                <h3 style="margin:0 0 10px 0; font-size:0.9rem; color:var(--accent);">⚙️ LISTEN VERWALTEN</h3>
                <div style="display:flex; gap:8px; margin-bottom:12px;">
                    <input type="text" id="addInput" class="form-input" placeholder="Neu hinzufügen..." style="margin:0;">
                    <button onclick="quickAdd()" style="background:var(--success); color:white; border:none; width:50px; border-radius:8px; font-size:1.5rem;">+</button>
                </div>
                <select id="manageType" class="form-input" onchange="updateManageList()" style="background:#1e293b; color:white; border-color:var(--accent);">
                    <option value="locations">Lagerorte</option>
                    <option value="cats">Kategorien</option>
                    <option value="regale">Regale</option>
                    <option value="faecher">Fächer</option>
                </select>
                <div id="listDisplay" style="max-height:150px; overflow-y:auto; background:rgba(0,0,0,0.2); border-radius:8px; padding:5px 10px;"></div>
            </div>
        </div>

        <div id="tab-log" class="content">
            <div id="logList"></div>
        </div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">📦 LAGER</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">➕ NEU / SETUP</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-log')">📜 LOG</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const mainRef = db.ref('lager_v90_multilager');
    let state = { user: "", items: [], config: {}, scanner: null };

    function checkLogin() {
        const u = document.getElementById('loginName').value;
        const p = document.getElementById('loginPass').value;
        if(u && p === "1234") {
            state.user = u.toUpperCase();
            document.getElementById('displayUserName').innerText = state.user;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('ui-wrapper').style.display = 'flex';
            initApp();
        }
    }

    function initApp() {
        mainRef.on('value', snap => {
            state.config = snap.val() || {};
            state.items = Object.keys(state.config.items || {}).map(k => ({...state.config.items[k], key: k}));
            
            const fill = (id, list) => {
                const el = document.getElementById(id);
                if(el) el.innerHTML = (list || []).map(v => `<option value="${v}">${v}</option>`).join('');
            };
            fill('itemLagerSelect', state.config.locations); 
            fill('itemCatSelect', state.config.cats);
            fill('itemRegalSelect', state.config.regale); 
            fill('itemFachSelect', state.config.faecher);
            
            render(); renderLogs(); updateManageList();
        });
    }

    function render() {
        const s = document.getElementById('searchInput').value.toLowerCase();
        document.getElementById('itemList').innerHTML = state.items
            .filter(i => i.name.toLowerCase().includes(s))
            .sort((a,b) => b.ts - a.ts)
            .map(i => {
                const qr = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${i.key}`;
                const thumb = i.img || 'https://via.placeholder.com/60?text=FOTO';
                return `
                <div class="item-card">
                    <img src="${thumb}" class="item-thumb" onclick="zoom('${thumb}', '${i.name}')">
                    <div class="item-info">
                        <div class="item-name">${i.name}</div>
                        <div class="item-meta">
                            <b>Kat:</b> ${i.cat || '-'}<br>
                            <b>Ort:</b> ${i.location}<br>
                            <b>Platz:</b> ${i.regal} / ${i.fach}
                        </div>
                    </div>
                    <div class="qr-side" onclick="zoom('${qr}', 'QR Code: ${i.name}')">
                        <img src="${qr}" class="qr-img">
                    </div>
                    <div style="display:flex; flex-direction:column; gap:5px; margin-left:5px;">
                        <button onclick="toggleStatus('${i.key}', '${i.name}', '${i.status}')" class="btn-status ${i.status === 'im Lager' ? 'btn-in' : 'btn-out'}">
                            ${i.status === 'im Lager' ? 'EIN' : 'AUS'}
                        </button>
                        <button onclick="deleteItem('${i.key}', '${i.name}')" class="btn-del">🗑️</button>
                    </div>
                </div>`;
            }).join('');
    }

    function zoom(src, title) {
        document.getElementById('modalImg').src = src;
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('zoomModal').style.display = 'flex';
    }

    function startScanner() {
        document.getElementById('scanner-container').style.display = 'flex';
        state.scanner = new Html5Qrcode("qr-reader");
        state.scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
            const item = state.items.find(x => x.key === txt);
            if(item) { toggleStatus(item.key, item.name, item.status); stopScanner(); }
        });
    }

    function stopScanner() {
        if(state.scanner) state.scanner.stop().then(() => document.getElementById('scanner-container').style.display='none');
    }

    function toggleStatus(key, name, old) {
        const newS = old === "im Lager" ? "ausgeliehen" : "im Lager";
        mainRef.child('items/'+key).update({ status: newS });
        mainRef.child('logs').push({ user: state.user, text: `${name}: ${newS}`, ts: Date.now(), date: new Date().toLocaleString() });
    }

    function saveAndPrint() {
        const n = document.getElementById('itemName').value;
        if(!n) return;
        const newRef = mainRef.child('items').push();
        const item = {
            name: n, 
            location: document.getElementById('itemLagerSelect').value,
            cat: document.getElementById('itemCatSelect').value,
            regal: document.getElementById('itemRegalSelect').value,
            fach: document.getElementById('itemFachSelect').value,
            img: document.getElementById('imagePreview').src || "",
            status: "im Lager", 
            ts: Date.now()
        };
        newRef.set(item).then(() => {
            document.getElementById('p-name').innerText = n;
            document.getElementById('p-loc').innerText = `${item.location} | ${item.regal}/${item.fach}`;
            document.getElementById('p-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${newRef.key}`;
            setTimeout(() => { 
                window.print(); 
                document.getElementById('itemName').value = "";
                document.getElementById('imagePreview').style.display = "none";
                document.getElementById('camText').style.display = "block";
                switchTab(null, 'tab-lager'); 
            }, 800);
        });
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('imagePreview').style.display = 'block';
                document.getElementById('camText').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    /* ADMIN FUNKTIONEN */
    function updateManageList() {
        const type = document.getElementById('manageType').value;
        const list = state.config[type] || [];
        document.getElementById('listDisplay').innerHTML = list.map((v, i) => `
            <div class="list-row">
                <span>${v}</span>
                <button onclick="removeFromList('${type}', ${i})" style="background:var(--danger); color:white; border:none; border-radius:4px; padding:2px 10px; cursor:pointer;">LÖSCHEN</button>
            </div>
        `).join('');
    }

    function quickAdd() {
        const type = document.getElementById('manageType').value;
        const val = document.getElementById('addInput').value;
        if(!val) return;
        let list = state.config[type] || [];
        list.push(val);
        mainRef.child(type).set(list);
        document.getElementById('addInput').value = "";
    }

    function removeFromList(type, i) {
        if(!confirm("Eintrag wirklich löschen?")) return;
        let list = state.config[type];
        list.splice(i, 1);
        mainRef.child(type).set(list);
    }

    function deleteItem(k, n) { if(confirm(n + " wirklich aus dem Lager entfernen?")) mainRef.child('items/'+k).remove(); }
    
    function renderLogs() {
        const logs = Object.values(state.config.logs || {}).sort((a,b) => b.ts - a.ts);
        document.getElementById('logList').innerHTML = logs.slice(0, 50).map(l => `
            <div style="background:rgba(255,255,255,0.1); padding:10px; border-radius:8px; margin-bottom:8px; font-size:0.8rem; border-left: 4px solid var(--accent);">
                <b style="color:var(--accent);">${l.user}</b>: ${l.text} <br><small style="opacity:0.6;">${l.date}</small>
            </div>
        `).join('');
    }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(e) e.currentTarget.classList.add('active');
        else document.querySelectorAll('.tab-btn')[0].classList.add('active');
    }
</script>
</body>
</html>
