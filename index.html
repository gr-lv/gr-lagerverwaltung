<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V83</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background: #0f172a; overflow: hidden; }

        /* Hintergrund-Layer */
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e293b url('haus_background.jpg') no-repeat center center; background-size: cover; z-index: -2; }
        .dark-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); z-index: -1; }

        .app-shell { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; }
        
        /* Header */
        .header { background: #0f172a; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .header h1 { margin: 0; font-size: 1rem; }

        .content-area { flex: 1; overflow-y: auto; padding: 15px 15px 100px 15px; -webkit-overflow-scrolling: touch; }

        /* Login-Ersatz (Einfaches Feld oben) */
        .user-config { background: rgba(255,255,255,0.9); padding: 10px; border-radius: 10px; margin-bottom: 15px; display: flex; gap: 10px; align-items: center; }

        /* Karten */
        .item-card { background: white; border-radius: 15px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.5); color: #333; }
        .card-inner { padding: 15px; display: flex; gap: 15px; align-items: center; }
        .thumb { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; }

        .btn-status { display: block; width: 100%; padding: 20px; border: none; color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f172a; display: flex; height: 70px; border-top: 2px solid var(--accent); z-index: 100; }
        .tab-btn { flex: 1; border: none; background: none; color: #9ca3af; font-weight: bold; font-size: 0.8rem; }
        .tab-btn.active { color: white; border-top: 4px solid var(--accent); }

        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .content { display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>

<div class="bg-layer"></div>
<div class="dark-overlay"></div>

<div class="app-shell">
    <div class="header">
        <h1>GR-Lagerverwaltung</h1>
    </div>

    <div class="content-area">
        <div class="user-config">
            <span style="font-size:0.8rem; font-weight:bold;">Wer bist du?</span>
            <input type="text" id="userNameInput" placeholder="Name eintragen..." onchange="saveUserName(this.value)" style="margin:0; padding:8px;">
        </div>

        <div id="tab-lager" class="content active">
            <div style="background:rgba(255,255,255,0.9); padding:10px; border-radius:10px; margin-bottom:15px;">
                <input type="text" id="searchInput" placeholder="Suchen..." onkeyup="render()" style="margin:0;">
                <select id="filterCatSelect" onchange="render()" style="margin-top:8px;"></select>
            </div>
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div class="item-card" style="padding:20px;">
                <h3 style="margin-top:0">Neuer Artikel</h3>
                <input type="text" id="itemName" placeholder="Bezeichnung">
                <select id="itemCatSelect"></select>
                <input type="file" id="itemImg" accept="image/*" capture="environment">
                <button onclick="saveItem()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; margin-top:10px;">ARTIKEL SPEICHERN</button>
            </div>
        </div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">LAGER</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">ANLEGEN</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('lager_v32_final');

    let state = { user: localStorage.getItem('lagerUser') || "", items: [], cats: [] };
    document.getElementById('userNameInput').value = state.user;

    function saveUserName(val) {
        state.user = val;
        localStorage.setItem('lagerUser', val);
        render();
    }

    function initApp() {
        dbRef.on('value', snap => {
            const data = snap.val();
            if(data) {
                state.items = data.items || [];
                state.cats = data.cats || ["Werkzeug", "Garten"];
                updateDropdowns();
                render();
            }
