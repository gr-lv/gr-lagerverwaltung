<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V137</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --accent: #06b6d4; --danger: #ef4444; --success: #10b981; --glass: rgba(255, 255, 255, 0.95); }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100%; font-family: -apple-system, sans-serif; background-color: #000; color: white; overflow: hidden; }

        .global-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('haus_background.jpg') no-repeat center center;
            background-size: cover; z-index: 1;
        }

        #ui-wrapper { position: relative; z-index: 10; height: 100vh; display: none; flex-direction: column; }
        #loginScreen { position: fixed; inset: 0; z-index: 2000; display: flex; align-items: center; justify-content: center; background: #000; }
        .login-box { background: rgba(30,41,59,0.95); padding: 30px; border-radius: 20px; border: 2px solid var(--accent); width: 280px; text-align: center; }

        .header { background: rgba(0,0,0,0.9); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .content-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }

        /* SCANNER OVERLAY */
        #scanner-container { display: none; position: fixed; inset: 0; background: #000; z-index: 3000; flex-direction: column; align-items: center; justify-content: center; }

        /* ITEM CARDS */
        .item-card { background: var(--glass); border-radius: 12px; margin-bottom: 10px; padding: 12px; color: #000; display: flex; align-items: center; gap: 10px; }
        .item-thumb { width: 55px; height: 55px; object-fit: cover; border-radius: 8px; border: 1px solid #ccc; background: #eee; }
        .qr-side { display: flex; flex-direction: column; align-items: center; }
        .qr-img { width: 40px; height: 40px; background: white; padding: 2px; border: 1px solid #ddd; }
        .item-info { flex: 1; min-width: 0; }
        
        .btn-status { border: none; padding: 10px 8px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; min-width: 60px; font-size: 0.7rem; }
        .btn-in { background: var(--success); }
        .btn-out { background: var(--danger); }

        /* LOG */
        .log-entry { background: rgba(255,255,255,0.1); padding: 8px; border-radius: 8px; margin-bottom: 5px; font-size: 0.75rem; border-left: 3px solid var(--accent); }

        /* PRINT */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: fixed; left: 0; top: 0; width: 100%; display: block !important; padding: 10mm; background: white; text-align: center; color: black; }
        }
        #print-area { display: none; }

        /* FORMS */
        .form-card { background: white; border-radius: 12px; padding: 15px; color: #000; margin-bottom: 20px; }
        .form-row { display: flex; align-items: center; margin-bottom: 10px; gap: 8px; }
        .form-label { width: 70px; font-size: 0.7rem; font-weight: bold; color: #666; }
        .form-input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 0.9rem; }
        
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #030712; display: flex; height: 75px; border-top: 2px solid var(--accent); z-index: 100; }
        .tab-btn { flex: 1; border: none; background: none; color: #94a3b8; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; }
        .tab-btn.active { color: white; background: rgba(6, 182, 212, 0.2); border-top: 4px solid var(--accent); }
        .content { display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>

<div class="global-bg no-print"></div>

<div id="scanner-container">
    <div id="qr-reader" style="width: 100%;"></div>
    <button onclick="stopScanner()" style="margin-top:20px; padding:15px; background:var(--danger); color:white; border:none; border-radius:10px; width:80%;">ABBRECHEN</button>
</div>

<div id="loginScreen" class="no-print">
    <div class="login-box">
        <h2 style="color:var(--accent); font-weight:900;">GR-LOGIN</h2>
        <input type="text" id="loginName" class="form-input" style="width:100%; margin-bottom:10px; background:#0f172a; color:white;" placeholder="Name">
        <input type="password" id="loginPass" class="form-input" style="width:100%; margin-bottom:15px; background:#0f172a; color:white;" placeholder="Passwort">
        <button onclick="checkLogin()" style="width:100%; padding:14px; background:var(--accent); color:white; border:none; border-radius:8px; font-weight:bold;">START</button>
    </div>
</div>

<div id="print-area">
    <h2 id="p-name"></h2>
    <div id="p-loc" style="font-size: 16pt;"></div>
    <img id="p-qr" src="" style="width: 150px; margin-top: 15px;">
</div>

<div id="ui-wrapper" class="no-print">
    <div class="header">
        <div class="user-area">
            <button onclick="startScanner()" style="background:none; border:none; font-size:1.6rem;">📷</button>
            <span id="displayUserName">GUEST</span>
        </div>
        <h1>GR-LAGER</h1>
        <button onclick="location.reload()" style="background:none; border:none; font-size:1.2rem; color:var(--accent);">🚪</button>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content active">
            <input type="text" id="searchInput" placeholder="Suchen..." onkeyup="render()" style="width:100%; padding:12px; border-radius:8px; border:none; margin-bottom:15px;">
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div class="form-card">
                <div class="form-row"><span class="form-label">Name</span><input type="text" id="itemName" class="form-input"></div>
                <div class="form-row"><span class="form-label">Lager</span><select id="itemLagerSelect" class="form-input"></select></div>
                <div class="form-row"><span class="form-label">Regal</span><select id="itemRegalSelect" class="form-input"></select></div>
                <div class="form-row"><span class="form-label">Fach</span><select id="itemFachSelect" class="form-input"></select></div>
                
                <div style="border:2px dashed var(--accent); padding:15px; text-align:center; margin:10px 0; border-radius:8px; cursor:pointer;" onclick="document.getElementById('itemImg').click()">
                    <span id="camText">📷 ARTIKEL-FOTO MACHEN</span>
                    <img id="imagePreview" style="width:100%; height:120px; object-fit:contain; display:none;">
                </div>
                <input type="file" id="itemImg" accept="image/*" capture="environment" style="display:none;" onchange="previewImage(this)">
                
                <button onclick="saveAndPrint()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:bold;">SPEICHERN & DRUCKEN</button>
            </div>
        </div>

        <div id="tab-log" class="content"><div id="logList"></div></div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">📦 LAGER</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">➕ NEU</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-log')">📜 LOG</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const mainRef = db.ref('lager_v90_multilager');
    let state = { user: "", items: [], logs: [] };
    let html5QrCode;

    function checkLogin() {
        const n = document.getElementById('loginName').value;
        if(n && document.getElementById('loginPass').value === "1234") {
            state.user = n.toUpperCase();
            document.getElementById('displayUserName').innerText = state.user;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('ui-wrapper').style.display = 'flex';
            initApp();
        }
    }

    function initApp() {
        mainRef.on('value', snap => {
            const data = snap.val() || {};
            state.items = Object.keys(data.items || {}).map(k => ({...data.items[k], key: k}));
            state.logs = Object.values(data.logs || {}).sort((a,b) => b.ts - a.ts);
            
            const fill = (id, list) => {
                const el = document.getElementById(id);
                if(el) el.innerHTML = (list || ["-"]).map(v => `<option value="${v}">${v}</option>`).join('');
            };
            fill('itemLagerSelect', data.locations); fill('itemRegalSelect', data.regale); fill('itemFachSelect', data.faecher);
            render(); renderLogs();
        });
    }

    function render() {
        const s = document.getElementById('searchInput').value.toLowerCase();
        document.getElementById('itemList').innerHTML = state.items
            .filter(i => i.name.toLowerCase().includes(s))
            .map(i => {
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${i.key}`;
                const thumb = i.img || 'https://via.placeholder.com/60?text=BILD';
                const isOut = i.status !== "im Lager";
                return `
                <div class="item-card">
                    <img src="${thumb}" class="item-thumb" onclick="window.alert('Großansicht folgt...')">
                    <div class="item-info">
                        <div style="font-weight:900;">${i.name}</div>
                        <div style="font-size:0.65rem; color:#666;">📍 ${i.location} | ${i.regal}/${i.fach}</div>
                    </div>
                    <div class="qr-side"><img src="${qrUrl}" class="qr-img"></div>
                    <button onclick="toggleStatus('${i.key}', '${i.name}', '${i.status}')" class="btn-status ${isOut ? 'btn-out' : 'btn-in'}">
                        ${isOut ? 'AUS' : 'EIN'}
                    </button>
                    <button onclick="deleteItem('${i.key}', '${i.name}')" style="background:none; border:none; font-size:1.1rem; opacity:0.3;">🗑️</button>
                </div>`;
            }).join('');
    }

    function toggleStatus(key, name, oldStatus) {
        const newS = (oldStatus === "im Lager") ? "ausgeliehen" : "im Lager";
        mainRef.child('items/'+key).update({ status: newS });
        mainRef.child('logs').push({ user: state.user, text: `${name}: ${newS}`, ts: Date.now(), date: new Date().toLocaleString() });
    }

    function deleteItem(k, n) {
        if(confirm(n + " wirklich löschen?")) {
            mainRef.child('items/'+k).remove();
            mainRef.child('logs').push({ user: state.user, text: `GELÖSCHT: ${n}`, ts: Date.now(), date: new Date().toLocaleString() });
        }
    }

    function saveAndPrint() {
        const n = document.getElementById('itemName').value;
        if(!n) return;
        const newRef = mainRef.child('items').push();
        const item = {
            name: n, location: document.getElementById('itemLagerSelect').value,
            regal: document.getElementById('itemRegalSelect').value,
            fach: document.getElementById('itemFachSelect').value,
            img: document.getElementById('imagePreview').src || "",
            status: "im Lager", qty: 1, ts: Date.now()
        };
        newRef.set(item);
        
        document.getElementById('p-name').innerText = n;
        document.getElementById('p-loc').innerText = `${item.location} | ${item.regal}/${item.fach}`;
        document.getElementById('p-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${newRef.key}`;

        setTimeout(() => { 
            window.print(); 
            document.getElementById('itemName').value = "";
            document.getElementById('imagePreview').style.display = "none";
            document.getElementById('camText').style.display = "block";
            switchTab(null, 'tab-lager');
        }, 800);
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('imagePreview').style.display = 'block';
                document.getElementById('camText').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function startScanner() {
        document.getElementById('scanner-container').style.display = 'flex';
        html5QrCode = new Html5Qrcode("qr-reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
            const i = state.items.find(x => x.key === txt);
            if(i) { toggleStatus(i.key, i.name, i.status); stopScanner(); }
        });
    }

    function stopScanner() {
        if(html5QrCode) html5QrCode.stop().then(() => document.getElementById('scanner-container').style.display='none');
    }

    function renderLogs() {
        document.getElementById('logList').innerHTML = state.logs.slice(0, 30).map(l => `<div class="log-entry"><b>${l.user}</b>: ${l.text}<br><small>${l.date}</small></div>`).join('');
    }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(e) e.currentTarget.classList.add('active');
        else document.querySelectorAll('.tab-btn')[0].classList.add('active');
    }
</script>
</body>
</html>
