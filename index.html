<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lagerverwaltung | Anonym Fix</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        :root { --primary: #4338ca; --dark: #1e1b4b; }
        body { font-family: sans-serif; margin: 0; background: #0f172a; color: white; text-align: center; }
        #login-overlay { position: fixed; inset: 0; background: #1e1b4b; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .btn-start { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        .content { display: none; padding: 20px; }
        .content.active { display: block; }
    </style>
</head>
<body>

<div id="login-overlay">
    <h1>Lagerverwaltung</h1>
    <p>Anonyme Anmeldung</p>
    <button class="btn-start" onclick="loginAnonymously()">App starten</button>
</div>

<div id="main-app" class="content">
    <div style="background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
        Angemeldet als Gast | <button onclick="logout()" style="background:none; color:red; border:none; cursor:pointer;">Logout</button>
    </div>
    <h2>Lager Übersicht</h2>
    <div id="list">Lade Daten...</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('lager_v28_anonym');

    function loginAnonymously() {
        firebase.auth().signInAnonymously()
            .catch(error => alert("Login-Fehler: " + error.message));
    }

    firebase.auth().onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-app').classList.add('active');
            loadData();
        } else {
            document.getElementById('login-overlay').style.display = 'flex';
            document.getElementById('main-app').classList.remove('active');
        }
    });

    function logout() { firebase.auth().signOut().then(() => location.reload()); }

    function loadData() {
        dbRef.on('value', (snapshot) => {
            const data = snapshot.val();
            const listDiv = document.getElementById('list');
            if (data && data.items) {
                listDiv.innerHTML = JSON.stringify(data.items); // Platzhalter für Render-Logik
            } else {
                listDiv.innerHTML = "Keine Daten vorhanden. Füge Artikel hinzu.";
            }
        });
    }
</script>
</body>
</html>
