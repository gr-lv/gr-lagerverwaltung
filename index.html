<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V71 - FINAL FIX</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; }
        
        body { 
            margin: 0; padding: 0; font-family: sans-serif; 
            background: #1e293b; color: #333; height: 100vh; overflow: hidden;
        }

        .app-shell { height: 100vh; display: flex; flex-direction: column; }
        .header { background: #0f172a; color: white; padding: 10px; text-align: center; flex-shrink: 0; border-bottom: 2px solid var(--accent); }
        .content-area { flex: 1; overflow-y: auto; padding: 15px 15px 90px 15px; }

        .glass { 
            background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: relative;
        }

        /* CARD */
        .card-container { display: flex; flex-direction: column; gap: 10px; border: 1px solid #eee; }
        .btn-del { position: absolute; top: 5px; right: 5px; background: #ff4444; color: white; border: none; border-radius: 5px; padding: 5px 10px; z-index: 100; }

        /* BUTTON FIX: TOTAL ISOLATION */
        .big-action-btn {
            display: block; width: 100%; padding: 20px; margin-top: 10px;
            border: none; border-radius: 10px; color: white; font-weight: bold;
            font-size: 1.1rem; cursor: pointer;
            position: relative; z-index: 999999 !important; /* Über allem! */
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            -webkit-tap-highlight-color: transparent;
        }

        select, input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f172a; display: flex; height: 65px; z-index: 1000000; }
        .tab-btn { flex: 1; border: none; background: none; color: #9ca3af; font-size: 0.7rem; font-weight: bold; }
        .tab-btn.active { color: white; border-top: 4px solid var(--accent); }

        .content { display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="header">
        <h2 style="margin:0; font-size:1.1rem;">GR-LAGER V71</h2>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content active">
            <div id="reader" style="display:none; margin-bottom:10px;"></div>
            <div class="glass" style="display:flex; gap:5px;">
                <input type="text" id="searchInput" placeholder="Suche..." onkeyup="render()">
                <button onclick="startScan('search')" style="background:var(--accent); color:white; border:none; border-radius:8px; width:50px;">📷</button>
            </div>
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div class="glass">
                <h3>Neu Einlagern</h3>
                <input type="text" id="itemName" placeholder="Name des Artikels">
                <div style="display:flex; gap:5px;">
                    <input type="text" id="itemBarcode" placeholder="Barcode (optional)">
                    <button onclick="startScan('new')" style="background:var(--accent); color:white; border:none; border-radius:8px; width:50px;">📷</button>
                </div>
                
                <label style="font-size:0.8rem; font-weight:bold;">Kategorie:</label>
                <select id="itemCatSelect"></select>
                
                <div style="margin-top:15px; border-top:1px solid #ddd; padding-top:10px;">
                    <label style="font-size:0.8rem;">Kategorie verwalten:</label>
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="newCatInput" placeholder="Neue hinzufügen...">
                        <button onclick="addCategory()" style="background:var(--success); color:white; border:none; border-radius:8px; padding:0 15px;">+</button>
                    </div>
                </div>

                <input type="file" id="itemImg" accept="image/*" capture="environment">
                <button onclick="saveItem()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; margin-top:15px; font-weight:bold;">ARTIKEL SPEICHERN</button>
            </div>
        </div>

        <div id="tab-log" class="content">
            <div class="glass"><h3>Logbuch</h3><div id="logList"></div></div>
        </div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">LAGER</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">NEU EINLAGERN</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-log')">LOG</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('lager_v32_final');

    let state = { user: localStorage.getItem('lagerUser') || "User_"+Math.floor(Math.random()*999), items: [], logs: [], cats: ["Werkzeug", "Garten", "Elektro"] };
    let html5QrCode = null;

    function init() {
        if(!localStorage.getItem('lagerUser')) localStorage.setItem('lagerUser', state.user);
        dbRef.on('value', snap => {
            const data = snap.val();
            if(data) {
                state.items = data.items || [];
                state.logs = data.logs || [];
                if(data.cats) state.cats = data.cats;
                updateCatDropdown();
                render();
            }
        });
    }

    function updateCatDropdown() {
        document.getElementById('itemCatSelect').innerHTML = state.cats.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function addCategory() {
        const val = document.getElementById('newCatInput').value.trim();
        if(val && !state.cats.includes(val)) {
            state.cats.push(val);
            dbRef.child('cats').set(state.cats);
            document.getElementById('newCatInput').value = "";
        }
    }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    function saveItem() {
        const name = document.getElementById('itemName').value;
        if(!name) return alert("Name eingeben!");
        const newItem = { id: Date.now(), name: name, barcode: document.getElementById('itemBarcode').value, qty: 1, cat: document.getElementById('itemCatSelect').value, img: "", status: "im Lager" };
        const f = document.getElementById('itemImg').files[0];
        if(f) {
            const r = new FileReader();
            r.onload = (e) => { newItem.img = e.target.result; state.items.unshift(newItem); dbRef.set(state); };
            r.readAsDataURL(f);
        } else { state.items.unshift(newItem); dbRef.set(state); }
        document.getElementById('itemName').value = "";
        switchTab({currentTarget: document.querySelectorAll('.tab-btn')[0]}, 'tab-lager');
    }

    function changeQty(id, val) {
        const i = state.items.find(x => x.id === id);
        i.qty = parseInt(val);
        dbRef.set(state);
    }

    function deleteItem(id) {
        if(confirm("Diesen Artikel löschen?")) {
            state.items = state.items.filter(x => x.id !== id);
            dbRef.set(state);
        }
    }

    // DIE FIX FUNKTION
    function handleAction(id) {
        console.log("Button geklickt für ID:", id);
        const i = state.items.find(x => x.id === id);
        const isIn = i.status === "im Lager";
        
        i.status = isIn ? "unterwegs" : "im Lager";
        i.outUser = isIn ? state.user : "";
        
        state.logs.unshift({ time: new Date().toLocaleString(), user: state.user, item: i.name, action: isIn ? "Ausgelagert" : "Eingelagert" });
        dbRef.set(state);
    }

    function startScan(t) {
        const r = document.getElementById('reader'); r.style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, text => {
            if(t === 'search') { document.getElementById('searchInput').value = text; render(); }
            else { document.getElementById('itemBarcode').value = text; }
            html5QrCode.stop().then(() => r.style.display = 'none');
        });
    }

    function render() {
        const list = document.getElementById('itemList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        list.innerHTML = "";
        
        state.items.filter(i => i.name.toLowerCase().includes(search) || (i.barcode && i.barcode.includes(search))).forEach(i => {
            const isOut = i.status !== "im Lager";
            let qtyHtml = `<select onchange="changeQty(${i.id}, this.value)" style="width:70px; display:inline;">`;
            for(let n=1; n<=50; n++) qtyHtml += `<option value="${n}" ${i.qty==n?'selected':''}>${n}</option>`;
            qtyHtml += `</select>`;

            const card = document.createElement('div');
            card.className = "glass card-container";
            card.innerHTML = `
                <button class="btn-del" onclick="deleteItem(${i.id})">LÖSCHEN</button>
                <div style="display:flex; gap:10px; align-items:center;">
                    <img src="${i.img || 'https://via.placeholder.com/80'}" style="width:80px; height:80px; object-fit:cover; border-radius:10px;">
                    <div style="flex:1;">
                        <b style="font-size:1.1rem; display:block;">${i.name}</b>
                        <small style="color:gray;">${i.cat}</small><br>
                        Menge: ${qtyHtml}
                        ${isOut ? `<div style="color:red; font-size:0.7rem; font-weight:bold; margin-top:5px;">BEI: ${i.outUser}</div>` : ""}
                    </div>
                </div>
                <button class="big-action-btn" 
                        style="background-color: ${isOut ? 'var(--danger)' : 'var(--success)'};"
                        onclick="handleAction(${i.id})">
                    ${isOut ? 'EINLAGERN' : 'AUSLAGERN'}
                </button>
            `;
            list.appendChild(card);
        });
        document.getElementById('logList').innerHTML = state.logs.slice(0,10).map(l => `<div style="font-size:0.7rem; padding:3px; border-bottom:1px solid #eee;">${l.user}: ${l.action} (${l.item})</div>`).join('');
    }

    init();
</script>
</body>
</html>
