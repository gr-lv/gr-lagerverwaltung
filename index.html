<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V94</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; --dark: #0f172a; }
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        
        body, html { margin: 0; padding: 0; background: #0f172a; color: white; height: 100%; overflow: hidden; }

        /* LOGIN - ABSOLUT SICHER */
        #login-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0f172a; z-index: 1000000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-container { 
            background: #1e293b; padding: 40px 20px; border-radius: 15px; 
            width: 90%; max-width: 350px; border: 3px solid var(--accent);
            display: block !important; /* Erzwingt Sichtbarkeit */
        }
        .login-container input { 
            width: 100%; padding: 15px; margin: 10px 0; 
            background: white; color: black; border: 2px solid #ccc; border-radius: 8px; font-size: 18px;
        }
        .login-btn { 
            width: 100%; padding: 18px; background: var(--primary); color: white; 
            border: none; border-radius: 8px; font-weight: bold; font-size: 20px; cursor: pointer; margin-top: 10px;
        }

        /* APP LAYOUT */
        #mainApp { display: none; height: 100vh; flex-direction: column; }
        .header { background: #000; padding: 15px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; }
        .content-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        
        /* FILTER & CARDS */
        .filter-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; color: black; }
        .item-card { background: white; border-radius: 12px; margin-bottom: 12px; color: black; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn-action { width: 100%; padding: 15px; border: none; color: white; font-weight: bold; font-size: 16px; }

        /* NAVBAR */
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; border-top: 1px solid #333; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; color: #777; font-weight: bold; text-decoration: none; }
        .nav-item.active { color: white; border-top: 4px solid var(--accent); }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-container">
        <h2 style="text-align:center; margin-top:0; color:var(--accent);">LAGER LOGIN</h2>
        <input type="text" id="user" placeholder="Name">
        <input type="password" id="pass" placeholder="Passwort">
        <button class="login-btn" onclick="tryLogin()">ANMELDEN</button>
        <p id="error-msg" style="color:red; text-align:center; display:none;">Login fehlgeschlagen!</p>
    </div>
</div>

<div id="mainApp">
    <div class="header">
        <span id="displayUser" style="color:var(--accent); font-weight:bold;"></span>
        <span style="font-weight:900;">GR-LAGER</span>
        <span onclick="location.reload()" style="font-size:0.7rem; color:#555;">LOGOUT</span>
    </div>

    <div class="content-area">
        <div id="view-list">
            <div class="filter-card">
                <input type="text" id="search" placeholder="🔍 Suchen..." onkeyup="render()" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">
                <div style="display:flex; gap:5px;">
                    <select id="selLager" onchange="render()" style="flex:1; padding:10px; border-radius:8px;"></select>
                    <select id="selCat" onchange="render()" style="flex:1; padding:10px; border-radius:8px;"></select>
                </div>
            </div>
            <div id="itemList"></div>
        </div>

        <div id="view-add" style="display:none;">
            <div class="item-card" style="padding:15px;">
                <h3 style="margin-top:0;">Neuer Artikel</h3>
                <input type="text" id="newName" placeholder="Bezeichnung" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">
                <select id="addLager" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px;"></select>
                <select id="addCat" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px;"></select>
                <input type="file" id="addImg" accept="image/*" capture="environment" style="margin-bottom:10px;">
                <button onclick="saveNewItem()" style="width:100%; padding:15px; background:var(--success); color:white; border:none; border-radius:10px; font-weight:bold;">SPEICHERN</button>
            </div>
            <div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:12px;">
                <p style="margin:0 0 10px 0; font-size:0.8rem;">Verwaltung:</p>
                <input type="text" id="newSettingName" placeholder="Neue Kategorie/Lager..." style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px;">
                <div style="display:flex; gap:10px;">
                    <button onclick="pushSetting('locations')" style="flex:1; padding:10px; background:#444; color:white; border:none; border-radius:8px;">+ Lager</button>
                    <button onclick="pushSetting('cats')" style="flex:1; padding:10px; background:#444; color:white; border:none; border-radius:8px;">+ Kat</button>
                </div>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item active" id="btn-list" onclick="changeTab('list')">LAGER</div>
        <div class="nav-item" id="btn-add" onclick="changeTab('add')">NEU</div>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('lager_v94');
    let state = { user: null, items: [], cats: [], locations: [] };

    function tryLogin() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value;
        if(u !== "" && p === "1234") {
            state.user = u;
            localStorage.setItem('gr_session', u);
            startApp();
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    function startApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        document.getElementById('displayUser').innerText = state.user;
        db.on('value', snap => {
            const d = snap.val() || {};
            state.items = d.items || [];
            state.cats = d.cats || ["Werkzeug", "Maschinen"];
            state.locations = d.locations || ["Lager 1", "Lager 2"];
            updateSelects();
            render();
        });
    }

    function updateSelects() {
        const catHtml = state.cats.map(c => `<option value="${c}">${c}</option>`).join('');
        const lagerHtml = state.locations.map(l => `<option value="${l}">${l}</option>`).join('');
        document.getElementById('selCat').innerHTML = `<option value="all">Alle Kategorien</option>` + catHtml;
        document.getElementById('selLager').innerHTML = `<option value="all">Alle Lager</option>` + lagerHtml;
        document.getElementById('addCat').innerHTML = catHtml;
        document.getElementById('addLager').innerHTML = lagerHtml;
    }

    function render() {
        const list = document.getElementById('itemList');
        const s = document.getElementById('search').value.toLowerCase();
        const fc = document.getElementById('selCat').value;
        const fl = document.getElementById('selLager').value;
        list.innerHTML = "";
        
        state.items.filter(i => {
            return i.name.toLowerCase().includes(s) && (fc==='all'||i.cat===fc) && (fl==='all'||i.lager===fl);
        }).reverse().forEach(i => {
            const isOut = i.status !== "im Lager";
            list.innerHTML += `
                <div class="item-card">
                    <div style="padding:15px; display:flex; gap:15px; align-items:center;">
                        <img src="${i.img || 'https://via.placeholder.com/80'}" style="width:70px; height:70px; object-fit:cover; border-radius:8px;">
                        <div style="flex:1;">
                            <b style="font-size:1.1rem;">${i.name}</b><br>
                            <small style="color:#666;">${i.cat} | ${i.lager}</small>
                            ${isOut ? `<div style="color:red; font-size:0.75rem; font-weight:bold; margin-top:5px;">Bei: ${i.outUser}</div>` : ""}
                        </div>
                        <button onclick="deleteItem(${i.id})" style="border:none; background:none; color:#ddd; font-size:1.2rem;">×</button>
                    </div>
                    <button class="btn-action" style="background:${isOut?'var(--danger)':'var(--success)'}" onclick="toggleStatus(${i.id})">
                        ${isOut ? 'EINLAGERN' : 'AUSLEIHEN'}
                    </button>
                </div>`;
        });
    }

    function toggleStatus(id) {
        const i = state.items.find(x => x.id === id);
        const isIn = i.status === "im Lager";
        i.status = isIn ? "ausgeliehen" : "im Lager";
        i.outUser = isIn ? state.user : "";
        db.child('items').set(state.items);
    }

    function saveNewItem() {
        const n = document.getElementById('newName').value;
        if(!n) return;
        const newItem = { id: Date.now(), name: n, cat: document.getElementById('addCat').value, lager: document.getElementById('addLager').value, img: "", status: "im Lager" };
        const file = document.getElementById('addImg').files[0];
        if(file) {
            const r = new FileReader();
            r.onload = (e) => { newItem.img = e.target.result; state.items.push(newItem); db.child('items').set(state.items); };
            r.readAsDataURL(file);
        } else { state.items.push(newItem); db.child('items').set(state.items); }
        document.getElementById('newName').value = "";
        changeTab('list');
    }

    function pushSetting(key) {
        const v = document.getElementById('newSettingName').value.trim();
        if(!v) return;
        state[key].push(v);
        db.child(key).set(state[key]);
        document.getElementById('newSettingName').value = "";
    }

    function deleteItem(id) {
        if(confirm("Löschen?")) {
            state.items = state.items.filter(i => i.id !== id);
            db.child('items').set(state.items);
        }
    }

    function changeTab(tab) {
        document.getElementById('view-list').style.display = tab === 'list' ? 'block' : 'none';
        document.getElementById('view-add').style.display = tab === 'add' ? 'block' : 'none';
        document.getElementById('btn-list').classList.toggle('active', tab === 'list');
        document.getElementById('btn-add').classList.toggle('active', tab === 'add');
    }

    window.onload = () => {
        const saved = localStorage.getItem('gr_session');
        if(saved) {
            document.getElementById('user').value = saved;
            document.getElementById('pass').value = "1234";
            tryLogin();
        }
    };
</script>
</body>
</html>
