<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V126 + QR</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --accent: #06b6d4; --danger: #ef4444; --success: #10b981; --glass: rgba(255, 255, 255, 0.95); }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100%; font-family: -apple-system, sans-serif; background-color: #000; color: white; overflow: hidden; }

        .global-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('haus_background.jpg') no-repeat center center;
            background-size: cover; z-index: 1;
        }

        #ui-wrapper { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; }

        /* SCANNER MODAL */
        #scanner-container {
            display: none; position: fixed; inset: 0; background: #000; z-index: 2000;
            flex-direction: column; align-items: center; justify-content: center;
        }

        /* LOGIN */
        #loginScreen { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background: transparent; }
        .login-card { background: rgba(30, 41, 59, 0.95); padding: 30px; border-radius: 20px; border: 2px solid var(--accent); width: 280px; text-align: center; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; background: var(--accent); color: white; cursor: pointer; }

        /* HEADER */
        .header { background: rgba(0,0,0,0.9); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .header h1 { margin: 0; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; color: white; }

        .content-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }

        /* ITEM CARDS */
        .item-card { background: var(--glass); border-radius: 12px; margin-bottom: 10px; padding: 12px; color: #000; display: flex; align-items: center; gap: 12px; }
        .item-thumb { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; border: 1px solid #ccc; }
        .item-info { flex: 1; }
        .item-name { font-weight: 900; font-size: 1.1rem; }
        .qr-small { width: 40px; height: 40px; cursor: pointer; border: 1px solid #ddd; padding: 2px; background: white; }

        /* NAV */
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #030712; display: flex; height: 75px; border-top: 2px solid var(--accent); z-index: 100; }
        .tab-btn { flex: 1; border: none; background: none; color: #94a3b8; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .tab-btn.active { color: white; background: rgba(6, 182, 212, 0.2); border-top: 4px solid var(--accent); }

        .form-card { background: white; border-radius: 12px; padding: 15px; color: #000; margin-bottom: 20px; }
        .form-row { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; }
        .form-label { width: 90px; font-size: 0.7rem; font-weight: bold; color: #666; }
        .form-input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; }

        .content { display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>

<div class="global-bg"></div>

<div id="scanner-container">
    <div id="qr-reader" style="width: 100%; max-width: 400px;"></div>
    <button onclick="stopScanner()" style="margin-top: 20px; padding: 15px 30px; background: var(--danger); border: none; color: white; border-radius: 10px; font-weight: bold;">ABBRECHEN</button>
</div>

<div id="loginScreen">
    <div class="login-card">
        <h2 style="color:var(--accent); font-weight:900;">GR-LAGER</h2>
        <input type="text" id="loginName" class="login-input" placeholder="Name">
        <input type="password" id="loginPass" class="login-input" placeholder="Passwort">
        <button class="login-btn" onclick="checkLogin()">STARTEN</button>
    </div>
</div>

<div id="ui-wrapper" style="display:none;">
    <div class="header">
        <button onclick="startScanner()" style="background:none; border:none; font-size: 1.5rem;">📷</button>
        <h1>GR-LAGER</h1>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--accent); font-size:1.3rem;">🚪</button>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content active">
            <div style="background:white; padding:10px; border-radius:12px; margin-bottom:15px; border:2px solid var(--accent);">
                <input type="text" id="searchInput" placeholder="Suchen..." onkeyup="render()" style="width:100%; border:none; outline:none; font-size:1rem; color:#333;">
            </div>
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div class="form-card">
                <div class="form-row"><span class="form-label">NAME</span><input type="text" id="itemName" class="form-input"></div>
                <div class="form-row"><span class="form-label">LAGER</span><select id="itemLagerSelect" class="form-input"></select></div>
                <div class="form-row"><span class="form-label">KAT</span><select id="itemCatSelect" class="form-input"></select></div>
                <div class="form-row"><span class="form-label">REGAL</span><select id="itemRegalSelect" class="form-input"></select></div>
                <div class="form-row"><span class="form-label">FACH</span><select id="itemFachSelect" class="form-input"></select></div>
                <button onclick="saveItem()" style="width:100%; padding:15px; background:var(--accent); border:none; color:white; border-radius:8px; font-weight:bold;">ARTIKEL SPEICHERN</button>
            </div>
        </div>

        <div id="tab-log" class="content"><div id="logList"></div></div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">📦 LAGER</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">➕ NEU</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-log')">📜 LOG</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const mainRef = db.ref('lager_v90_multilager');
    let state = { user: "", items: [] };
    let html5QrCode;

    function checkLogin() {
        const name = document.getElementById('loginName').value.trim();
        if(name && document.getElementById('loginPass').value === "1234") {
            state.user = name;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('ui-wrapper').style.display = 'flex';
            initApp();
        }
    }

    function initApp() {
        mainRef.on('value', snap => {
            const data = snap.val() || {};
            state.items = Object.keys(data.items || {}).map(key => ({...data.items[key], key: key}));
            state.logs = Object.values(data.logs || {}).sort((a,b) => b.ts - a.ts);
            
            // Dropdowns füllen (vereinfacht für Code-Länge)
            const fill = (id, list) => document.getElementById(id).innerHTML = (list || ["-"]).map(v => `<option value="${v}">${v}</option>`).join('');
            fill('itemLagerSelect', data.locations); fill('itemCatSelect', data.cats); fill('itemRegalSelect', data.regale); fill('itemFachSelect', data.faecher);
            
            render();
            renderLogs();
        });
    }

    function render() {
        const s = document.getElementById('searchInput').value.toLowerCase();
        document.getElementById('itemList').innerHTML = state.items.filter(i => i.name.toLowerCase().includes(s)).map(i => {
            const isOut = i.status !== "im Lager";
            const qrUrl = `https://chart.googleapis.com/chart?chs=150x150&cht=qr&chl=${i.key}`;
            return `
            <div class="item-card">
                <div style="text-align:center;">
                    <img src="${qrUrl}" class="qr-small" onclick="window.open('${qrUrl}')">
                    <div style="font-size:0.5rem;">QR</div>
                </div>
                <div class="item-info">
                    <div class="item-name">${i.name}</div>
                    <div style="font-size:0.7rem; color:#666;">📍 ${i.location} | ${i.regal}/${i.fach}</div>
                </div>
                <button onclick="toggleItem('${i.key}')" style="padding:10px; border-radius:8px; border:none; background:${isOut?'var(--danger)':'var(--success)'}; color:white; font-weight:bold;">${isOut?'EIN':'AUS'}</button>
            </div>`;
        }).join('');
    }

    function toggleItem(key) {
        const i = state.items.find(x => x.key === key);
        const isIn = i.status === "im Lager";
        mainRef.child('items/'+key).update({ status: isIn ? "ausgeliehen" : "im Lager", outUser: isIn ? state.user : "" });
        mainRef.child('logs').push({ date: new Date().toLocaleString('de-DE'), user: state.user, text: (isIn ? "AUS: " : "EIN: ") + i.name, ts: Date.now() });
    }

    function saveItem() {
        const n = document.getElementById('itemName').value;
        if(!n) return;
        mainRef.child('items').push({
            name: n, location: document.getElementById('itemLagerSelect').value,
            regal: document.getElementById('itemRegalSelect').value, fach: document.getElementById('itemFachSelect').value,
            cat: document.getElementById('itemCatSelect').value, status: "im Lager", ts: Date.now(), qty: 1
        });
        switchTab({currentTarget: document.querySelectorAll('.tab-btn')[0]}, 'tab-lager');
    }

    /* SCANNER LOGIC */
    function startScanner() {
        document.getElementById('scanner-container').style.display = 'flex';
        html5QrCode = new Html5Qrcode("qr-reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
            (decodedText) => {
                toggleItem(decodedText);
                stopScanner();
                alert("Scan erfolgreich: Status geändert!");
            }
        ).catch(err => alert("Kamera-Fehler: " + err));
    }

    function stopScanner() {
        if(html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('scanner-container').style.display = 'none';
            });
        }
    }

    function renderLogs() {
        document.getElementById('logList').innerHTML = (state.logs || []).slice(0, 30).map(l => `<div style="font-size:0.8rem; margin-bottom:5px; border-bottom:1px solid #333;"><b>${l.user}</b>: ${l.text}</div>`).join('');
    }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
