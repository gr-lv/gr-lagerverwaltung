<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V80</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; }
        
        /* Hintergrund-Fix */
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e293b url('haus_background.jpg') no-repeat center center; background-size: cover; z-index: -2; }
        .dark-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.65); z-index: -1; }

        body { margin: 0; font-family: sans-serif; height: 100vh; width: 100vw; overflow: hidden; background: #0f172a; }
        
        /* Login Screen */
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #0f172a; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }

        .app-shell { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; }
        
        /* Header */
        .header { background: #0f172a; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .header h1 { margin: 0; font-size: 1.1rem; }
        .logout-btn { color: white; background: var(--danger); font-size: 0.7rem; padding: 6px 10px; border-radius: 6px; border: none; font-weight: bold; }

        .content-area { flex: 1; overflow-y: auto; padding: 15px 15px 100px 15px; -webkit-overflow-scrolling: touch; }

        /* Karten & Filter */
        .filter-box { background: rgba(255, 255, 255, 0.9); padding: 12px; border-radius: 12px; margin-bottom: 15px; }
        .item-card { background: rgba(255, 255, 255, 0.95); border-radius: 15px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        .card-inner { padding: 15px; display: flex; gap: 15px; align-items: center; }
        .thumb { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; background: #eee; }

        .btn-status { display: block; width: 100%; padding: 18px; border: none; color: white; font-weight: bold; font-size: 1rem; cursor: pointer; }
        
        /* Navigation unten */
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f172a; display: flex; height: 65px; border-top: 2px solid var(--accent); z-index: 100; }
        .tab-btn { flex: 1; border: none; background: none; color: #9ca3af; font-weight: bold; font-size: 0.8rem; }
        .tab-btn.active { color: white; border-top: 3px solid var(--accent); background: rgba(255,255,255,0.05); }

        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .content { display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2 style="color:var(--accent)">GR-Lagerverwaltung</h2>
    <div style="width: 80%; max-width: 300px;">
        <input type="text" id="loginUser" placeholder="Benutzername">
        <input type="password" id="loginPass" placeholder="Passwort">
        <button onclick="checkLogin()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; margin-top:10px;">ANMELDEN</button>
        <p id="loginErr" style="color:red; font-size:0.8rem; text-align:center; display:none;">Login fehlgeschlagen!</p>
    </div>
</div>

<div class="bg-layer"></div>
<div class="dark-overlay"></div>
