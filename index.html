<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; --logout: #64748b; }
        html, body { height: 100%; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #4b5563; }
        
        /* Hintergrund fixiert */
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('haus_background.jpg'); background-position: center; background-size: cover; z-index: 1; }
        
        /* App-Container über dem Hintergrund */
        .app-container { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { background: rgba(15, 23, 42, 0.95); color: white; padding: 15px; text-align: center; z-index: 100; border-bottom: 2px solid var(--accent); }
        .header h1 { margin: 0; font-size: 1.2rem; color: var(--accent); text-transform: uppercase; }
        .user-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 0.8rem; }
        
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 23, 42, 1); display: flex; z-index: 1000; border-top: 2px solid var(--accent); }
        .tab-btn { flex: 1; padding: 15px 5px; border: none; background: none; font-weight: bold; color: #9ca3af; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; }
        .tab-btn.active { color: white; background: rgba(255,255,255,0.1); }

        .content-scroll { flex: 1; overflow-y: auto; padding: 15px 15px 100px 15px; position: relative; z-index: 50; }
        .content { display: none; max-width: 600px; margin: 0 auto; width: 100%; }
        .content.active { display: block; }
        
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid white; position: relative; z-index: 60; }
        
        .card { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .thumb { width: 65px; height: 65px; object-fit: cover; border-radius: 12px; background: #fff; cursor: pointer; }
        .btn-book { min-width: 100px; padding: 12px; border: none; border-radius: 12px; font-weight: bold; color: white; cursor: pointer; z-index: 70; }
        
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; position: relative; z-index: 80; }
        
        .last-action { font-size: 0.7rem; color: #b91c1c; margin-top: 4px; font-weight: bold; background: rgba(220, 38, 38, 0.1); padding: 4px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="bg-layer"></div>

<div class="app-container">
    <div class="header">
        <h1>GR-Lagerverwaltung</h1>
        <div class="user-bar">
            <div>👤 <span id="displayUser">Lade...</span></div>
            <div style="display:flex; gap:5px;">
                <button onclick="askForName()" style="background:var(--primary); color:white; border:none; border-radius:4px; padding:5px 10px; cursor:pointer; z-index:110;">Wechseln</button>
                <button id="logoutBtn" onclick="logout()" style="background:var(--logout); color:white; border:none; border-radius:4px; padding:5px 10px; cursor:pointer; display:none; z-index:110;">Logout</button>
            </div>
        </div>
    </div>

    <div class="content-scroll">
        <div id="tab-lager" class="content active">
            <div id="loginPrompt" class="glass-panel" style="text-align:center;">
                <h2>Willkommen!</h2>
                <p>Bitte melde dich an, um das Lager zu sehen.</p>
                <button class="btn-main" onclick="askForName()">JETZT ANMELDEN</button>
            </div>
            
            <div id="lagerContent" style="display:none;">
                <div class="glass-panel">
                    <input type="text" id="searchInput" placeholder="🔍 Artikel suchen..." onkeyup="render()">
                    <select id="filterCat" onchange="render()"><option value="">📂 Alle Kategorien</option></select>
                </div>
                <div id="itemList"></div>
            </div>
        </div>

        <div id="tab-neu" class="content">
            <div id="neuContent" class="glass-panel">
                <h2>Neuen Artikel anlegen</h2>
                <input type="text" id="itemName" placeholder="Wie heißt der Artikel?">
                <select id="itemCatSelect"></select>
                <p style="font-size:0.8rem; margin:10px 0 5px 0;">Foto auswählen:</p>
                <input type="file" id="itemImg" accept="image/*" capture="environment">
                <button class="btn-main" onclick="saveItem()" style="margin-top:15px;">Speichern</button>
            </div>
        </div>

        <div id="tab-log" class="content">
            <div class="glass-panel"><h2>Logbuch</h2><div id="logList"></div></div>
        </div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">Lager</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">Neu Anlegen</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-log')">Logbuch</button>
    </nav>
</div>

<script>
    const CURRENT_VERSION = 57;
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('lager_v32_final');

    let state = { user: localStorage.getItem('lagerUser') || null, items: [], logs: [], cats: ["Werkzeug", "Garten"], ver: CURRENT_VERSION };

    function init() {
        updateUserUI();
        dbRef.on('value', (snap) => {
            const data = snap.val();
            if (data) {
                state.items = data.items || [];
                state.logs = data.logs || [];
                state.cats = data.cats || ["Werkzeug", "Garten"];
                render();
            }
        });
        // Auto-Prompt wenn nicht eingeloggt
        if(!state.user) { setTimeout(askForName, 1000); }
    }

    function askForName() {
        let n = prompt("Bitte gib deinen Namen ein:");
        if (n && n.trim() !== "") {
            state.user = n.trim();
            localStorage.setItem('lagerUser', state.user);
            if (state.user === "David Janzen") addLog("System", "Anmeldung David Janzen");
            updateUserUI();
            sync();
        }
    }

    function logout() {
        if(confirm("Abmelden?")) {
            if (state.user === "David Janzen") addLog("System", "Logout David Janzen");
            state.user = null;
            localStorage.removeItem('lagerUser');
            updateUserUI();
            sync();
        }
    }

    function updateUserUI() {
        const isLogged = !!state.user;
        document.getElementById('displayUser').innerText = state.user || "Nicht angemeldet";
        document.getElementById('logoutBtn').style.display = isLogged ? 'block' : 'none';
        document.getElementById('loginPrompt').style.display = isLogged ? 'none' : 'block';
        document.getElementById('lagerContent').style.display = isLogged ? 'block' : 'none';
        render();
    }

    function addLog(item, action) {
        state.logs.unshift({ time: new Date().toLocaleString('de-DE'), user: state.user || "Unbekannt", item: item, action: action });
    }

    function sync() { state.ver = CURRENT_VERSION; dbRef.set(state); }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    function saveItem() {
        const n = document.getElementById('itemName').value;
        const c = document.getElementById('itemCatSelect').value;
        const f = document.getElementById('itemImg').files[0];
        if (!n) return alert("Bitte Namen eingeben!");
        const reader = new FileReader();
        reader.onload = (e) => {
            state.items.unshift({ id: Date.now(), name: n, cat: c, img: e.target.result || "", status: "im Lager", outUser: "", outDate: "" });
            addLog(n, "Neu angelegt");
            sync();
            alert("Erfolgreich gespeichert!");
            document.getElementById('itemName').value = "";
            switchTab({currentTarget: document.querySelectorAll('.tab-btn')[0]}, 'tab-lager');
        };
        if (f) reader.readAsDataURL(f); else reader.onload({target:{result:""}});
    }

    function toggleStatus(id) {
        const i = state.items.find(x => x.id === id);
        const isIn = i.status === "im Lager";
        if (confirm(isIn ? "Artikel ausleihen?" : "Artikel zurückgebracht?")) {
            i.status = isIn ? "unterwegs" : "im Lager";
            if (isIn) { i.outUser = state.user; i.outDate = new Date().toLocaleDateString('de-DE'); }
            addLog(i.name, isIn ? "Auslagerung" : "Einlagerung");
            sync();
        }
    }

    function render() {
        const fDrop = document.getElementById('filterCat');
        const sDrop = document.getElementById('itemCatSelect');
        if(!fDrop || !sDrop) return;

        const sel = fDrop.value;
        fDrop.innerHTML = '<option value="">📂 Alle Kategorien</option>';
        sDrop.innerHTML = "";
        state.cats.forEach(c => {
            fDrop.innerHTML += `<option value="${c}" ${sel===c?'selected':''}>${c}</option>`;
            sDrop.innerHTML += `<option value="${c}">${c}</option>`;
        });

        const list = document.getElementById('itemList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        list.innerHTML = "";
        state.items.filter(i => i.name.toLowerCase().includes(search) && (sel==="" || i.cat===sel)).forEach(i => {
            const isOut = i.status !== "im Lager";
            list.innerHTML += `
                <div class="glass-panel card">
                    <img src="${i.img || 'https://via.placeholder.com/70'}" class="thumb" onclick="window.open(this.src)">
                    <div style="flex:1">
                        <b>${i.name}</b><br><small>${i.cat}</small>
                        ${isOut ? `<div class="last-action">Ausgelagert von ${i.outUser} am ${i.outDate}</div>` : ""}
                    </div>
                    <button class="btn-book" onclick="toggleStatus(${i.id})" style="background:${isOut?'var(--danger)':'var(--success)'}">${isOut?'Einlagern':'Auslagern'}</button>
                </div>`;
        });

        const lBox = document.getElementById('logList');
        if(lBox) lBox.innerHTML = state.logs.slice(0,30).map(l => `<div style="font-size:0.8rem; margin-bottom:8px; border-bottom:1px solid #ddd; padding-bottom:4px;"><b>${l.user}</b>: ${l.item === "System" ? "" : l.item} ${l.action} <br><small style="color:gray">${l.time}</small></div>`).join('');
    }
    init();
</script>
</body>
</html>
