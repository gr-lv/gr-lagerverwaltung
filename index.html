<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V138</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --accent: #06b6d4; --danger: #ef4444; --success: #10b981; --glass: rgba(255, 255, 255, 0.95); }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100%; font-family: -apple-system, sans-serif; background-color: #000; color: white; overflow: hidden; }

        .global-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('haus_background.jpg') no-repeat center center;
            background-size: cover; z-index: 1;
        }

        #ui-wrapper { position: relative; z-index: 10; height: 100vh; display: none; flex-direction: column; }
        #loginScreen { position: fixed; inset: 0; z-index: 2000; display: flex; align-items: center; justify-content: center; background: #000; }
        .login-box { background: rgba(30,41,59,0.95); padding: 30px; border-radius: 20px; border: 2px solid var(--accent); width: 280px; text-align: center; }

        .header { background: rgba(0,0,0,0.9); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .content-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 120px; }

        /* ITEM CARDS */
        .item-card { background: var(--glass); border-radius: 12px; margin-bottom: 10px; padding: 12px; color: #000; display: flex; align-items: center; gap: 10px; }
        .item-thumb { width: 55px; height: 55px; object-fit: cover; border-radius: 8px; background: #eee; }
        .item-info { flex: 1; min-width: 0; }
        
        .btn-status { border: none; padding: 10px; border-radius: 8px; color: white; font-weight: bold; min-width: 60px; font-size: 0.7rem; }
        .btn-in { background: var(--success); }
        .btn-out { background: var(--danger); }

        /* ADMIN SECTION */
        .admin-card { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; margin-top: 20px; border: 1px solid #334155; }
        .manage-list { list-style: none; padding: 0; margin: 10px 0; max-height: 150px; overflow-y: auto; }
        .manage-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 5px; margin-bottom: 4px; font-size: 0.8rem; }
        .btn-del-small { background: var(--danger); color: white; border: none; border-radius: 4px; padding: 2px 8px; cursor: pointer; }

        /* FORMS */
        .form-card { background: white; border-radius: 12px; padding: 15px; color: #000; }
        .form-row { display: flex; align-items: center; margin-bottom: 10px; gap: 8px; }
        .form-input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 0.9rem; }
        
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #030712; display: flex; height: 75px; border-top: 2px solid var(--accent); z-index: 100; }
        .tab-btn { flex: 1; border: none; background: none; color: #94a3b8; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; }
        .tab-btn.active { color: white; background: rgba(6, 182, 212, 0.2); border-top: 4px solid var(--accent); }
        .content { display: none; }
        .content.active { display: block; }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: fixed; inset: 0; background: white; text-align: center; padding: 20px; }
        }
        #print-area { display: none; }
    </style>
</head>
<body>

<div class="global-bg no-print"></div>

<div id="loginScreen" class="no-print">
    <div class="login-box">
        <h2 style="color:var(--accent);">GR-LOGIN</h2>
        <input type="text" id="loginName" class="form-input" style="width:100%; margin-bottom:10px;" placeholder="Name">
        <input type="password" id="loginPass" class="form-input" style="width:100%; margin-bottom:15px;" placeholder="Passwort">
        <button onclick="checkLogin()" style="width:100%; padding:14px; background:var(--accent); color:white; border:none; border-radius:8px; font-weight:bold;">START</button>
    </div>
</div>

<div id="print-area">
    <h2 id="p-name"></h2>
    <div id="p-loc"></div>
    <img id="p-qr" src="" style="width: 150px;">
</div>

<div id="ui-wrapper" class="no-print">
    <div class="header">
        <div class="user-area"><button onclick="alert('Scanner...')">📷</button><span id="displayUserName">GUEST</span></div>
        <h1>GR-LAGER</h1>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--accent);">🚪</button>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content active">
            <input type="text" id="searchInput" placeholder="Suchen..." onkeyup="render()" style="width:100%; padding:12px; border-radius:8px; margin-bottom:15px; border:none;">
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div class="form-card">
                <div class="form-row"><input type="text" id="itemName" class="form-input" placeholder="Artikel Name"></div>
                <div class="form-row"><select id="itemLagerSelect" class="form-input"></select></div>
                <div class="form-row"><select id="itemCatSelect" class="form-input"></select></div>
                <div class="form-row"><select id="itemRegalSelect" class="form-input"></select></div>
                <div class="form-row"><select id="itemFachSelect" class="form-input"></select></div>
                <div style="border:2px dashed var(--accent); padding:10px; text-align:center; margin-bottom:10px; border-radius:8px;" onclick="document.getElementById('itemImg').click()">
                    <span id="camText">📷 FOTO MACHEN</span>
                    <img id="imagePreview" style="width:100%; height:100px; object-fit:contain; display:none;">
                </div>
                <input type="file" id="itemImg" accept="image/*" capture="environment" style="display:none;" onchange="previewImage(this)">
                <button onclick="saveAndPrint()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:8px; font-weight:bold;">SPEICHERN & DRUCKEN</button>
            </div>

            <div class="admin-card">
                <h3 style="margin:0; font-size:0.9rem; color:var(--accent);">⚙️ LISTEN VERWALTEN</h3>
                <div style="margin-top:10px;">
                    <div class="form-row"><input type="text" id="addInput" class="form-input" placeholder="Neuer Eintrag..."><button onclick="quickAdd()" class="btn-in" style="padding:10px;">+</button></div>
                    <select id="manageType" class="form-input" onchange="updateManageList()" style="width:100%; margin-bottom:10px;">
                        <option value="locations">Lagerorte</option>
                        <option value="cats">Kategorien</option>
                        <option value="regale">Regale</option>
                        <option value="faecher">Fächer</option>
                    </select>
                    <ul id="listDisplay" class="manage-list"></ul>
                </div>
            </div>
        </div>

        <div id="tab-log" class="content"><div id="logList"></div></div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">📦 LAGER</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">➕ NEU</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-log')">📜 LOG</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const mainRef = db.ref('lager_v90_multilager');
    let state = { user: "", items: [], config: {} };

    function checkLogin() {
        const n = document.getElementById('loginName').value;
        if(n && document.getElementById('loginPass').value === "1234") {
            state.user = n.toUpperCase();
            document.getElementById('displayUserName').innerText = state.user;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('ui-wrapper').style.display = 'flex';
            initApp();
        }
    }

    function initApp() {
        mainRef.on('value', snap => {
            state.config = snap.val() || {};
            state.items = Object.keys(state.config.items || {}).map(k => ({...state.config.items[k], key: k}));
            
            const fill = (id, list) => {
                const el = document.getElementById(id);
                if(el) el.innerHTML = (list || []).map(v => `<option value="${v}">${v}</option>`).join('');
            };
            fill('itemLagerSelect', state.config.locations); fill('itemCatSelect', state.config.cats);
            fill('itemRegalSelect', state.config.regale); fill('itemFachSelect', state.config.faecher);
            
            render(); renderLogs(); updateManageList();
        });
    }

    function updateManageList() {
        const type = document.getElementById('manageType').value;
        const list = state.config[type] || [];
        document.getElementById('listDisplay').innerHTML = list.map((v, i) => `
            <li class="manage-item">${v} <button class="btn-del-small" onclick="removeFromList('${type}', ${i})">X</button></li>
        `).join('');
    }

    function quickAdd() {
        const type = document.getElementById('manageType').value;
        const val = document.getElementById('addInput').value;
        if(!val) return;
        let list = state.config[type] || [];
        list.push(val);
        mainRef.child(type).set(list);
        document.getElementById('addInput').value = "";
    }

    function removeFromList(type, index) {
        if(!confirm("Eintrag löschen?")) return;
        let list = state.config[type];
        list.splice(index, 1);
        mainRef.child(type).set(list);
    }

    function render() {
        const s = document.getElementById('searchInput').value.toLowerCase();
        document.getElementById('itemList').innerHTML = state.items
            .filter(i => i.name.toLowerCase().includes(s))
            .map(i => `
                <div class="item-card">
                    <img src="${i.img || 'https://via.placeholder.com/60'}" class="item-thumb">
                    <div class="item-info">
                        <strong>${i.name}</strong><br>
                        <small>${i.location} | ${i.regal}/${i.fach}</small>
                    </div>
                    <button onclick="toggleStatus('${i.key}', '${i.name}', '${i.status}')" class="btn-status ${i.status === 'im Lager' ? 'btn-in' : 'btn-out'}">
                        ${i.status === 'im Lager' ? 'EIN' : 'AUS'}
                    </button>
                    <button onclick="deleteItem('${i.key}', '${i.name}')" style="background:none;border:none;">🗑️</button>
                </div>
            `).join('');
    }

    function toggleStatus(key, name, old) {
        const newS = old === "im Lager" ? "ausgeliehen" : "im Lager";
        mainRef.child('items/'+key).update({ status: newS });
        mainRef.child('logs').push({ user: state.user, text: `${name}: ${newS}`, ts: Date.now(), date: new Date().toLocaleString() });
    }

    function saveAndPrint() {
        const n = document.getElementById('itemName').value;
        if(!n) return;
        const newRef = mainRef.child('items').push();
        const item = {
            name: n, location: document.getElementById('itemLagerSelect').value,
            cat: document.getElementById('itemCatSelect').value,
            regal: document.getElementById('itemRegalSelect').value,
            fach: document.getElementById('itemFachSelect').value,
            img: document.getElementById('imagePreview').src || "",
            status: "im Lager", ts: Date.now()
        };
        newRef.set(item);
        document.getElementById('p-name').innerText = n;
        document.getElementById('p-loc').innerText = `${item.location} | ${item.regal}/${item.fach}`;
        document.getElementById('p-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${newRef.key}`;
        setTimeout(() => { window.print(); switchTab(null, 'tab-lager'); }, 800);
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('imagePreview').style.display = 'block';
                document.getElementById('camText').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function deleteItem(k, n) { if(confirm(n + " löschen?")) mainRef.child('items/'+k).remove(); }
    
    function renderLogs() {
        const logs = Object.values(state.config.logs || {}).sort((a,b) => b.ts - a.ts);
        document.getElementById('logList').innerHTML = logs.slice(0, 30).map(l => `
            <div class="log-entry"><b>${l.user}</b>: ${l.text}<br><small>${l.date}</small></div>
        `).join('');
    }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(e) e.currentTarget.classList.add('active');
        else document.querySelectorAll('.tab-btn')[0].classList.add('active');
    }
</script>
</body>
</html>
