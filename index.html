<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V63</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; }
        
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; 
            background: url('haus_background.jpg') no-repeat center center fixed; 
            background-size: cover; height: 100vh; overflow: hidden;
        }

        .app-shell { height: 100vh; display: flex; flex-direction: column; background: rgba(15, 23, 42, 0.4); position: relative; z-index: 10; }
        
        .header { background: rgba(15, 23, 42, 0.9); color: white; padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); z-index: 1000; }
        
        .content-area { flex: 1; overflow-y: auto; padding: 15px 15px 100px 15px; z-index: 50; position: relative; }

        .glass { 
            background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(8px);
            border-radius: 20px; padding: 20px; margin-bottom: 15px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.3);
        }

        /* Buttons & Inputs */
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        
        .card { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .thumb { width: 65px; height: 65px; object-fit: cover; border-radius: 10px; background: #eee; }
        
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f172a; display: flex; border-top: 2px solid var(--accent); z-index: 1000; }
        .tab-btn { flex: 1; padding: 18px 5px; border: none; background: none; color: #9ca3af; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; }
        .tab-btn.active { color: white; background: rgba(255,255,255,0.1); }

        .content { display: none; }
        .content.active { display: block; }
        
        #reader { width: 100%; border-radius: 15px; overflow: hidden; display: none; margin-bottom: 15px; border: 2px solid var(--accent); }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="header">
        <h1 style="margin:0; font-size:1.1rem; color:var(--accent);">GR-LAGERVERWALTUNG</h1>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
            <span id="displayUser" style="font-size:0.8rem;">👤 Prüfe Anmeldung...</span>
            <button onclick="askForName()" style="background:var(--primary); color:white; border:none; padding:5px 10px; border-radius:5px; font-size:0.7rem; cursor:pointer;">WECHSELN</button>
        </div>
    </div>

    <div class="content-area">
        <div id="loginSection" class="glass" style="text-align:center; display:none;">
            <h2 style="margin-top:0">Willkommen</h2>
            <p>Bitte gib deinen Namen an, um die Artikel zu sehen.</p>
            <button class="btn-main" onclick="askForName()">ANMELDEN</button>
        </div>

        <div id="tab-lager" class="content">
            <div id="reader"></div>
            <div class="glass">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="searchInput" placeholder="Suchen..." onkeyup="render()">
                    <button onclick="startScan('search')" style="background:var(--accent); border:none; border-radius:10px; padding:0 15px; color:white; cursor:pointer;">📷</button>
                </div>
            </div>
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div class="glass">
                <h2 style="margin-top:0">Neuer Artikel</h2>
                <input type="text" id="itemName" placeholder="Name">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="itemBarcode" placeholder="Barcode (Optional)">
                    <button onclick="startScan('new')" style="background:var(--accent); border:none; border-radius:10px; padding:0 15px; color:white; cursor:pointer;">📷</button>
                </div>
                <input type="number" id="itemQty" placeholder="Menge" value="1">
                <select id="itemCatSelect"></select>
                <input type="file" id="itemImg" accept="image/*" capture="environment">
                <button class="btn-main" onclick="saveItem()" style="margin-top:15px;">SPEICHERN</button>
            </div>
        </div>

        <div id="tab-log" class="content">
            <div class="glass"><h2>Logbuch</h2><div id="logList"></div></div>
        </div>
    </div>

    <nav id="mainNav" style="display:none;">
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">Lager</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">Neu</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-log')">Logs</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('lager_v32_final');

    let state = { user: localStorage.getItem('lagerUser') || null, items: [], logs: [], cats: ["Werkzeug", "Garten", "Elektro", "Haushalt"] };
    let html5QrCode;

    function init() {
        updateUserUI();
        dbRef.on('value', (snap) => {
            const data = snap.val();
            if (data) {
                state.items = data.items || [];
                state.logs = data.logs || [];
                state.cats = data.cats || ["Werkzeug", "Garten", "Elektro", "Haushalt"];
                render();
            }
        });
    }

    function askForName() {
        let n = prompt("Bitte Namen eingeben:");
        if (n && n.trim() !== "") {
            state.user = n.trim();
            localStorage.setItem('lagerUser', state.user);
            updateUserUI();
            dbRef.set(state);
        }
    }

    function updateUserUI() {
        const isLogged = !!state.user;
        document.getElementById('displayUser').innerText = isLogged ? "👤 " + state.user : "👤 Abgemeldet";
        document.getElementById('loginSection').style.display = isLogged ? 'none' : 'block';
        document.getElementById('mainNav').style.display = isLogged ? 'flex' : 'none';
        
        if(isLogged) {
            document.getElementById('tab-lager').classList.add('active');
        } else {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        }
    }

    function startScan(target) {
        const readerDiv = document.getElementById('reader');
        readerDiv.style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            if(target === 'search') { document.getElementById('searchInput').value = text; render(); }
            else { document.getElementById('itemBarcode').value = text; }
            html5QrCode.stop().then(() => readerDiv.style.display = 'none');
        });
    }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    function saveItem() {
        const n = document.getElementById('itemName').value;
        const b = document.getElementById('itemBarcode').value;
        const q = document.getElementById('itemQty').value || 1;
        const c = document.getElementById('itemCatSelect').value;
        const f = document.getElementById('itemImg').files[0];
        if(!n) return alert("Name fehlt!");

        const reader = new FileReader();
        reader.onload = (e) => {
            state.items.unshift({ id: Date.now(), name: n, barcode: b, qty: q, cat: c, img: e.target.result || "", status: "im Lager" });
            state.logs.unshift({ time: new Date().toLocaleString(), user: state.user, item: n, action: "Neu angelegt" });
            dbRef.set(state);
            alert("Gespeichert!");
            switchTab({currentTarget: document.querySelectorAll('.tab-btn')[0]}, 'tab-lager');
        };
        if(f) reader.readAsDataURL(f); else reader.onload({target:{result:""}});
    }

    function toggleStatus(id) {
        const i = state.items.find(x => x.id === id);
        const isIn = i.status === "im Lager";
        i.status = isIn ? "unterwegs" : "im Lager";
        i.outUser = isIn ? state.user : "";
        i.outDate = isIn ? new Date().toLocaleDateString() : "";
        state.logs.unshift({ time: new Date().toLocaleString(), user: state.user, item: i.name, action: isIn ? "Ausgelagert" : "Eingelagert" });
        dbRef.set(state);
    }

    function render() {
        const sDrop = document.getElementById('itemCatSelect');
        sDrop.innerHTML = state.cats.map(c => `<option value="${c}">${c}</option>`).join('');

        const list = document.getElementById('itemList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        list.innerHTML = "";

        state.items.filter(i => i.name.toLowerCase().includes(search) || (i.barcode && i.barcode.includes(search))).forEach(i => {
            const isOut = i.status !== "im Lager";
            list.innerHTML += `
                <div class="glass card">
                    <img src="${i.img || 'https://via.placeholder.com/70'}" class="thumb">
                    <div style="flex:1">
                        <b>${i.name}</b> (x${i.qty})<br>
                        <small>${i.cat}</small>
                        ${isOut ? `<br><span style="color:red; font-size:0.7rem;">Bei: ${i.outUser}</span>` : ""}
                    </div>
                    <button onclick="toggleStatus(${i.id})" style="background:${isOut?'#dc2626':'#16a34a'}; color:white; border:none; padding:10px; border-radius:8px;">${isOut?'Ein':'Aus'}</button>
                </div>`;
        });

        document.getElementById('logList').innerHTML = state.logs.slice(0,30).map(l => `<div style="font-size:0.7rem; border-bottom:1px solid #ddd; padding:5px;"><b>${l.user}</b>: ${l.item} ${l.action}</div>`).join('');
    }
    init();
</script>
</body>
</html>
