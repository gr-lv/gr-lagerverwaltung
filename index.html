<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V70</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; }
        
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; 
            background: #1e293b url('haus_background.jpg') no-repeat center center fixed; 
            background-size: cover; height: 100vh; overflow: hidden;
        }

        .app-shell { height: 100vh; display: flex; flex-direction: column; background: rgba(15, 23, 42, 0.4); }
        .header { background: rgba(15, 23, 42, 0.9); color: white; padding: 10px; text-align: center; border-bottom: 2px solid var(--accent); flex-shrink: 0; }
        .content-area { flex: 1; overflow-y: auto; padding: 15px 15px 100px 15px; -webkit-overflow-scrolling: touch; }

        .glass { 
            background: rgba(255, 255, 255, 0.98); border-radius: 20px; padding: 15px; margin-bottom: 15px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); position: relative;
        }

        /* CARD DESIGN */
        .card-container { position: relative; display: flex; flex-direction: column; gap: 10px; }
        .card-main { display: flex; gap: 12px; align-items: center; }
        .thumb { width: 70px; height: 70px; object-fit: cover; border-radius: 12px; }
        
        .btn-delete-x {
            position: absolute; top: -5px; right: -5px; background: var(--danger); color: white;
            border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: bold; z-index: 10;
        }

        select, input { padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; width: 100%; box-sizing: border-box; }
        .qty-select { width: 70px !important; display: inline-block; background: #f1f5f9; }

        /* DER KRITISCHE BUTTON */
        .btn-action-trigger {
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            color: white; font-weight: bold; font-size: 1.1rem;
            margin-top: 5px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            -webkit-appearance: none; appearance: none;
        }

        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f172a; display: flex; height: 70px; z-index: 2000; }
        .tab-btn { flex: 1; border: none; background: none; color: #9ca3af; font-weight: bold; font-size: 0.65rem; text-transform: uppercase; }
        .tab-btn.active { color: white; border-top: 3px solid var(--accent); background: rgba(255,255,255,0.05); }

        .content { display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="header">
        <h1 style="margin:0; font-size:1rem; color:var(--accent);">GR-LAGER V70</h1>
        <span id="displayUser" style="font-size:0.7rem; color: #ccc;"></span>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content active">
            <div id="reader" style="width:100%; display:none; margin-bottom:10px;"></div>
            <div class="glass" style="display:flex; gap:5px;">
                <input type="text" id="searchInput" placeholder="Suche..." onkeyup="render()">
                <button onclick="startScan('search')" style="width:50px; background:var(--accent); border:none; border-radius:8px; color:white;">📷</button>
            </div>
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div class="glass">
                <h3 style="margin-top:0">Neuer Artikel</h3>
                <input type="text" id="itemName" placeholder="Artikelname">
                <div style="display:flex; gap:5px; margin: 5px 0;">
                    <input type="text" id="itemBarcode" placeholder="Barcode">
                    <button onclick="startScan('new')" style="width:50px; background:var(--accent); border:none; border-radius:8px; color:white;">📷</button>
                </div>
                <select id="itemCatSelect" style="margin: 5px 0;"></select>
                
                <div style="background: #f1f5f9; padding: 10px; border-radius: 10px; margin: 10px 0;">
                    <small>Kategorie hinzufügen:</small>
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="newCatInput" placeholder="Neue Kat...">
                        <button onclick="addCategory()" style="background:var(--success); color:white; border:none; border-radius:8px; padding:0 10px;">+</button>
                    </div>
                </div>

                <input type="file" id="itemImg" accept="image/*" capture="environment" style="margin: 5px 0;">
                <button onclick="saveItem()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:bold; margin-top:10px;">SPEICHERN</button>
            </div>
        </div>

        <div id="tab-log" class="content">
            <div class="glass"><h3>Logbuch</h3><div id="logList"></div></div>
        </div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">Lager</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">Neu Einlagern</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-log')">Log</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('lager_v32_final');

    let state = { user: localStorage.getItem('lagerUser') || "User_"+Math.floor(Math.random()*999), items: [], logs: [], cats: ["Werkzeug", "Garten", "Elektro"] };
    let html5QrCode = null;

    function init() {
        if(!localStorage.getItem('lagerUser')) localStorage.setItem('lagerUser', state.user);
        document.getElementById('displayUser').innerText = "Angemeldet als: " + state.user;
        
        dbRef.on('value', snap => {
            const data = snap.val();
            if(data) {
                state.items = data.items || [];
                state.logs = data.logs || [];
                if(data.cats) state.cats = data.cats;
                updateCatDropdown();
                render();
            }
        });
    }

    function updateCatDropdown() {
        const sel = document.getElementById('itemCatSelect');
        sel.innerHTML = state.cats.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function addCategory() {
        const val = document.getElementById('newCatInput').value.trim();
        if(val && !state.cats.includes(val)) {
            state.cats.push(val);
            dbRef.child('cats').set(state.cats);
            document.getElementById('newCatInput').value = "";
        }
    }

    function sync() { dbRef.set(state); }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    function saveItem() {
        const name = document.getElementById('itemName').value;
        if(!name) return alert("Name fehlt!");
        const newItem = {
            id: Date.now(), name: name, barcode: document.getElementById('itemBarcode').value,
            qty: 1, cat: document.getElementById('itemCatSelect').value, img: "", status: "im Lager"
        };
        const f = document.getElementById('itemImg').files[0];
        if(f) {
            const r = new FileReader();
            r.onload = (e) => { newItem.img = e.target.result; state.items.unshift(newItem); sync(); };
            r.readAsDataURL(f);
        } else { state.items.unshift(newItem); sync(); }
        document.getElementById('itemName').value = "";
        switchTab({currentTarget: document.querySelectorAll('.tab-btn')[0]}, 'tab-lager');
    }

    function changeQty(id, val) {
        const i = state.items.find(x => x.id === id);
        i.qty = parseInt(val);
        sync();
    }

    function deleteItem(id) {
        if(confirm("Löschen?")) {
            state.items = state.items.filter(x => x.id !== id);
            sync();
        }
    }

    function toggleStatus(id) {
        const i = state.items.find(x => x.id === id);
        const isIn = i.status === "im Lager";
        i.status = isIn ? "unterwegs" : "im Lager";
        i.outUser = isIn ? state.user : "";
        state.logs.unshift({ time: new Date().toLocaleString(), user: state.user, item: i.name, action: isIn ? "Ausgelagert" : "Eingelagert" });
        sync();
    }

    function startScan(t) {
        const r = document.getElementById('reader'); r.style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, text => {
            if(t === 'search') { document.getElementById('searchInput').value = text; render(); }
            else { document.getElementById('itemBarcode').value = text; }
            html5QrCode.stop().then(() => r.style.display = 'none');
        });
    }

    function render() {
        const list = document.getElementById('itemList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        list.innerHTML = "";
        
        state.items.filter(i => i.name.toLowerCase().includes(search) || (i.barcode && i.barcode.includes(search))).forEach(i => {
            const isOut = i.status !== "im Lager";
            const qtyOptions = Array.from({length: 50}, (_, index) => `<option value="${index+1}" ${i.qty == index+1 ? 'selected' : ''}>${index+1}</option>`).join('');
            
            const card = document.createElement('div');
            card.className = "glass card-container";
            card.innerHTML = `
                <button class="btn-delete-x" onclick="deleteItem(${i.id})">X</button>
                <div class="card-main">
                    <img src="${i.img || 'https://via.placeholder.com/70'}" class="thumb">
                    <div style="flex:1">
                        <b style="font-size:1.1rem;">${i.name}</b><br>
                        <small>${i.cat}</small><br>
                        <div style="margin-top:5px;">
                            Menge: <select class="qty-select" onchange="changeQty(${i.id}, this.value)">${qtyOptions}</select>
                        </div>
                        ${isOut ? `<div style="color:red; font-size:0.7rem; font-weight:bold; margin-top:3px;">BEI: ${i.outUser}</div>` : ""}
                    </div>
                </div>
                <button class="btn-action-trigger" 
                        style="background:${isOut ? 'var(--danger)' : 'var(--success)'}"
                        onclick="toggleStatus(${i.id})">
                    ${isOut ? 'EINLAGERN' : 'AUSLAGERN'}
                </button>
            `;
            list.appendChild(card);
        });
        document.getElementById('logList').innerHTML = state.logs.slice(0,15).map(l => `<div style="font-size:0.7rem; border-bottom:1px solid #eee; padding:3px;">${l.user}: ${l.item} (${l.action})</div>`).join('');
    }

    init();
</script>
</body>
</html>
