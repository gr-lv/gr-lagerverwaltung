<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V92</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; --dark: #0f172a; }
        
        /* RADIKALER RESET */
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background: #0f172a; color: white; overflow: hidden; }

        /* HINTERGRUND FIX */
        #bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -10; background: #1e293b; }
        .bg-img { position: absolute; width: 100%; height: 100%; background: url('haus_background.jpg') no-repeat center center; background-size: cover; opacity: 0.3; }

        /* LOGIN SCREEN */
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--dark); z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; width: 90%; max-width: 320px; text-align: center; border: 2px solid var(--accent); }

        /* APP LAYOUT */
        #mainApp { display: none; height: 100vh; flex-direction: column; position: relative; z-index: 10; }
        
        .header { background: var(--dark); padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .header h1 { margin: 0; font-size: 1.2rem; flex: 1; text-align: center; color: white; font-weight: bold; }
        .u-info { font-size: 0.7rem; color: var(--accent); width: 60px; }

        .content-area { flex: 1; overflow-y: auto; padding: 15px 15px 100px 15px; -webkit-overflow-scrolling: touch; }

        /* FILTER BOX */
        .filter-panel { background: rgba(255,255,255,0.95); padding: 12px; border-radius: 15px; margin-bottom: 15px; color: #333; }
        input, select { width: 100%; padding: 12px; margin: 4px 0; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; }

        /* CARDS */
        .item-card { background: white; border-radius: 15px; margin-bottom: 15px; overflow: hidden; color: #333; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: var(--danger); color: white; border: none; border-radius: 5px; padding: 5px 10px; z-index: 20; }
        .btn-status { width: 100%; padding: 15px; border: none; color: white; font-weight: bold; cursor: pointer; }

        /* NAV */
        nav { position: fixed; bottom: 0; width: 100%; background: var(--dark); display: flex; height: 70px; border-top: 2px solid var(--accent); z-index: 1000; }
        .tab-btn { flex: 1; border: none; background: none; color: #9ca3af; font-weight: bold; }
        .tab-btn.active { color: white; border-top: 4px solid var(--accent); }

        .hidden { display: none; }
        details { background: #eee; border-radius: 10px; margin-top: 10px; color: #333; }
        summary { padding: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="bg-container"><div class="bg-img"></div></div>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--accent); margin-top:0;">Lager Login</h2>
        <input type="text" id="loginUser" placeholder="Dein Name">
        <input type="password" id="loginPass" placeholder="Passwort">
        <button onclick="handleLogin()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; margin-top:10px;">ANMELDEN</button>
    </div>
</div>

<div id="mainApp">
    <div class="header">
        <div class="u-info"
