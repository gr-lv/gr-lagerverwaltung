<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V81</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; }
        
        body { margin: 0; font-family: sans-serif; height: 100vh; width: 100vw; overflow: hidden; background: #0f172a; color: white; }

        /* LOGIN SCREEN - ABSOLUT PRIORISIERT */
        #login-screen { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #0f172a; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: all; /* Stellt sicher, dass Klicks durchgehen */
        }

        .login-card {
            background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px;
            width: 85%; max-width: 350px; text-align: center; border: 1px solid var(--accent);
        }

        /* HINTERGRUND */
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e293b url('haus_background.jpg') no-repeat center center; background-size: cover; z-index: -2; }
        .dark-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); z-index: -1; }

        /* APP STRUKTUR */
        .app-shell { position: relative; z-index: 10; height: 100vh; display: none; flex-direction: column; }
        
        .header { background: #0f172a; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .header h1 { margin: 0; font-size: 1rem; }
        
        .logout-btn { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 0.7rem; cursor: pointer; }

        .content-area { flex: 1; overflow-y: auto; padding: 15px 15px 100px 15px; -webkit-overflow-scrolling: touch; }

        .filter-box { background: rgba(255, 255, 255, 0.95); padding: 12px; border-radius: 12px; margin-bottom: 15px; }
        .item-card { background: white; border-radius: 15px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.5); color: #333; }
        .card-inner { padding: 15px; display: flex; gap: 15px; align-items: center; }
        .thumb { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; }

        .btn-status { display: block; width: 100%; padding: 20px; border: none; color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f172a; display: flex; height: 70px; border-top: 2px solid var(--accent); z-index: 100; }
        .tab-btn { flex: 1; border: none; background: none; color: #9ca3af; font-weight: bold; font-size: 0.8rem; }
        .tab-btn.active { color: white; border-top: 4px solid var(--accent); }

        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .content { display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--accent); margin-top:0;">GR-Lagerverwaltung</h2>
        <input type="text" id="loginUser" placeholder="Benutzername">
        <input type="password" id="loginPass" placeholder="Passwort (1234)">
        <button id="loginSubmitBtn" onclick="checkLogin()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; margin-top:10px; cursor:pointer;">ANMELDEN</button>
        <p id="loginErr" style="color:#ff8888; font-size:0.8rem; margin-top:10px; display:none;">Login fehlgeschlagen!</p>
    </div>
</div>

<div class="bg-layer"></div>
<div class="dark-overlay"></div>

<div class="app-shell" id="mainApp">
    <div class="header">
        <h1>GR-Lagerverwaltung</h1>
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content active">
            <div class="filter-box">
                <input type="text" id="searchInput" placeholder="Suchen..." onkeyup="render()" style="margin:0; border:1px solid #bbb;">
                <select id="filterCatSelect" onchange="render()" style="margin:8px 0 0 0;"></select>
            </div>
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div class="item-card" style="padding:20px;">
                <h3 style="margin-top:0">Neuer Artikel</h3>
                <input type="text" id="itemName" placeholder="Bezeichnung">
                <select id="itemCatSelect"></select>
