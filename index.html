<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lagerverwaltung | Secure Cloud V23</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        :root { --primary: #4338ca; --dark: #1e1b4b; --surface: rgba(255,255,255,0.96); }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #0f172a; color: #1e293b; padding-bottom: 100px; }
        
        /* Sperrbildschirm */
        #login-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #1e1b4b; z-index: 20000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; color: white;
            padding: 20px; text-align: center;
        }

        .user-bar { background: var(--dark); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 500px; background: #1e1b4b; display: flex; padding: 8px; border-radius: 20px; z-index: 9999; }
        .tab-btn { flex: 1; border: none; background: none; color: #94a3b8; font-weight: bold; padding: 12px; cursor: pointer; border-radius: 15px; }
        .tab-btn.active { color: white; background: var(--primary); }
        .content { padding: 20px; display: none; max-width: 600px; margin: auto; }
        .content.active { display: block; }
        .panel { background: var(--surface); padding: 15px; border-radius: 20px; margin-bottom: 15px; }
        input, select { padding: 12px; border: 1px solid #cbd5e1; border-radius: 12px; width: 100%; margin-bottom: 10px; }
        .card { background: white; padding: 12px; border-radius: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; border-left: 6px solid #ccc; }
        .thumb { width: 65px; height: 65px; object-fit: cover; border-radius: 12px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <h2>Willkommen im Lager</h2>
    <p>Bitte gib deinen Namen ein, um fortzufahren.<br><small>Dies wird für das Logbuch benötigt.</small></p>
    <input type="text" id="userNameInput" placeholder="Dein Vorname & Nachname" style="max-width: 300px; margin: 20px 0;">
    <button onclick="doLogin()" style="padding: 15px 40px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer;">Starten</button>
</div>

<div class="user-bar">
    <div>👤 <span id="curUser">Gast</span></div>
    <button onclick="logout()" style="background:none; border:1px solid white; color:white; border-radius:5px; padding:3px 8px; font-size:10px;">Name ändern</button>
</div>

<div id="tab-lager" class="content active">
    <div class="panel">
        <input type="text" id="srch" placeholder="🔍 Suchen..." onkeyup="render()">
    </div>
    <div id="list">Warte auf Autorisierung...</div>
</div>

<div id="tab-stamm" class="content">
    <div class="panel">
        <h3>Neuer Artikel</h3>
        <input type="text" id="nName" placeholder="Bezeichnung">
        <select id="nCatSelect"></select>
        <input type="file" id="nImg" accept="image/*" capture="environment">
        <button onclick="doSave()" style="width:100%; padding:16px; background:var(--dark); color:white; border:none; border-radius:14px; font-weight:bold;">Speichern</button>
    </div>
</div>

<div id="tab-log" class="content">
    <div id="logBody"></div>
</div>

<nav>
    <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">Lager</button>
    <button class="tab-btn" onclick="switchTab(event, 'tab-stamm')">Neu</button>
    <button class="tab-btn" onclick="switchTab(event, 'tab-log')">Log</button>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('cloud_lager_v1');
    let db = { items: [], logs: [], categories: ["Werkzeug", "Technik", "Deko"] };
    let currentUser = localStorage.getItem('l_user');

    // Prüfung beim Start
    window.onload = function() {
        if (currentUser) {
            startApp();
        }
    }

    function doLogin() {
        const name = document.getElementById('userNameInput').value.trim();
        if (name.length < 3) return alert("Bitte gib deinen Namen ein.");
        localStorage.setItem('l_user', name);
        currentUser = name;
        startApp();
    }

    function startApp() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('curUser').innerText = currentUser;
        
        // Anonyme Anmeldung bei Firebase für die Sicherheit
        firebase.auth().signInAnonymously().then(() => {
            dbRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) { db = data; render(); }
            });
        }).catch(err => alert("Sicherheitsfehler: " + err.message));
    }

    function logout() {
        localStorage.removeItem('l_user');
        location.reload();
    }

    function sync() { dbRef.set(db); }

    function doSave() {
        let name = document.getElementById('nName').value;
        if(!name) return;
        
        let file = document.getElementById('nImg').files[0];
        let reader = new FileReader();
        reader.onload = function(e) {
            if(!db.items) db.items = [];
            db.items.unshift({
                id: Date.now(),
                name: name,
                qty: 1,
                cat: document.getElementById('nCatSelect').value,
                img: e.target.result || "",
                isOut: false
            });
            // LOGBUCH EINTRAG
            if(!db.logs) db.logs = [];
            db.logs.unshift({ t: new Date().toLocaleString(), u: currentUser, i: name, a: "Neu angelegt" });
            sync();
            switchTab(null, 'tab-lager');
        };
        if(file) reader.readAsDataURL(file); else reader.onload({target:{result:""}});
    }

    function toggleItem(id) {
        let i = db.items.find(x => x.id === id);
        if(i) {
            i.isOut = !i.isOut;
            db.logs.unshift({ t: new Date().toLocaleString(), u: currentUser, i: i.name, a: i.isOut ? "Ausgebucht" : "Eingebucht" });
            sync();
        }
    }

    function render() {
        const nCat = document.getElementById('nCatSelect');
        nCat.innerHTML = "";
        (db.categories || []).forEach(c => nCat.innerHTML += `<option value="${c}">${c}</option>`);

        const list = document.getElementById('list');
        list.innerHTML = "";
        const s = document.getElementById('srch').value.toLowerCase();
        
        (db.items || []).filter(i => i.name.toLowerCase().includes(s)).forEach(i => {
            list.innerHTML += `
            <div class="card" style="border-left-color: ${i.isOut ? 'red' : 'green'}">
                ${i.img ? `<img src="${i.img}" class="thumb">` : ''}
                <div style="flex:1"><b>${i.name}</b><br><small>${i.cat}</small></div>
                <button onclick="toggleItem(${i.id})">${i.isOut ? 'Ein' : 'Aus'}</button>
            </div>`;
        });

        document.getElementById('logBody').innerHTML = (db.logs || []).slice(0,20).map(l => 
            `<div style="font-size:12px; background:white; padding:10px; border-radius:10px; margin-bottom:5px;">
                <b>${l.u}</b>: ${l.i} (${l.a}) <br><small>${l.t}</small>
            </div>`).join('');
    }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(e) e.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
