<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V77</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; }
        
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1e293b url('haus_background.jpg') no-repeat center center;
            background-size: cover; z-index: -2;
        }

        .dark-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.5); z-index: -1;
        }

        body { 
            margin: 0; padding: 0; font-family: sans-serif; 
            height: 100vh; width: 100vw; overflow: hidden;
            background-color: transparent;
        }

        .app-shell { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #0f172a; color: white; padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); flex-shrink: 0; }
        
        .content-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; -webkit-overflow-scrolling: touch; }

        /* Filter Box */
        .filter-box {
            background: rgba(255, 255, 255, 0.9); padding: 12px; border-radius: 15px;
            margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .item-card { 
            background: rgba(255, 255, 255, 0.95); border-radius: 15px; margin-bottom: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); overflow: hidden;
        }

        .card-inner { padding: 15px; display: flex; gap: 15px; align-items: center; color: #333; }
        .thumb { width: 75px; height: 75px; object-fit: cover; border-radius: 10px; background: #ddd; }

        .btn-status-trigger {
            display: block; width: 100%; padding: 22px; border: none;
            color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer;
        }

        nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: #0f172a; 
            display: flex; height: 70px; border-top: 2px solid var(--accent); z-index: 100;
        }
        .tab-btn { flex: 1; border: none; background: none; color: #9ca3af; font-weight: bold; font-size: 0.8rem; }
        .tab-btn.active { color: white; background: rgba(255,255,255,0.1); }

        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .content { display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>

<div class="bg-layer"></div>
<div class="dark-overlay"></div>

<div class="app-shell">
    <div class="header"><h1 style="margin:0; font-size:1rem;">GR-LAGERVERWALTUNG V77</h1></div>

    <div class="content-area">
        <div id="tab-lager" class="content active">
            <div class="filter-box">
                <input type="text" id="searchInput" placeholder="Name suchen..." onkeyup="render()">
                <select id="filterCatSelect" onchange="render()" style="margin-top:8px; border: 1px solid var(--accent);">
                    </select>
            </div>
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div class="item-card" style="padding:20px;">
                <h3 style="margin:0 0 10px 0;">Neuer Artikel</h3>
                <input type="text" id="itemName" placeholder="Artikelname">
                <select id="itemCatSelect"></select>
                
                <div style="background:#f1f5f9; padding:10px; border-radius:10px; margin:10px 0;">
                    <small>Kategorie hinzufügen:</small>
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="newCatInput" placeholder="Name..." style="margin:0;">
                        <button onclick="addCategory()" style="background:var(--success); color:white; border:none; border-radius:8px; padding:0 15px; font-weight:bold;">+</button>
                    </div>
                </div>

                <input type="file" id="itemImg" accept="image/*" capture="environment">
                <button onclick="saveItem()" style="width:100%; padding:18px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:bold; margin-top:10px;">ARTIKEL SPEICHERN</button>
            </div>
        </div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">LAGER</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">NEU ANLEGEN</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('lager_v32_final');

    let state = { user: localStorage.getItem('lagerUser') || "Gast", items: [], cats: ["Werkzeug", "Garten"] };

    function init() {
        dbRef.on('value', snap => {
            const data = snap.val();
            if(data) {
                state.items = data.items || [];
                state.cats = data.cats || ["Werkzeug", "Garten"];
                updateDropdowns();
                render();
            }
        });
    }

    function updateDropdowns() {
        // Dropdown für Neu Anlegen
        document.getElementById('itemCatSelect').innerHTML = state.cats.map(c => `<option value="${c}">${c}</option>`).join('');
        
        // Dropdown für Filter (Suche)
        const filterSel = document.getElementById('filterCatSelect');
        const currentFilter = filterSel.value; // Filter merken
        filterSel.innerHTML = `<option value="all">Alle Kategorien</option>` + 
                              state.cats.map(c => `<option value="${c}">${c}</option>`).join('');
        if (currentFilter) filterSel.value = currentFilter;
    }

    function addCategory() {
        const val = document.getElementById('newCatInput').value.trim();
        if(val && !state.cats.includes(val)) {
            state.cats.push(val);
            dbRef.child('cats').set(state.cats);
            document.getElementById('newCatInput').value = "";
        }
    }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    function toggleStatus(id) {
        const i = state.items.find(x => x.id === id);
        const isIn = i.status === "im Lager";
        i.status = isIn ? "unterwegs" : "im Lager";
        i.outUser = isIn ? state.user : "";
        dbRef.child('items').set(state.items);
    }

    function render() {
        const list = document.getElementById('itemList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        const catFilter = document.getElementById('filterCatSelect').value;
        list.innerHTML = "";
        
        state.items
            .filter(i => {
                const matchesSearch = i.name.toLowerCase().includes(search);
                const matchesCat = (catFilter === "all" || i.cat === catFilter);
                return matchesSearch && matchesCat;
            })
            .forEach(i => {
                const isOut = i.status !== "im Lager";
                list.innerHTML += `
                    <div class="item-card">
                        <div class="card-inner">
                            <img src="${i.img || 'https://via.placeholder.com/100'}" class="thumb">
                            <div style="flex:1;">
                                <button style="float:right; border:none; background:#fee2e2; color:red; border-radius:5px; padding:5px;" onclick="if(confirm('Löschen?')){state.items=state.items.filter(x=>x.id!=${i.id}); dbRef.child('items').set(state.items);}">🗑️</button>
                                <b>${i.name}</b><br>
                                <small>${i.cat}</small>
                                ${isOut ? `<div style="color:red; font-weight:bold; font-size:0.8rem; margin-top:8px;">BEI: ${i.outUser}</div>` : ""}
                            </div>
                        </div>
                        <button class="btn-status-trigger" 
                                style="background:${isOut ? 'var(--danger)' : 'var(--success)'}"
                                onclick="toggleStatus(${i.id})">
                            ${isOut ? 'Einlagern' : 'Auslagern'}
                        </button>
                    </div>`;
            });
    }

    function saveItem() {
        const n = document.getElementById('itemName').value;
        if(!n) return;
        const newItem = { id: Date.now(), name: n, qty: 1, cat: document.getElementById('itemCatSelect').value, img: "", status: "im Lager" };
        const f = document.getElementById('itemImg').files[0];
        if(f) {
            const r = new FileReader();
            r.onload = (e) => { newItem.img = e.target.result; state.items.unshift(newItem); dbRef.child('items').set(state.items); };
            r.readAsDataURL(f);
        } else { state.items.unshift(newItem); dbRef.child('items').set(state.items); }
        document.getElementById('itemName').value = "";
        switchTab({currentTarget: document.querySelectorAll('.tab-btn')[0]}, 'tab-lager');
    }

    init();
</script>
</body>
</html>
