<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V79</title>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; }
        
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e293b url('haus_background.jpg') no-repeat center center; background-size: cover; z-index: -2; }
        .dark-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); z-index: -1; }

        body { margin: 0; font-family: sans-serif; height: 100vh; width: 100vw; overflow: hidden; background: transparent; }
        
        /* LOGIN OVERLAY */
        #login-screen {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #0f172a; z-index: 5000; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; color: white;
        }

        .app-shell { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; }
        
        /* HEADER MIT LOGOUT RECHTS */
        .header { 
            background: #0f172a; color: white; padding: 15px; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--accent); flex-shrink: 0; 
        }
        .header h1 { margin: 0; font-size: 1.1rem; letter-spacing: 1px; }
        .logout-link { color: var(--accent); font-size: 0.75rem; text-decoration: none; font-weight: bold; cursor: pointer; border: 1px solid var(--accent); padding: 4px 8px; border-radius: 5px; }
