<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V140</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --accent: #06b6d4; --danger: #ef4444; --success: #10b981; --glass: rgba(255, 255, 255, 0.95); }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100%; font-family: -apple-system, sans-serif; background-color: #000; color: white; overflow: hidden; }

        .global-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('haus_background.jpg') no-repeat center center;
            background-size: cover; z-index: 1;
        }

        #ui-wrapper { position: relative; z-index: 10; height: 100vh; display: none; flex-direction: column; }
        
        /* LOGIN */
        #loginScreen { position: fixed; inset: 0; z-index: 2000; display: flex; align-items: center; justify-content: center; background: #000; }
        .login-box { background: rgba(30,41,59,0.95); padding: 25px; border-radius: 20px; border: 2px solid var(--accent); width: 280px; text-align: center; }

        /* HEADER KOMPAKTER */
        .header { background: rgba(0,0,0,0.9); padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .header h1 { margin: 0; font-size: 0.9rem; letter-spacing: 2px; }
        
        .content-area { flex: 1; overflow-y: auto; padding: 10px 15px; padding-bottom: 90px; }

        /* ARTIKEL KARTEN OPTIMIERT */
        .item-card { background: var(--glass); border-radius: 12px; margin-bottom: 8px; padding: 10px; color: #000; display: flex; align-items: center; gap: 12px; }
        .item-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; background: #eee; cursor: pointer; }
        .item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
        .item-name { font-weight: 800; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-details { font-size: 0.7rem; color: #444; line-height: 1.2; }
        
        .qr-side { width: 42px; height: 42px; background: white; padding: 2px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; }
        .qr-img { width: 100%; height: 100%; }

        .btn-status { border: none; padding: 8px 12px; border-radius: 6px; color: white; font-weight: bold; min-width: 55px; font-size: 0.7rem; cursor: pointer; }
        .btn-in { background: var(--success); }
        .btn-out { background: var(--danger); }

        /* ZOOM & SCANNER */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; flex-direction: column; }
        .modal img { max-width: 85%; max-height: 70%; border-radius: 10px; border: 2px solid var(--accent); }
        #scanner-container { display: none; position: fixed; inset: 0; background: #000; z-index: 4000; flex-direction: column; }

        /* NAVIGATION */
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #030712; display: flex; height: 65px; border-top: 1px solid var(--accent); z-index: 100; }
        .tab-btn { flex: 1; border: none; background: none; color: #64748b; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: bold; }
        .tab-btn.active { color: white; background: rgba(6, 182, 212, 0.15); border-top: 3px solid var(--accent); }

        .form-input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 0.9rem; margin-bottom: 8px; box-sizing: border-box; }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: fixed; inset: 0; background: white; text-align: center; color: black; padding: 20px; }
        }
    </style>
</head>
<body>

<div class="global-bg no-print"></div>

<div id="scanner-container">
    <div id="qr-reader" style="width: 100%;"></div>
    <button onclick="stopScanner()" style="margin: 20px auto; padding: 12px 30px; background: var(--danger); color: white; border: none; border-radius: 8px; font-weight: bold;">SCANNER SCHLIESSEN</button>
</div>

<div id="zoomModal" class="modal" onclick="this.style.display='none'">
    <img id="modalImg" src="">
    <p id="modalTitle" style="color:white; margin-top:10px; font-weight:bold;"></p>
</div>

<div id="loginScreen" class="no-print">
    <div class="login-box">
        <h2 style="color:var(--accent); margin-bottom:15px;">GR-LOGIN</h2>
        <input type="text" id="loginName" class="form-input" placeholder="Benutzername">
        <input type="password" id="loginPass" class="form-input" placeholder="Passwort">
        <button onclick="checkLogin()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:6px; font-weight:bold;">ANMELDEN</button>
    </div>
</div>

<div id="print-area">
    <h2 id="p-name"></h2>
    <div id="p-loc"></div>
    <img id="p-qr" src="" style="width: 150px; margin-top:20px;">
</div>

<div id="ui-wrapper" class="no-print">
    <div class="header">
        <button onclick="startScanner()" style="background:none; border:none; font-size:1.4rem;">📷</button>
        <h1>GR-LAGER</h1>
        <div style="font-size:0.7rem; color:var(--accent); font-weight:bold;" id="displayUserName"></div>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content active">
            <input type="text" id="searchInput" placeholder="Suchen..." onkeyup="render()" style="width:100%; padding:10px; border-radius:8px; border:none; margin-bottom:12px; background:rgba(255,255,255,0.9);">
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div style="background:white; padding:15px; border-radius:12px; color:#000;">
                <input type="text" id="itemName" class="form-input" placeholder="Artikel Name">
                <select id="itemLagerSelect" class="form-input"></select>
                <select id="itemCatSelect" class="form-input"></select>
                <select id="itemRegalSelect" class="form-input"></select>
                <select id="itemFachSelect" class="form-input"></select>
                <div style="border:2px dashed var(--accent); padding:10px; text-align:center; margin:5px 0 12px 0; border-radius:8px; color:#666;" onclick="document.getElementById('itemImg').click()">
                    <span id="camText">📷 FOTO AUFNEHMEN</span>
                    <img id="imagePreview" style="width:100%; height:100px; object-fit:contain; display:none;">
                </div>
                <input type="file" id="itemImg" accept="image/*" capture="environment" style="display:none;" onchange="previewImage(this)">
                <button onclick="saveAndPrint()" style="width:100%; padding:14px; background:var(--accent); color:white; border:none; border-radius:8px; font-weight:bold;">SPEICHERN & DRUCKEN</button>
            </div>
            
            <div style="margin-top:15px; background:rgba(255,255,255,0.1); padding:10px; border-radius:10px;">
                <h4 style="margin:0 0 10px 0; color:var(--accent);">Listen verwalten</h4>
                <div style="display:flex; gap:5px; margin-bottom:8px;">
                    <input type="text" id="addInput" class="form-input" placeholder="Neu..." style="margin:0;">
                    <button onclick="quickAdd()" style="background:var(--success); color:white; border:none; padding:0 15px; border-radius:6px;">+</button>
                </div>
                <select id="manageType" class="form-input" onchange="updateManageList()">
                    <option value="locations">Lagerorte</option>
                    <option value="cats">Kategorien</option>
                    <option value="regale">Regale</option>
                    <option value="faecher">Fächer</option>
                </select>
                <div id="listDisplay" style="max-height:100px; overflow-y:auto;"></div>
            </div>
        </div>

        <div id="tab-log" class="content"><div id="logList"></div></div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">📦 LAGER</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">➕ NEU</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-log')">📜 LOG</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const mainRef = db.ref('lager_v90_multilager');
    let state = { user: "", items: [], config: {}, scanner: null };

    function checkLogin() {
        if(document.getElementById('loginName').value && document.getElementById('loginPass').value === "1234") {
            state.user = document.getElementById('loginName').value.toUpperCase();
            document.getElementById('displayUserName').innerText = state.user;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('ui-wrapper').style.display = 'flex';
            initApp();
        }
    }

    function initApp() {
        mainRef.on('value', snap => {
            state.config = snap.val() || {};
            state.items = Object.keys(state.config.items || {}).map(k => ({...state.config.items[k], key: k}));
            const fill = (id, list) => {
                const el = document.getElementById(id);
                if(el) el.innerHTML = (list || []).map(v => `<option value="${v}">${v}</option>`).join('');
            };
            fill('itemLagerSelect', state.config.locations); fill('itemCatSelect', state.config.cats);
            fill('itemRegalSelect', state.config.regale); fill('itemFachSelect', state.config.faecher);
            render(); renderLogs(); updateManageList();
        });
    }

    function render() {
        const s = document.getElementById('searchInput').value.toLowerCase();
        document.getElementById('itemList').innerHTML = state.items
            .filter(i => i.name.toLowerCase().includes(s))
            .map(i => {
                const qr = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${i.key}`;
                return `
                <div class="item-card">
                    <img src="${i.img || 'https://via.placeholder.com/60?text=BILD'}" class="item-thumb" onclick="zoom('${i.img}', '${i.name}')">
                    <div class="item-info">
                        <div class="item-name">${i.name}</div>
                        <div class="item-details">
                            📍 ${i.location}<br>
                            📏 ${i.regal} / ${i.fach}
                        </div>
                    </div>
                    <div class="qr-side" onclick="zoom('${qr}', 'QR: ${i.name}')">
                        <img src="${qr}" class="qr-img">
                    </div>
                    <button onclick="toggleStatus('${i.
