<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V148 - FULL VERSION</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --accent: #06b6d4; --danger: #ef4444; --success: #10b981; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100%; font-family: sans-serif; background-color: #000; color: white; overflow: hidden; }

        .global-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('haus_background.jpg') no-repeat center center;
            background-size: cover; z-index: 1;
        }

        /* LOGIN */
        #loginScreen { position: fixed; inset: 0; z-index: 9000; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); backdrop-filter: blur(5px); }
        .login-box { background: rgba(30, 41, 59, 0.95); padding: 30px; border-radius: 20px; border: 3px solid var(--accent); width: 280px; text-align: center; }

        #ui-wrapper { position: relative; z-index: 10; height: 100vh; display: none; flex-direction: column; }
        .header { background: rgba(0,0,0,0.9); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .content-area { flex: 1; overflow-y: auto; padding: 10px 15px; padding-bottom: 100px; }

        /* KARTEN */
        .item-card { background: rgba(255,255,255,0.95); border-radius: 12px; margin-bottom: 10px; padding: 12px; color: #000; display: flex; align-items: center; gap: 10px; border-left: 6px solid var(--accent); }
        .item-card.status-out { border-left-color: var(--danger); }
        .item-thumb { width: 55px; height: 55px; object-fit: cover; border-radius: 8px; background: #eee; cursor: pointer; }
        .item-info { flex: 1; min-width: 0; }
        .item-name { font-weight: 900; font-size: 0.95rem; }
        .item-meta { font-size: 0.7rem; color: #334155; line-height: 1.2; }
        .last-user { font-size: 0.65rem; font-weight: bold; color: var(--danger); margin-top: 3px; }
        
        .qr-side { width: 42px; height: 42px; background: white; padding: 2px; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; }

        .form-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; margin-bottom: 10px; box-sizing: border-box; }
        .btn-status { border: none; padding: 10px; border-radius: 8px; color: white; font-weight: bold; min-width: 60px; font-size: 0.7rem; cursor: pointer; }
        .btn-in { background: var(--success); }
        .btn-out { background: var(--danger); }

        /* NAV */
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #030712; display: flex; height: 75px; border-top: 2px solid var(--accent); z-index: 100; }
        .tab-btn { flex: 1; border: none; background: none; color: #94a3b8; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; }
        .tab-btn.active { color: white; background: rgba(6, 182, 212, 0.2); border-top: 4px solid var(--accent); }
        .content { display: none; }
        .content.active { display: block; }

        /* SCANNER & ZOOM */
        #scanner-container { display: none; position: fixed; inset: 0; background: #000; z-index: 4000; flex-direction: column; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; flex-direction: column; }
        .modal img { max-width: 90%; max-height: 70%; border: 2px solid var(--accent); border-radius: 10px; }

        /* DRUCK */
        #print-area { display: none; }
        @media print {
            @page { size: 62mm auto; margin: 0; }
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { display: block !important; position: fixed; left: 0; top: 0; width: 62mm; text-align: center; color: black; background: white; padding: 5mm; }
            #p-qr { width: 40mm; height: 40mm; margin: 5px auto; }
        }
    </style>
</head>
<body>

<div class="global-bg"></div>

<div id="scanner-container">
    <div id="qr-reader" style="width: 100%;"></div>
    <button onclick="stopScanner()" style="margin: 20px auto; padding: 15px; background: var(--danger); color: white; border: none; border-radius: 10px; width: 80%;">ABBRECHEN</button>
</div>

<div id="zoomModal" class="modal" onclick="this.style.display='none'">
    <img id="modalImg" src="">
    <p id="modalTitle" style="color:white; margin-top:10px; font-weight:bold;"></p>
</div>

<div id="loginScreen">
    <div class="login-box">
        <h2 style="color:var(--accent); margin-top:0;">GR-LAGER</h2>
        <input type="text" id="loginName" class="form-input" placeholder="Dein Name">
        <input type="password" id="loginPass" class="form-input" placeholder="Passwort (1234)">
        <button onclick="checkLogin()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:bold;">ANMELDEN</button>
    </div>
</div>

<div id="ui-wrapper">
    <div class="header">
        <button onclick="startScanner()" style="background:none; border:none; font-size:1.6rem;">📷</button>
        <h2 style="margin:0; font-size:1.1rem;">GR-LAGER</h2>
        <div id="displayUserName" style="font-size:0.75rem; color:var(--accent); font-weight:bold;">-</div>
    </div>

    <div class="content-area">
        <div id="tab-lager" class="content active">
            <input type="text" id="searchInput" placeholder="Suchen..." onkeyup="render()" class="form-input">
            <select id="filterCatSelect" onchange="render()" class="form-input" style="background:var(--accent); color:white; border:none;">
                <option value="">ALLE KATEGORIEN</option>
            </select>
            <div id="itemList"></div>
        </div>

        <div id="tab-neu" class="content">
            <div style="background:white; padding:15px; border-radius:15px; color:#000; margin-bottom:15px;">
                <input type="text" id="itemName" class="form-input" placeholder="Artikel Name">
                <select id="itemLagerSelect" class="form-input"></select>
                <select id="itemCatSelect" class="form-input"></select>
                <div style="display:flex; gap:10px;">
                    <select id="itemRegalSelect" class="form-input"></select>
                    <select id="itemFachSelect" class="form-input"></select>
                </div>
                <div style="border:2px dashed #ccc; padding:15px; text-align:center; border-radius:10px; margin-bottom:10px; cursor:pointer;" onclick="document.getElementById('itemImg').click()">
                    <span id="camText">📷 FOTO AUFNEHMEN</span>
                    <img id="imagePreview" style="width:100%; height:100px; object-fit:contain; display:none;">
                </div>
                <input type="file" id="itemImg" accept="image/*" capture="environment" style="display:none;" onchange="previewImage(this)">
                <button onclick="saveAndPrint()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:bold;">SPEICHERN & DRUCKEN</button>
            </div>

            <div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:12px;">
                <h4 style="margin:0 0 10px 0;">Listen verwalten</h4>
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <input type="text" id="addInput" class="form-input" placeholder="Neu..." style="margin:0;">
                    <button onclick="quickAdd()" style="background:var(--success); color:white; border:none; border-radius:8px; padding:0 15px;">+</button>
                </div>
                <select id="manageType" class="form-input" onchange="updateManageList()" style="background:#000; color:white;">
                    <option value="locations">Lagerorte</option>
                    <option value="cats">Kategorien</option>
                    <option value="regale">Regale</option>
                    <option value="faecher">Fächer</option>
                </select>
                <div id="listDisplay" style="max-height:150px; overflow-y:auto;"></div>
            </div>
        </div>

        <div id="tab-log" class="content"><div id="logList"></div></div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'tab-lager')">📦 LAGER</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-neu')">➕ NEU</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-log')">📜 LOG</button>
    </nav>
</div>

<div id="print-area">
    <div id="p-name" style="font-size:16pt; font-weight:bold; text-transform:uppercase;"></div>
    <div id="p-loc" style="font-size:12pt; margin:5px 0;"></div>
    <img id="p-qr" src="">
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQ6A16jUnamH4SFm8UKX2jSryJgZg2apk",
        authDomain: "gr-lagerverwaltung.firebaseapp.com",
        databaseURL: "https://gr-lagerverwaltung-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gr-lagerverwaltung",
        storageBucket: "gr-lagerverwaltung.firebasestorage.app",
        messagingSenderId: "561219570576",
        appId: "1:561219570576:web:65824b199a12933fd88115"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const mainRef = db.ref('lager_v90_multilager');
    let state = { user: "", items: [], config: {}, scanner: null };

    function checkLogin() {
        const u = document.getElementById('loginName').value;
        if(u && document.getElementById('loginPass').value === "1234") {
            state.user = u.toUpperCase();
            document.getElementById('displayUserName').innerText = state.user;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('ui-wrapper').style.display = 'flex';
            initApp();
        } else { alert("Login falsch!"); }
    }

    function initApp() {
        mainRef.on('value', snap => {
            state.config = snap.val() || {};
            state.items = Object.keys(state.config.items || {}).map(k => ({...state.config.items[k], key: k}));
            const fill = (id, list, addAll=false) => {
                const el = document.getElementById(id); if(!el) return;
                let h = addAll ? '<option value="">ALLE KATEGORIEN</option>' : '';
                h += (list || []).map(v => `<option value="${v}">${v}</option>`).join('');
                el.innerHTML = h;
            };
            fill('itemLagerSelect', state.config.locations); fill('itemCatSelect', state.config.cats);
            fill('filterCatSelect', state.config.cats, true);
            fill('itemRegalSelect', state.config.regale); fill('itemFachSelect', state.config.faecher);
            render(); renderLogs(); updateManageList();
        });
    }

    function render() {
        const s = document.getElementById('searchInput').value.toLowerCase();
        const cat = document.getElementById('filterCatSelect').value;
        document.getElementById('itemList').innerHTML = state.items
            .filter(i => (i.name.toLowerCase().includes(s)) && (cat==="" || i.cat===cat))
            .sort((a,b) => b.ts - a.ts)
            .map(i => {
                const isOut = i.status !== 'im Lager';
                const qr = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${i.key}`;
                const thumb = i.img || 'https://via.placeholder.com/60?text=FOTO';
                return `
                <div class="item-card ${isOut ? 'status-out' : ''}">
                    <img src="${thumb}" class="item-thumb" onclick="zoom('${thumb}', '${i.name}')">
                    <div class="item-info">
                        <div class="item-name">${i.name}</div>
                        <div class="item-meta">${i.location} | ${i.regal}/${i.fach}<br>Kat: ${i.cat || '-'}</div>
                        ${isOut ? `<div class="last-user">AUSGELIEHEN VON: ${i.lastUser || 'Unbekannt'}</div>` : ''}
                    </div>
                    <div class="qr-side" onclick="zoom('${qr}', 'QR: ${i.name}')"><img src="${qr}" style="width:100%;"></div>
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <button onclick="toggleStatus('${i.key}', '${i.name}', '${i.status}')" class="btn-status ${!isOut ? 'btn-in' : 'btn-out'}">${!isOut ? 'EIN' : 'AUS'}</button>
                        <button onclick="deleteItem('${i.key}', '${i.name}')" style="background:none; border:none; font-size:1.2rem; opacity:0.3;">🗑️</button>
                    </div>
                </div>`;
            }).join('');
    }

    function zoom(src, title) {
        document.getElementById('modalImg').src = src;
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('zoomModal').style.display = 'flex';
    }

    function startScanner() {
        document.getElementById('scanner-container').style.display = 'flex';
        state.scanner = new Html5Qrcode("qr-reader");
        state.scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
            const item = state.items.find(x => x.key === txt);
            if(item) { toggleStatus(item.key, item.name, item.status); stopScanner(); }
        });
    }

    function stopScanner() {
        if(state.scanner) state.scanner.stop().then(() => document.getElementById('scanner-container').style.display='none');
    }

    function toggleStatus(key, name, old) {
        const newS = old === "im Lager" ? "ausgeliehen" : "im Lager";
        mainRef.child('items/'+key).update({ status: newS, lastUser: state.user });
        mainRef.child('logs').push({ user: state.user, text: `${name}: ${newS.toUpperCase()}`, ts: Date.now(), date: new Date().toLocaleString() });
    }

    function saveAndPrint() {
        const n = document.getElementById('itemName').value;
        if(!n) return;
        const newRef = mainRef.child('items').push();
        const item = {
            name: n, location: document.getElementById('itemLagerSelect').value,
            cat: document.getElementById('itemCatSelect').value,
            regal: document.getElementById('itemRegalSelect').value,
            fach: document.getElementById('itemFachSelect').value,
            img: document.getElementById('imagePreview').src || "",
            status: "im Lager", ts: Date.now(), lastUser: state.user
        };
        newRef.set(item).then(() => {
            document.getElementById('p-name').innerText = n;
            document.getElementById('p-loc').innerText = `${item.location} | ${item.regal}/${item.fach}`;
            document.getElementById('p-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${newRef.key}`;
            setTimeout(() => { window.print(); switchTab(null, 'tab-lager'); }, 800);
        });
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('imagePreview').style.display = 'block';
                document.getElementById('camText').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updateManageList() {
        const type = document.getElementById('manageType').value;
        const list = state.config[type] || [];
        document.getElementById('listDisplay').innerHTML = list.map((v, i) => `
            <div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #444; color:white;">
                ${v} <button onclick="removeFromList('${type}', ${i})" style="color:red; background:none; border:none; font-weight:bold;">LÖSCHEN</button>
            </div>`).join('');
    }

    function quickAdd() {
        const type = document.getElementById('manageType').value;
        const val = document.getElementById('addInput').value;
        if(!val) return;
        let list = state.config[type] || [];
        list.push(val);
        mainRef.child(type).set(list);
        document.getElementById('addInput').value = "";
    }

    function removeFromList(t, i) {
        if(!confirm("Löschen?")) return;
        let list = state.config[t]; list.splice(i, 1);
        mainRef.child(t).set(list);
    }

    function deleteItem(k, n) { if(confirm(n + " endgültig löschen?")) mainRef.child('items/'+k).remove(); }
    
    function renderLogs() {
        const logs = Object.values(state.config.logs || {}).sort((a,b) => b.ts - a.ts);
        document.getElementById('logList').innerHTML = logs.slice(0, 40).map(l => `
            <div style="background:rgba(255,255,255,0.1); padding:10px; border-radius:8px; margin-bottom:8px; border-left:4px solid var(--accent);">
                <div style="color:var(--accent); font-weight:bold; font-size:0.85rem;">${l.user}</div>
                <div style="font-size:0.8rem; margin:2px 0;">${l.text}</div>
                <div style="font-size:0.65rem; opacity:0.6;">${l.date}</div>
            </div>`).join('');
    }

    function switchTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(e) e.currentTarget.classList.add('active');
        else document.querySelectorAll('.tab-btn')[0].classList.add('active');
    }
</script>
</body>
</html>
