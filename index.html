<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GR-Lagerverwaltung V93</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --accent: #06b6d4; --danger: #dc2626; --success: #16a34a; --dark: #0f172a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: -apple-system, sans-serif; background: #0f172a; color: white; overflow: hidden; }

        /* FIX: LOGIN ÜBER ALLES */
        #login-screen { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #0f172a; z-index: 999999; 
            display: flex; align-items: center; justify-content: center; 
        }
        .login-card { 
            background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; 
            width: 90%; max-width: 340px; text-align: center; border: 1px solid var(--accent);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
        }

        /* BUTTONS */
        .login-btn {
            width: 100%; padding: 16px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem;
            margin-top: 20px; cursor: pointer; transition: transform 0.1s;
        }
        .login-btn:active { transform: scale(0.95); background: var(--accent); }

        /* APP LAYOUT */
        #mainApp { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: opacity 0.5s; }
        .header { background: #0b1120; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .header h1 { margin: 0; font-size: 1.1rem; letter-spacing: 1px; }

        .content-area { flex: 1; overflow-y: auto; padding: 15px 15px 100px 15px; -webkit-overflow-scrolling: touch; }

        /* FILTER */
        .filter-box { background: white; padding: 12px; border-radius: 15px; margin-bottom: 15px; color: #333; }
        input, select { width: 100%; padding: 12px; margin: 4px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }

        /* LISTE */
        .item-card { background: white; border-radius: 15px; margin-bottom: 15px; overflow: hidden; color: #333; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .status-bar { width: 100%; padding: 15px; border: none; color: white; font-weight: bold; font-size: 0.9rem; }

        nav { position: fixed; bottom: 0; width: 100%; background: #0b1120; display: flex; height: 75px; border-top: 1px solid #333; }
        .tab-btn { flex: 1; border: none; background: none; color: #64748b; font-weight: bold; }
        .tab-btn.active { color: var(--accent); }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="margin-top:0;">Lager Zugang</h2>
        <input type="text" id="login
